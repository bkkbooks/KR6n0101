body:
  text: 者即是貪之有二一者分別貪二者俱生貪即分別俱生皆以染著為性也可知第二釋業用者有兩個業用也疏云能障無貪是一個業用生苦為業是兩個業用也即正與無貪相違歒對業用也能障無貪不起又能生苦即以貪愛能潤生即一切苦果皆因貪愛而能生苦果名生苦為業也即瑜伽論言九種潤心俱生愛俱故功能潤最勝能生一切苦果名苦為業也若望顯揚論說此貪有惡五業也一者障無貪二者能障菩提涅槃三者損自他四者能趣惡道五者增長貪問曰如何此中與顯揚不同答曰但是開合有異亦無過失此中能障無貪是顯揚五業中第一苦者即攝得顯揚下四業也若開此業業若合即有此兩重業用也可知從次第三重解前體業者疏云謂由愛力取蘊生故解云謂由愛力者即重解前體性也言取蘊者即重解前生苦為業也即由有此貪愛力故即一切苦果因此而生也言取者即是取支也即愛增名取也言蘊者即是苦果等是蘊也即五蘊身從取而生即由愛取二支潤前五果種子轉名為有有者變異於前故名有也若是初結生相續時屬生支皆由受取方結生故即此五蘊因此愛取而生故名取蘊也即是增上愛能生五蘊故言謂由愛力取蘊生故生上二界時由愛靜慮等即潤上二界五種子故便生上二界五蘊也即此愛取能諸煩惱故有此多義亦名取蘊生也又從蘊生故名取蘊生也即由諸蘊取煩惱由有蘊牽生愛取故即從蘊生名取蘊生也即同時諸煩惱皆能生以言取者即攝全界煩惱若取從蘊生者即集諦從苦諦生以苦諦為境為牽生集諦故若蘊從取生者即如苦諦從集諦生也以集發潤業故令苦諦生也若蘊從取生即從因為名名為取蘊如草糠火以草糠為因火為果以因此草糠燒得火者即從因得名名草糠火今取為因因有取故生得蘊名為取蘊也若是取從蘊生即從果為名名取蘊如花果為樹為因以樹上有花果從果得名名華果樹今取從蘊生即蘊是果取為因亦是從果得名名為取蘊生也又言取從蘊生者即如臣即取如王也蘊如臣即臣屬於王名蘊屬他取故名為取蘊也此蘊屬於取此是一切異生之蘊也可知上來總是重解前體業上來有三初正出體二者釋業用三者重解前文三段不同總是正釋上來有二初問二正釋二文不同總是第一解貪訖也自下第二解嗔者分二初問二正釋且初問者疏云何名嗔此應言嗔以何為體性以何為業用此疏文是總問亦名雙問二正釋名者分二初略釋體業二者廣釋體業且略釋者先出體二辨業用且正出體者疏云於若苦具增恚為性者解云即三苦皆生於嗔也若增強者即苦受生嗔而增猛故以樂受乖離故便生於嗔也即苦受生嗔殊勝也言苦具者即一切有漏法無漏法皆能生苦具也即苦具能生嗔也問曰有漏順苦苦具無漏不順苦如何亦名苦具答曰隨無漏即非也若為緣生於苦者無漏亦苦具也何者是即邪見諦謗無漏滅道等即招得惡趣之苦嗔於滅道便生地獄苦者即滅道皆是苦具問曰如何知之答曰瑜伽五十八云迷滅道諦嗔亦親增嫉滅道故亦說無漏苦具也問曰前言三苦能生嗔者何者是三苦答曰三苦者一者苦苦二者壞苦三者行苦也且第一苦苦者即性是苦受即言苦者是違境即逼迫境是也下更重言苦者即是上苦受領納苦境故言苦苦也二壞苦者即是樂受生已即樂散壞時名壞苦即樂受變壞故名為壞苦也可知三者行苦者即三界有漏三性等皆名行苦即樂捨等受等皆有造名行以是有漏皆苦名為行苦也即樂壞苦也若是有漏樂受喜受等凡情觀時諸言是樂若是智者觀之總名苦也即一切有漏皆名行苦也即經部鳩摩邏多偈云如以一枝毛置在掌中即不覺若置在眼精上即極不安穩也愚人觀有漏樂受等如將一毛置在掌中不覺不知若是智觀之如眼精上置一毛即極生猒患也即三界無安是真火宅皆是苦也問曰此三苦通三界否答曰欲界具三苦色界有壞苦行苦無色界唯有行苦也或言上二界唯是行苦者道理稍勝以色界身死拂然早滅無五根對等也又有八苦即生老病死愛別離怨憎會求不得五盛陰解生苦者即是胎中有衆苦逼迫苦業也二者老苦者即時分變異故三者病苦者即四大受變異乖違故四者老苦即壽受變壞故世風力解支節無處不苦也五者求不得苦已得之財貪著若未得之財追求不得故生衆苦也六愛別離苦者即於妻子等離別之時生愛樂故生種種苦也七者怨憎會苦即是怨家相逢便生於苦也八者五盛陰苦即有漏五蘊身有諸苦也即此八種苦與三苦相攝者即依對法論說生老病死怨憎會此五個苦即是苦苦所攝也謂五苦順苦變受之法亦是苦受之自相也若是愛別離求不得此二是壞苦攝也謂此二種苦正能壞樂受故若是五盛陰苦即與行苦相攝也此第以道理即通攝餘七苦也問曰此八苦於何者有何者無答曰欲界具者八苦界無前七苦也唯有五盛陰苦即此八苦皆生於嗔也即此嗔於此苦及苦具上憎恚為嗔之體性也次辨業用者疏云能障無嗔至所依為業者此有兩個業用也能障無嗔不安穩性是一個業用也惡行所依為業是兩個業用也以嗔體性相違故即障無嗔是其業用也有此嗔故令身心擾惱不安穩也惡行所依者即是惡業以嗔唯不善性能發三塗惡業即與惡業為所依即行者是業既言惡行者明知是惡業也能發惡業與惡業為所依故是業用也若准顯揚論說此嗔亦有五業也一者能障無嗔故二者能障菩提涅槃故三者損故四者趣惡道故五者增長嗔故即此無嗔者是顯揚論第一業用也下言依為業者是下四業也可知上來總是略釋體業也第二廣解業用者疏云謂嗔必令身心熱惱至不善性故者解云即是重解前業用也謂嗔必令身心熱惱者即重解前不安穩性也起諸業不善性故重解前惡行所依也即由有嗔故即令身熱心惱也即身驚肉戰不安穩也起諸惡業不善性者由有嗔故必能發惡業惡業者必是不善性即意識相應嗔能正發惡行若五識相應嗔即隨轉心發惡業也即對法云心懷憎恚多住苦故故嗔與惡行為所依也以能起得諸惡業不善性故上來有二初略釋體業二者重前解業用二文不同謂之正釋上來有二初問二正釋兩文不同總是解嗔也自下第三解無明分二初問後正釋且初問者疏言何名癡意問云此癡以何為體性業用也此疏文總問也可知第二正釋者於中分二初略釋體業二者廣解前文且略釋體業者疏云於諸理事所依為業者且先正釋體性者疏云於諸理事迷暗為性者解云此總合說也大疏云獨頭無明唯迷理也相應無明亦亦迷理事大段無明有四種四種不同總而言之於諸理事迷暗為性也言迷者謂昏迷也暗者即暗昧若理事皆無曉會故云迷暗為性也可知次辨業用者此皆有兩個業用也能障無癡是一個業用也一切雜染所依者是兩個業用也即能障無癡不起故以癡與無癡相違法故若有癡無癡必不生即暗與明是相違故以違此無癡不起故云能障無癡也言一切雜染所依者即此癡起時即能與一切雜染法為所依止是業用也問曰如何名一切雜染答曰即是三雜染也問曰三雜染者何答曰一者煩惱雜染者即是無明愛取三支是也即此無明與愛取業煩惱為所依即與煩惱雜染所依為業也二者業雜染者即是行支所謂福非福不動等業并有支一分是業雜染攝也即行支是無明發也即業雜染依無明無明與業雜染所依為業也三者生雜染者即是五果種子及有支少分及生老死支皆是生雜染也即十二支中即無明與餘十一支為所依也故言一切雜染所依為業也可知上來略解體業也第二廣釋前文者此即唯廣前業用也疏云謂由無明起疑耶見雜染法故者解云由有此無明於諦理事迷暗故便起得疑及耶見即撥無諦理以猶預故若有耶定即正定不生何名耶定即無想定等是也此重廣能障無癡也下重解三雜染者疏云貪等煩惱隨煩惱者即解煩惱雜染也業之一字解業雜染也由有此二雜染故便招得生雜染也故疏云能招後有生雜染法故或能招後有生雜染法故此一段疏文總是生雜染也以五果種子為生雜染之因能招當來二支果故名能招後有生雜染也理實五果種子及有支一分并生老死支皆是生雜染也即此三雜染皆因無明生起此唯取見道無明能生三雜染法起疑邪見也不是修道無明也問曰為復唯起邪見為復更起餘四見答曰耶見寬通如增上緣即總攝五見皆是邪見攝也但以見不正故總名邪見也若有癡時即諸惑皆生也即有此邪見疑等便一切煩惱總生即推功歸本皆因無明也問曰何故百法論文無明即在慢後唯識論無明即在慢前即二論如何前後不同答曰百法論說癡居慢後即顯無明通利鈍故通上下故若是唯識論中說無明居前者即顯三不善根一處辨也亦無別義也可知上來有二初略釋體業二廣前業用兩段不同總是正釋上來有二初問二正釋二文不同總是第二釋無明訖自下第四釋慢者分二初問二正釋且初問者疏云何為慢應言此慢以何為體以何為業用此是總問也可知第二正釋者分三初略釋體業二者廣釋體業三者辨差別且第一釋體業中先出體後辨業用且出體性者疏云恃己於他高舉為性者意云恃己等即是恃賴自身也即恃者恃由依也賴也即對他劣人恃賴己身端正或恃賴事業書詩等或恃賴族姓等便高舉也即陵他人即自恃賴等不自前人故名慢慢即高舉也問曰言高舉即名慢者即何故對法論云有我故名心高舉答曰此對法約根本說即說我見與慢同時起即我見是根本故且言我高舉也其意高舉是慢是慢體性也可知第二釋業用者此有兩業用也疏云能障不慢是一個業用生苦為業即是兩重業用也若有慢時即心高舉起不慢時即心謙下也以體性相違故以慢起時正障不慢也故云能障不慢也言生苦者即謂慢高舉即於勝人勝法上心高舉故於聖人法上生陵略故遂墮惡道受諸苦故因慢生得諸惡苦者名為生苦為業也若望顯揚論說此慢亦有五業也一者能障不慢二者能障菩提涅槃三者損自他故四者趣惡道故五增慢故即疏中言生苦為業者即攝得顯揚五業中下四業也此疏中言能障不慢者即是彼論第一業也即開合不同若開即成五業若合說即有兩重業也可知上來第一略釋體業也第二廣釋體業者且先廣前體者疏云謂若有慢至心不謙下者解云於德有德者即是起慢之處也於德者即是殊勝功德法也即是三乘聖教是也言有德者即是有德業也即三乘聖教等即於三乘賢聖人及法心不謙下者是慢之體性也即重解前高舉為性也可知第二重釋業用者疏云由此生死至受諸苦故者解云或有疏本言自此者或云由此者皆是寫人不定也即有此慢於三乘賢聖人法心不謙下者即於聖教等生陵略心即不可超凡成聖也即與業為增上緣能趣惡道生死輪回受諸衆苦無有斷絶名為無窮也可知上來第二廣釋前文可知第三辨差別者於中分二初解慢種類二者從一切皆通見修所斷下是破小乘也且第一解慢種類者疏云依慢差別至我得處生者解云七九種即是慢種類也謂於三品我得處生是生見之處也問曰何名種類答曰七個是慢九個是慢類也且七慢者一者慢二者過慢三者慢過慢四者卑慢五者我慢六者增上慢七者耶慢也即五法上起七慢也即於三品我德處也即四於三品起三於二法生也即於下品人身起慢即於劣計見轉勝是慢也以見前人不解事業相㒵身品亦劣即於此下品劣身便計己為勝即全不如我是慢也二者過慢即於中品人起也即於等計己勝也即前人與此人一切皆相似一種是中品人即此人即此人便計他人如我即事業相似便言我勝於他即於等計己勝也三者是慢過慢即於上品人起也即於勝計己勝也即此人自是中品人便於上品人身起慢云此上品人亦不如我我勝於此人故即言勝於中品人即是慢更言我亦勝於上品人便是慢過慢也即於勝計己勝也四者卑慢者亦於上品人起也即此人多分不及他人便自計言我但少分不及他是卑慢也即三品起得此四慢也五者我慢即於我境上起也即自恃賴己五蘊身為殊勝故即計五蘊為我也諸人皆不如我即自恃己身高舉也第五於德上起兩個慢者言德者即是三乘聖人及聖教也即起得增上慢及耶慢也且辨增上慢者即少得謂多得是增上慢也即如無文比丘得四禪定便計為四沙門果即少分得四禪根本定便計多聖果者是少得謂多得也有解云無文比丘即是全不得計為得也若言得初果已計為第四果者即是少得謂多得今既全不得四果是得四禪有漏故全不得無漏定不是少得謂多得也第二解云亦有少得也即得聖之時斷惑盡顯得無為名擇滅無為此比丘得第四定顯離八灾患顯得不動無為即是六無為中得一分無為也亦是少得計為全得是增上慢也第七亦於德上起邪見慢也即全不得計為得者是邪慢如外道全不得涅槃便計無想天是涅槃解脫即是邪慢也問曰卑慢計言我少分不如他者即無高舉如何名慢答曰謂此人多分不如他便計言我但是少分不如他亦有增強分故亦名慢但有稱量心即總名為慢也雖言我少分不如他者有稱量門中總名為慢也即於五個境上起七個慢故疏云謂於三品我得處生也七慢可知言九慢者即是慢類也即此九慢大乘經中未見有文也今准小乘婆沙第百九十及俱舍論長行第十九說有九慢九慢即我勝我等劣為三也有勝有等有劣為三無勝無等無劣為三即是九個慢類也一得偈偈即過慢慢卑慢如次說初三卑慢慢過慢如次說中三慢過慢卑慢如次說後三也薦福言應一一置慢類之言即言我勝慢類我等慢類我劣慢類也下皆應置慢類之言也問曰此九慢與前七慢何寬何狹答曰七慢即寬九慢即狹即九慢是七慢中三個慢起得九慢也問曰前三慢者何答曰一者慢二者過慢三者卑慢於此三個慢深流出九慢類也九慢者且第一三種者即是我勝等三也一者我勝慢類者從下中品人起過慢也即下品人定不如我若是中品人與此相似即此人計言中品人亦不如我即於等計己勝名我勝也二者等慢類者即是前七慢中第三慢也即於上品人起即上品人勝於此人此人計言與我高等即是於勝計己等名我等也三者我劣慢類者即是卑慢亦於上品人起也即上品人多分勝於此人此人計言我但少分不如他是我劣也此解第一句過慢慢卑慢也第二句云卑慢慢過慢者即是中三也第一是有勝慢類者即是卑慢也於上品人起上品人多分勝於此人此人自計云我但少分不如他即於勝計己劣名有勝於我少分故二者有等慢類者即是慢也即亦於上品人起也即是勝計己等也可知三者有劣慢類者即是過慢也即於中下品人起也即中下品人皆劣於我即於劣計己勝亦於中品等計為勝也故不也此說中三訖也言後三者即是慢過慢卑慢也如次說後三者一者無勝慢類者即是慢即於下品人起即下品人唯是劣無有勝於我即是慢故名無勝二者無等者即是過慢也於中品人起以此人與彼人相似故即此人計云我勝於彼人即於等計己勝我勝於彼人彼人不與我等故故名無等也三無劣慢類者即是卑慢即於上品人起也即於勝計己等即此人是中品人便計云我上品人高等不我劣於彼人故云無劣也或我少不如他多分相似也即我不劣於他故名無劣也上來解九慢類唯於三品人起不於我德二境生也即狹於七十慢也即大疏與俱舍周也上來總是第一擇慢種類訖也從次第二破小乘宗者疏云一切皆通見修所斷即起無失者意云即九慢者大小乘並通見修所斷彼小乘宗雖言慢類通修道斷此九慢類於修道中但有種子不許有慢類起現行也見即俱舍疏有問云何以聖位有彼慢類與我慢未能斷時如何不起現行耶小乘師引偈答云慢類等我慢惡作中不善聖有而不起見疑所憎故意云九慢由我見所憎故全至修道位我見既斷故慢類我慢亦不現行也舉喻我見似弓背慢類及我慢似面弓背既折弓面隨折也今我見既斷即慢類我慢隨亦不起也故知修道慢類不起現行大乘破云汝小乘若言聖位無我見者何故言今者我我何所在耶又如前三果人聞雷聲走入室恐我斷故聖人有我見我見既有我慢有者九慢亦起現行也即今者我是俱生我見更重言我者是分別我也大乘修道既有我見我慢起現行者由斯九慢類亦起現行無過失也故疏云聖位我慢既許現行慢類由斯起亦無失也此但為大乘宗說也即前三果人有此我慢類等也若四地已前有第六識慢也若至第四地作菩提分法觀所有我見永不現行也我慢亦不起若說第七識我見即入第八地方不起也七地已前第七識慢亦起現行若入八地已去亦有法慢也若邪慢增上慢聖位定無也唯凡夫有也可知上來有二初辨慢種類二者破小乘兩段不同總是辨差別也上來有三初略出體業二者廣釋體業三辨差別三段不同總是正釋上來有二初問二正釋二文不同總是第四釋慢訖也自下第五解疑者分二初問二正釋且初問者疏云何為疑意云此疑以何為體性以何為業用此疏文是總問可知第二正釋者分三初略釋體業二者重釋體業三者從然此疑品至非即是慧已來是破異說也三段不同且第一略釋體者且先出體者疏云於諸諦理猶預為性者解云言諦理者即是四諦道理真理或二諦道理真理理事等皆生猶預不定即諦理是起疑之處也即於四諦若事若理為復實有為復實無即生猶預猶預者是不定義也即此唯識論但說諦理是起疑處若依瑜伽五十八云疑於五相起也問曰何名五相答曰一者他世二作用三者因果四者四諦五者三寶問曰如何唯識瑜伽二論不同答曰唯識雖言諦理亦攝瑜伽五般也何以即疑於未來他世無苦果者即於此四諦中苦諦攝也言作用者即是疑無中有等有傳識之用彼言因果者即此是四諦因果通攝也若是有漏因果即苦集諦攝若是無漏因果即滅道諦攝也彼言疑三寶者即是此中滅道諦攝此唯識合彼五事總在四諦攝也若瑜伽即開成五事也即於此諦理佛之與法為有為無猶預者是疑自性也次辨業用者此有兩個業用也疏云能障不疑是一個業用也善品為業是兩個業用也以疑與不疑相違法也若是疑即不決不疑即決若疑起時正障不疑也即障不疑是別業用也問曰此不疑於百法中何法所攝答曰准前染淨相翻有三師解也初師云不疑即信所攝二云不疑即正勝解攝三者不疑即正慧攝若據道理即第二解是正勝解故為正也以不疑故即是印決之義今正勝解是決定義攝不疑也即正障不信是別業用也若通業用者疏云善品為業即此疑亦能障一切善品為業也若修善事之時生猶預者即令不修善事也以有猶預故即我今修善為復定有善果為復無即生猶預者令善品不生也若准顯揚論說此疑亦有五業也一者能障不疑二者能障菩提涅槃三者損自他故四者趣惡道五者增長疑品此中能障不疑即攝顯揚第一業也言能障善品者即攝下業也若開斷即成五業若合即成此二業用也可知上來略釋體性訖也第二重廣前文者即是合解體業也疏云謂猶預者善不生故解云謂猶預者即釋前猶預為性也善不生者即釋前善品為業也即修行善行之時有猶預者即令善品不得生長故以生疑惑故即不修善法因便生善品故言謂猶預者善不生故可知從次第三破異說者有師說且第一不正師義者論云有義此疑以慧為體猶預簡擇說為疑故問曰若言疑以慧為體者有何教文答曰即瑜伽五十八說猶預簡擇說為疑故又瑜伽論第八云疑謂分別異覺為體以覺者是慧也如何名異以有不決故名異覺也即簡擇猶預異於決斷覺者說名為疑也又訓釋解云即毗助末底轉增為疑也即毗是種種義也末底是般若義般若即是慧也即末底是慧之異名也以慧體性本來是慧以毗字助之便轉成疑慧體被毗助著便變異即名種種慧也即梵言毗末底此言種慧者即是疑也即此疑無別自體即於慧上假立疑也即毗助末底轉慧為疑疑是無別體也此是大乘異師非是別部也此是安慧義也自下解彼護法義者分四一者標宗二者立理三者引教四者反成且第一標者疏云然此疑者別有自體即是猶預為性是標宗也二立理者疏云令慧不決非即慧故立云非說猶預簡擇是疑但是疑同時令慧不決定故非疑即是慧也問曰若爾即瑜伽云猶預簡擇是疑者如何通會答曰但是疑令同時慧不決定故非即疑體是慧也問曰若爾者有何教據且第三引教者即瑜伽五十五說六煩惱中惡見是世俗有即是染慧一分又餘貪等五是實初有以別自體故故知疑體慧即疑別有自體性也以非世俗有故若疑體即慧者應同五見亦世俗有應立量云疑是有法應別有自性宗因云六煩惱中非世俗有故同喻如貪等實法也可知故此別有自體性也第四反成者亦是訓釋反難前師以成自義論云毗助末底轉慧為疑毗助若南應轉智成諦識也意云汝前師言末底是慧以毗字助之即慧成疑者亦應若南是智以毗字助之轉智成識以毗是種種義由毗助智變名識故若不許毗助若南轉智成識識別有自性者即毗助末底轉慧成疑亦不成若言助著慧即轉慧成疑疑無別體者即應毗助智時智成識識無別體即彼既不爾此云何然故知疑別有自體也上來四段是護法正義也上來有二師總是破異說也從次第三總攝前五六釋分別者疏云五釋普無六釋也以上一個字無離合故六釋不攝也上來有四初略釋體業二重釋體業三者破異說四者總攝前五六釋分別四段不同總是正釋上來有二初問二正釋二文不同總是第五解疑訖也自下第六解惡見者分二初問二正釋且初問者疏云何惡見此是問也應言以何為體以何為業用有何所以五見總名惡見即百法名不正見唯識論名惡見也此是總問也第二正釋中分二初總辨體業二者從此見行相下是辨差別也且第一總辨體業中分二初別辨體業二者從謂惡見者多受苦故是合解前文也且第一別辨體業中先出體性者疏云於諸諦理至染慧為性者解云諦即四諦理即道理是也於此四諦道理等顛倒推度也問曰何名顛倒答曰頭下名顛足上為倒也若於法中說者即於理違背故名顛倒謂此五見等無我計我非常計常非淨計淨非樂計樂或謗無因果非因計因非道為道故總名顛倒以與本法意義相違故名顛倒也又言倒者即是常樂我淨四倒也以本來是無常無樂無淨無我等便妄計為常樂我淨者名為倒也即此四倒有三種也問曰三種倒行相如何答曰言三種倒者即是想倒見倒心倒也言想倒者即於無常無樂等四倒起常等四者即是妄想分別名為想倒也言見倒者即於前妄想所分別中即忍可樂欲建立為常等四不知是無常等四便印可為常等四以執著為常等者名見倒也言心倒者於所執著等煩惱貪染故名心倒也有此名見顛倒推度即此惡見皆是染慧為體性也即是染慧上有顛倒推度義名為惡見也即將染慧為體性可知次釋業用者疏云能障善見招苦為業者解云此亦有兩個業用能障善見是別業用招苦為業是通業也即此善見是正見也以惡見與此善見相違能障善見不生故是惡見業用也問曰如何惟識論名惡見百法論即名不正見二論如何相違答曰以五皆能耶推求故總名不正見也若准唯識論以五見皆非善見故總名為惡見也又言惡見者以善翻名為惡見唯是染故定非善見故名惡見也或毀責名為惡惡通有覆今此五見總名惡見以毀責故由見不正故總名惡見也此應向前來云何惡見中問答也可知言招苦為業者意云有此惡見故即能招種種苦果也即種種耶推求已便發惡行受諸苦果故言招苦為業也若准顯揚論說此惡見亦有五業也一者能障善見二者能障菩提涅槃三者損自他四者趣惡道五者增長惡見也此中能障善見是顯第一業也若是招苦為業者即是顯揚下四業也若開即成五業若合說者即說有二重業也上來別出體業也自下第二合釋體業者疏云謂惡見者多受苦故者解云謂惡見者重釋前體也多受苦即重解前招苦為業也或此總是重釋前業用亦得也謂惡見者即多毀正法以執自見戒等為勝清淨等由有此執故便生惡趣受諸苦也故云多受苦故問曰此見為是分別為是俱生答曰分別者能發惡行業故即往惡趣唯分別故若是俱生者即不發惡行也此約多分說也亦有生無想天者豈非樂果耶故知不必定招苦果也若依後世說亦當來受諸苦也可知上來總是總辨惡見體業也可知第二辨差別者分二初兩句是標差別之行相二者正辨差別且第一標者疏云此見行相差別有五也意云言五者一身見二邊見三邪見四見取五戒禁取也即惡見中有五個見差別也故云差別有五也二正辨差別即分五段今且第一辨身見者分四段一者辨身見之義二者辨生見之處三者辨業用四者辨身見差別且第一辨身見之義者疏云一薩迦邪見者解云薩迦邪見即是梵語也下言見者即是漢言即梵云薩迦耶達利瑟致此翻為身見即梵云迦耶此云積聚積聚即是身也更言薩者是何義今解薩字有三義解也一者有義二者僞義三者移轉義若是薩婆多宗解薩是有義二經部云薩是僞義三大乘解薩是移轉義三師不同且第一薩婆多云薩是有義迦耶是身義達利瑟致名為見也即言阿悉提底以助於薩即名為有義也即執身為實有也以從極微生故是實有之身名有也以為悉二字以自有義也佛謂遮當來經部執身為僞故說身是有也言有者但是緣生幻有也即薩婆多不得佛意便執是實極微成者是實有之身即具足應翻阿悉提底薩迦耶達利瑟致即翻為有身見也第二經部師解云薩者是僞義迦耶是身達利瑟致是見也即將思詫提底以助於薩即名為僞義也以身者是積聚積聚即是五蘊假者即佛謂遮當來薩婆多執身為實有者所以說是五蘊合成積聚是僞也即緣此積聚假身見故名僞身見也即具足應言思託提底薩迦耶達利瑟致此云僞身見也第三大乘解云薩者是移轉義也以將僧吒爛提底以助於薩即成移轉義也即此大乘解即是雙遮前二師義也以是緣生幻有故非實極微成不名為實有也又是依他法從種而生成所緣緣義亦非僞義唯是依他移轉之法以死此生彼無實定故名移轉之身也非如前二宗定實定僞名為移即流轉諸趣不定故名移轉義也即是具足應言僧吒爛提底薩迦耶達利瑟致此云移轉身見即於此移轉身是見故名移轉身見也上來正解身見之義訖也從次第二辨生見之處者疏云謂於五取蘊執我我所者所者意云即於此五蘊身執為我及我所也即執色為我餘四蘊為我所即五蘊互為我我所也問曰如何名五取蘊答曰此簡不是無漏五蘊故言五取蘊也以是愛取能潤生故即有此五蘊五蘊從他愛取生名為五取蘊也即從因為名即於此五取蘊上執為我我所即此五蘊能生起我見五蘊是所緣我見是能緣也即緣此五蘊身起我我所見故言謂於五取蘊執我我所也可知從次第三辨業用者疏云一切見趣所依為業者解云即餘三見皆我見後生即有此身見時便於身見上更執為斷常故即此身見與邊見為所依也以斷常是邊見故又於自身見上執自見為最勝者是見取即身見與見取為所依也即更執自身戒行為能得清淨故名戒取即與餘後三見為所依故即是身見之業用也故言一切見取所依為業也從次第四身見差別者問曰此身見行相者何疏答云此見差別有二十句六十五等分別起攝者解云依對法論第一說云分別行緣蘊不分別所起處即有二十句若分別行緣蘊兼分別所起處即有六十五句也且作二十句者即一蘊有四句即五蘊合有二十句也即色蘊有一個我見三個我所見即成四句即五蘊皆然且於色蘊上作法者第一外道計色蘊是我即色蘊當體是我體也第二外道計此色非我此色蘊是我之瓔珞但是我家莊由即是我之瓔珞也第三外道云此色亦非瓔珞此色蘊但是我驅使是童㒒是我所有也第四外道云亦非僮㒒此色蘊是我住處是我窟宅也此色蘊既有四句即餘四蘊每蘊有四個外道准色蘊說也即成二十句也即五個為我見十五個為我所見問曰何以五個我見十五是我所耶答曰以相應我所隨我見起即不離我見也即五個是我見十五是我所此但是分別行緣蘊不分別所起處也問曰何名所起處答曰若執色為我見執餘四蘊是我我所所起處別即言有所起處也今不分別所起處者即計色為我時更不別分別我所起處但與我見同起故言不分別所起處也但有二十句也若分別行緣蘊兼分別所起處者即有六十五句即我與我所別蘊起也若計色為我時便計餘四蘊為我所也即我所不與我同蘊起即別蘊起我所故即言并分別我所所起處也作法云即將色為我即餘四蘊各有三個我所即色是我即是我瓔珞僮㒒窟宅想是我瓔珞僮㒒窟宅行是我瓔珞僮㒒窟宅識是我瓔珞僮㒒窟宅即一蘊為我時餘四蘊各有三個我所即三四成十二并一個我成十三句也即一蘊為頭有十三句即五蘊互為頭都有六十五句也問曰疏云言六十五等者即等於何法耶答曰五蘊既有二十句六十五句等者即等取十二處十八界亦有我我所也且十二處者即分別行緣處不分別所起處者即有四十八句也即有外道計眼根是我第二外道云此亦非我即此眼根但是我瓔珞以眼根能莊嚴我也第三外道云非亦瓔珞此眼根但是我家僮㒒第四外道計云亦非僮㒒此眼根但是我住處窟宅也即眼根有四一是我見三句是我所見即眼根處有四句即十一處准此眼根作法即十個四成四十處更有二處六八句即成四十八句也即不分別所起處也即十二個是我見餘三十六個是我所見也若分別行緣處并分別所起處者即有四百八句也即眼根處是我者即餘十一處各有三個我所見也即十一個三成三十三也并眼根為我見即成三十四句即眼根一處為頭有三十四句即十個三十四三百四十也更有兩個三十四成六十八也即成四百八句也即十二處互為我我所都有四百八句十八界者若分別行緣界不分別所起界者即有七十二句也即有外道計眼根界是我第二外道云此不是我此眼根界但是我家莊嚴具是我瓔珞第三外道云此亦非瓔珞此眼根界但是我家驅使僮㒒第四外道云亦非僮㒒此眼根界但是我住處是我窟宅也即一個界有四句即十個成四十又八個界各有四句即成三十二即并前成七十二句也若并分別所起界者即有九百三十六句也即一個界為我見即餘七十個界各有三個我所見即十個三成三十更七個三即三七成二十一即成五十一并一個我見即成五十二句即一界為頭有五十二句今十八界互為我我所即十個五十二成五百二十更有八個五十二即成四百一十六并前五百二十成即九百三十六句也此依婆沙雜集第一世第一品說約蘊約處約界等分別可知此上所計我非俱生唯是分別見也問曰如何得知答曰瑜伽五十八說云二十句等薩迦邪見皆見道斷即唯依分別惑不依俱生惑也可知上來有四初辨身見之義二者辨生見之處三辨業用四辨差別四段不同總是第一辨身見訖也自下第二解邊見者分二初標二者正釋且第一標者疏云二邊執見者意云即是斷常二執見也不居中故以見偏故故名邊見也可知二者正釋中分二初辨業用二辨差別且辨業用者疏云謂即於彼隨執斷常障處中行出離為業用者解即於自身執斷執常或執他身為斷常故即障他處中行處中行者即是中道之行也問曰何名中道答曰離斷常故名中道也即如第八識從無始至解脫道已無間斷故即離斷見以第八是有為法四相故離常見若見真如者即離有離無名為中道也以離增益望多真如故名離有又不是體全無故名為離無即遮增益損減二邊故名中道即我法二執俱喪故名真空即名為舜若於空門中有妙有之理體故名為妙有即名舜若多即梵言舜若即名為空若更者即是其性即舜若多此云空性也有此義故名為中道也即將前百法是妙有破惡趣空將後二無我真空破於心外執有即離無邊及離斷常正處中道也若有此斷常二見正障處中行也此處中通漏無漏也又言障出離為業者即出離之行唯是滅道二諦唯無漏也即滅道二諦是出離法有此斷常二見令道諦不生令滅諦不顯以障真無漏行故名障出離為業也問曰處中行與出離行何殊答曰亦有異處中行即寬攝得出離行也若出離之行即狹攝他處中行不盡以出離行即唯無漏若處中行即通漏無漏也此有此二意故所以言障處中行及障出離行也即此斷常二見能障此二行故是邊見之功能即依前我見上便執斷執常可知上來辨業用也第二辨差別者分二初標差別疏云此見差別是也二辨差別者於中分二初辨常見二者從七斷滅論等是斷見也且辨常見者分二初辨前際二者後際且辨前際者論云諸見趣中至四一分常論者且辨四遍常論者言諸見趣者即不一名諸即六十二個見名為諸見也即此邊見六十二見於中攝得四十九個見餘十五個見是邪見攝也即此四十七見中四十個是常見七個是斷見也即有此多見故言諸見者也趣言者即是意趣也或是所趣或是趣況也故名諸見趣也言有執前際者即依過去起分別見故名前際也若依未來起分別見名後際也若依現在起分別見即不定也或名前際是未來前故是未來因名前際也或名後際者是過去之後故或故或是過去果故名後際也且先辨前際者問曰何名四遍常論答曰即是二四八十劫見生死遍言二者是下品外道四者是中品外道八十者是上品外道第四是見生死者即是得天眼通也且第一二十劫者唯下品外道得宿住通見過去二十劫中成住壞空一切有情死此生彼即死時即隱生時顯若世界壞空時即隱成住時即顯即隱顯也即本來是常住法即執此成住壞空生死等為常也第二外道是中品者得宿住通觀見過去四十劫成住壞空一切有情死此生彼便執我皆是常住但有顯隱而已其實本成常住也故知世間有情皆是常住也第三外道是上品者得宿住通觀見過去八十劫成住壞空一切有情死此生彼便執為我皆是常住但是隱顯不同故知皆是常住也第四外道由得上定起得天眼通見諸有情生時死時諸蘊相續彼便執我世間俱常前三外道得上定得宿住通第四外道得天眼所見皆是常也此常見並是見道之惑也問曰此宿住通及天眼通皆是善性如何善性是煩惱中邊見耶答曰正得宿住通天眼正觀一切有情死此生彼時皆是善性非是惑也即後念及緣前念所觀過去之境便起妄執為常者即是邊見亦不相違也此常見亦緣三界境亦此常見是上界繫以是依定後起此見故通上地繫也或是下界常見之分緣上界境者是獨影境問天眼通緣現在如何言前際答曰緣現在境已第六識便執過去亦如現在死此生彼准通境說上來四遍常論訖也次辨四一分常論者問何名一分常等答曰梵餘大種心戲分恚一分也一者是梵餘二者是大種心三者是戲分四者是恚分且第一梵餘者梵即是梵王餘即是梵輔梵子等即火灾壞初禪見後劫成時初時但有梵王一人在前生於初禪更無餘人即梵王作念言願諸有情成生此間與我為伴即作此念已後時有情便生於初禪生於初禪已早見有梵王也便計云我從梵王生也即梵王自言我是生者即諸餘梵子命短即在前死成生外道家即劫引得初禪定得宿住通見梵王猶在便執計云古者梵王是常我等是無常計梵王是常者是計他我起見也即一分是常一分是無常也二者大種心言大種者是四大種即地等四也即四大種是常心是無常也我見地等即常有見諸有情即有生死故知地等是常心是無常也三者戲分者即是欲界諸天等臨死之時即不樂本座便欲得遊戲戲望以境殊勝極自不捨即此時佛然便無常已來生此間人中得通觀見前生臨死時有戲望故便執計云故知戲望是無常不戲望者是常也四恚一分者即欲界諸天臨終之時眷屬離五衰相現即見眷屬違繞新天子故便角眼視生憤恚故拂然便無常即計我云故知憤恚者無常不憤恚者是常也皆是得通天緣便起我計一分常一分無常也即并前四遍常成八個見總是依前際起也問曰前來他一分為常者即是常見也既計自身無常者是何見攝若是斷見何名常見答曰亦是常見也不是斷見但是別境中染慧攝非是五見攝也以不執後世斷故但計前世是常或但是染慧非常斷攝也第二辨後際起我者疏云及計後際有想十六者且於色上作四句者第一外道計云我有色死後生有想天即計生欲色二界有色之處即九地中際却非想及無想二天以是損識之處也即下三無色及色界十七天等也以外道不知有五淨居天又是聖人所居外道行生也即餘處皆是有想之處也即我有色死後生有想天也第二外道計云我無色死後生有想天汝前外道所計皆是我我所計即是即我無色蘊名我無色以執四蘊為我死後得生有想天也第三外道計云我亦有色亦無色死後生有想天即執五蘊皆為我亦有色即計色蘊為我亦無色即計餘四蘊為我死後得生有想天也第四外道計云我非有色非死後得生有想天即遮第三外道也言非有色遮色蘊言非無色遮餘四蘊即是離蘊計我皆死後得生有想天此四見或是定中起或時散位尋伺起也第二於邊上作四句者第一外道計云我有邊故得生有想天若執色為我亦有限量故名有邊或在身中如指節量或緣得及處名有邊或餘四蘊亦有限量所依所緣有分限故皆死後得生有想天也第二外道計云我無邊死後得生有想天若執色為我者即遍一切處以外道緣法界無色不及故色我無邊以不知邊際故名無邊也皆死後得生有想天第三外道計云我亦有邊亦無邊後得生有想天言亦有邊者即是小我是卷也若言無邊者即是大我名舒也即卷時名亦有邊若舒時名亦無邊也即瑜伽論第六云執我隨身或舒或卷其量不定身無量時我亦無量身若小時名亦至小死後得生有想天也第四外道計云我非有邊非無邊死後得生有想天此遮第三計也或是蘊計我可知第三於想上作四句者第一外道計云我有一想死後得生有想天在下三無色也二者我有種種想者死後得生有想天即在欲色界中際無想天也三者我有小想死後得生有想天即計小色為我即如雖冥蟲是也四者我有無量想即是第四禪大身也皆死後得生有想天第四於受上作四句者第一外道計我純樂受死後得生有想天即在第三禪以是樂極成或下二禪亦有樂受即間雜第二外道計云我純有苦受死後得生有想天即在阿鼻地獄受種種苦也第三外道計云我亦有樂亦有苦死後得生有想天亦有苦即在畜生鬼界亦有樂即在欲界人天中第四外道計云我非有苦樂死後得生有想天即是捨受也或即遮第三計此上色上作四句邊上四句受上四句即四四十六皆是有想論也疏云無想八論者即是有色四句有邊四句且有色四句一者我有色死後生無想即執色蘊為我得生無想天即是第四禪無想天是也第二外道計云我無色死後得生無想天即執命根非是色故即得生無想天第三外道計云我亦有色亦無色死後得生無想天即執五蘊為我及命根也第四外道計云我非有色非無色死後得生無想天即遮第三計即是離蘊計我也此是色上作四句也第二於有邊上作四句者第一外道計云我有邊死後得生無想天即執色為我時其量狹小名有邊或卷名有邊以知限分故即死後得生無想天第二計云我無邊死後得生無想天即執色為我時遍一切處即舒不可知故名無邊也第三計云我亦有邊亦無邊死後得生無想天即執無色卷舒也若卷時亦有邊若舒時亦無邊也皆死後得生無想天第四外道計云我非有邊非無邊死後得生無想天即非有邊者即傍界非無邊者即上下有限故亦是遮第三句可知上來是無想八論也疏云俱非八論者即非非想名俱非也即有色四句有邊四句也且有色等四句者一者我有色死後得生非想非非想天即執色為我見諸有情入非想非非想不明了即作此執也此是散位妄執起非是得定者也二者我無色死後得生非想非非想天即執四蘊為我入非想非非想定不明了作如是執也三者我亦有色亦無色死後得生非想非非想天即蘊計也五蘊全第四外道云我非有色非無色死後得生非想非非想天遮第三句也是離蘊也第二於邊上作四句者一者我有邊死後得生非想非非想天可思二者我無邊死後得生非想非非想天思之三者我亦有邊亦無邊死後得生非想非非想天四者我非有邊非無邊者遮第三句也此是俱非八論也上來總是辨常見也次下辨斷見者疏云七斷滅論等分別起攝者一者我有遮四大所造為性者即欲界人中死後斷滅即畢竟不生名為斷滅現在身亦得生者即死後更不生二者我於欲界天中死後斷滅三者我於色界死後斷滅四者我於空處死後斷滅五者於識無邊處死後斷滅六者我於無所有處死後斷滅七者我非想非非想處死後斷滅此七個斷滅亦是後際也上來有二初辨常見二辨斷見總是辨差別上來有二初標差別二正斷釋二文不同總是正辨差別上來有二初辨業用二辨差別兩車不同總是第二正釋上來有二初標二釋二文不同第二辨邊見也自下第三辨邪見者於中分二初標疏云三邪見者是也可知第二正釋中分三初總辨邪見二者從此見差別至非道為道是辨差別也三總結者疏云如是等皆邪見攝是也三段不同且初第一總辨邪見者問曰何名邪見答曰謂謗因果作用實事且言謗因果者先辨謗無因者對法論云謗無布施之福因謗無詞記亦無妙行即謗無無漏妙行亦無惡因即煞生等亦無罪也即所行妙行亦無福因何以知之以有人布施已後却得貧窮果報故知無布施之福因又行惡行已後得毗沙門第三子故故知無惡因也此上皆謗無因也謗無果者即無三乘聖果亦無三惡道之果以因不招果無有布施得無漏等果言謗無作用者謗父母以今是父母來世却與我作男女來故知不定是父母故知世間無實父母此外道現世父母亦不信也亦無中有作生有情傳識之作用又謗無胎藏之用也身也謗無實事者即謗無菩提涅槃阿羅漢等事即三乘果皆不信有即總名檢無因果名為邪見疏云及非四見至名義遍故者意云此邪見寬但是餘四見攝不盡者皆是邪見攝也如似增上緣餘三緣攝不盡者皆是增上緣攝也今邪見亦爾即此邪見是損減見者餘四見多是增益見也以謗因果作用實事名為損減也下無因論亦是損減也以邪見攝也問曰如何名名義遍答曰但是餘四見不攝者餘一切不正見皆是邪見攝名名義遍也上來總解邪見也第二辨差別者於中分二初辨前際起二者辨後際起者且辨前際起者疏云此見差別至四不死矯亂者言二無因論者一者從無想天沒來生此間得宿住通不能憶彼出心已前修定之時以無想天壽五百劫此極上品外道得宿住通觀過去八十劫事即不能知此無想天已前修因之時便起邪見皆是無因而生也故知我等亦無因而生也即執一切有情皆是無因而有二者由尋伺不憶前身所作事便執云一切皆是無因而有是自然生如禽獸等誰能盡山源誰人造作故知皆自然生一切皆是無因而有也可知疏云四有邊者第一外道計云上至第四禪下至無間地獄於中執我遍滿故作念云我有邊際故名為有邊也以有限量故第二外道計云我無邊即遍滿十方思不及故名無邊即能憶傍世界無邊際故即我無邊也第三外道計云我亦有邊亦無邊者即計上下遍滿有遍際名亦有邊計傍世界思不及故名亦無邊也第四外道計云成劫時我即非無邊若壞劫時我即非有邊以成劫時有地獄等名非無邊若壞劫時地獄亦無名非有邊疏云四不死矯亂者一者怖無知二者行諂曲三者懷恐怖四者怖愚贛問曰何名四不死答曰以有不死天以長壽故即外道執為常住不死即無想天是不死天也即外道自計云不死無亂今佛法毀責不死者矯亂且第一怖無知者即外道自言我不知善不善不知不死天行相也若有人問我不死天如何即不應定答我若定答者即恐他監我無知也即此不死天祕密義不應說之若定答定答者即恐人輕毀我所以不定答故名怖無知也二者行諂曲者若有人問我不死天如何我便讚嘆汝作此問者大好諸人不解作此問即汝見解者深以讚彼人彼人便不敢重問也三者懷恐怖者若有人來問我不死天如何我實不知便不答默然而坐即前人不測淺深也讚言不可思議也四者怖愚贛者有人來問我不死天如何我應反問云汝問我不死天者即汝意如何彼人言將謂不死天是長生也即外道便印順云成如所言即不死天是長生也即此外道專修正行有人來問應須反問便印順也上來多段總是辨前際也次辨後際者疏云及計後際五現涅槃者一者見現在受人天五欲樂者便計為涅槃即受五欲樂時便得涅槃樂也二者即厭彼五欲樂即得初禪以得定故引得輕安故便計為涅槃也三者即厭初禪尋伺得第二定以離尋伺故便為涅槃也四者即厭諸欲及尋伺喜受等得第三定以計為涅槃也五者即厭諸尋伺喜樂受及出入息等皆厭得第四定以為涅槃也即此十五個見并前邊見有四十七即成六十二見也應科此疏文作迷諦行相下四諦下辨邪見且辨苦諦下邪見者疏云或計自在世主至常恆不易者即自在梵王帝釋等皆是三界苦果總名為苦諦若執此為常者苦諦下邪見者疏云或計自在世主者即計大自在天為常住也即自在天名為世主也言釋者是帝釋梵即是梵王也即計此皆為常住名為計他我也以外道執他為常者即名為計他我也餘及物類者即是時方本際是亦是能生也一切有情是無常名所生也言時者即春夏秋冬名時也或一月時也或一日時或剎那時即一切有情皆從時中生也住亦依時中住死亦依時中死也即一切有情生老死皆不離時若生亦在時中死亦在時中住亦在時中即時是常住有情等是無常也故名常恆不易也言方者即東西南北四維上下皆是方即一切萬物皆從他方中而生也即方是常住一切萬物是無常名常恆不易也言本際者即未有世界時有一槃古於中有一物名為安荼安荼破已即清氣上凝為天濁氣下為地中間清濁氣成有情也天即日高一尺地即日厚一尺也若中間清氣稟著者即聰明利智若稟著安荼濁氣者即暗昧即此時方本際是常一切物是無常也故言及餘物類常恆不易也上來第一辨苦諦下邪見也第二辨集諦下邪見者疏云或計自在等是一切物因者言等者即等取前來釋梵等也問曰如何是一切物因答曰西方有圍陀論師云謂劫成時有一大人出名曰那羅延那羅延䐡中生一大蓮華蓮華中生得梵天從梵天口中生得婆羅門從梵天兩肩上生得剎帝利從梵天兩䏶生得毗舍從梵天兩足下生得首陀即此四姓中從口中生者為最上姓從足下生者即下也即知一切有情皆從梵天生也即梵天等是一切物因也言自在天者即八法所成一者虗空為頭二者大地為身三者山為糞四者江海為尿五者雷聲是淩氣一切草木為毛六者一切有情是腹中蟲七者風為命根八者一切罪福是自在天業力又說自在天有三身一者是法身即十方虗空是也二者報身即在第四禪中住身長一萬六千由旬三化身者住在南海末賴耶山中有八個手亦是佛化身也即有外道計自在天為常便於五天中覓乃至於南海覓即此自在天即為外道說法說法已便語彼外道云我不是自在天即於中印土誓多林中釋迦牟尼是大自在天是汝本師此即方便破外道即此外道計自在天釋梵等是一切物因也即不了諸法從自因緣生也今既計自在天是一切因者即是邪見收也此是集諦下邪見也疏云或有橫計諸耶解脫者即滅諦下邪見也謂執無想天及非想天為解脫涅槃也即編掾臥棘五熱炙身受苦若盡即得解脫名諸耶解脫也此是滅諦下邪見也疏云或有妄執非道為道者即是道諦下邪見即持雞狗等戒皆是非道妄計為道也或殺馬祭天等皆是非道計為道也此是道諦下邪見也上來多段不同總是第二辨差別也次從第三總結者疏云諸如是等皆邪見也上來有三初總辨邪見二者辨差別三者總結三段不同總是正釋上來有二初標二釋二文不同總是第三辨邪見訖也自下第四辨見取者分二初標二正釋且標者疏云四見取者是也可知第二正釋中分三初解見字二解取字三解業用且第一解見字者疏云謂於諸見及所依蘊者解云即前三種見名為諸見也言所依蘊者即是所依身也即是見所緣境也亦是見眷屬也下解取字者疏云執為最勝能得清淨者意云即此見取具此二因也一者執自見為勝他見為劣名執為最勝也二者能得清淨者即我作此見即得常樂我淨也故名能得清淨若准佛法說即此外道計為常樂我淨者皆是見取以是無常無樂等四妄為常樂等者即是見取所攝也今有此二因方成見取也若闕一義即見取義不成也第三業用者疏云一切鬪諍所依為業者即一切外道各各執自見為是者即諸外道因此便有鬪諍而生以執自是見為勝他見為劣即諸外道便計云我見勝他見劣互執者便有鬪諍也故疏云一切鬪諍所依為業也上來有三初辨見字二辨取字三辨見業用三段不同總是正釋上來有二初標次釋兩段不同總是第四辨見取訖也自下第五辨戒禁取者分二初正辨戒禁取二從然有處計說下是會釋違文也且第一正辨戒取者於中分二初標二正釋且初標者疏云五戒禁取者是標可知第二正釋中分三初辨戒禁二字二辨取字三辨業用三文不同且第一解戒禁二字者疏云謂於隨順諸見戒禁及所依蘊者解云言謂於隨順者即隨順前來見是能豫即執自戒為勝及戒眷屬為所緣境也此中但取能順禁為所緣境不取所順三見為所緣境名為戒禁取以見是見取攝今但執所持戒為禁戒取也堅持不犯名禁也二解取字者疏云執為最勝能得清淨者解云即執自所持雞狗戒為最勝他戒為劣也二又持此戒即得常樂我淨若准佛法訶之名為四倒也即執持此戒即得常樂我淨者名為能得清淨也此是辨取字也第三解業用者疏云無利勤苦所依為業者意云即此緣掾臥棘五熱炙身一日食一麻一麥持雞戒等即雖是對苦都無利益却招三惡趣果故名無利勤苦所依為業也上來有三總是正釋上來有二初標二釋二文不同總是第一正辨戒禁取也自下第二會釋違文者分二初正會違文二者從不爾如何下是資難也且第一正會文者外人難云若言見取執為最勝能得清淨名見取又言戒取亦有最勝能得清淨者即何故有聖教云執為最勝名為見取執能得清淨名戒取耶下會文者先牒問疏答云然有處說至戒取者是也二者正會者疏云是影略說或隨轉理門意云此正會中有二初是影略而說二者是隨轉理門也且第一影略而說者即諸論中說言執為最勝名見取者即影取執能得清淨故略不說也又言說能得清淨名為戒取者即影取執為最勝亦在其中即諸論互影略而說故知見戒二取皆有最勝能得清淨也是故疏總言是影略說也問曰若爾者即見戒二取何別答曰所執所依見及眷屬最勝及清淨故總名見取也若執戒及戒眷屬為最勝及清淨者名為戒取也若言執見二眷屬最勝無清淨者亦非見取若執清淨無最勝者亦非戒取也即執自見時有此二義方名見取也若戒禁時有此二義方成戒取也二云隨轉理門者意云彼諸論言但執最勝名見取但執能得清淨名戒取者即是隨小乘薩婆多宗說也以薩婆多師計最勝名見取能得清淨名戒取也但是就小乘宗說非是究竟說故名隨轉理門言隨隨遂也轉者說也理者道理門者二乘門也即將就二乘道理說也問曰諸論何不但依正義說二取各具二義何故略無略無者有何意取耶答曰欲令業者知見解生故略說也問曰諸論言執為最勝名見取執能得清淨名戒取者是諸論真實而說不是影略亦非隨轉門者亦有何過下覓答者疏云不爾如何至非二取攝者意云汝外人若不許是影略說者即應瑜伽五十八迷四諦中如迷滅諦下非滅計滅非勝計勝應是見取耶以有計為最勝故又道諦下計云非道計道亦得清淨應是戒取以有清淨非最勝故若不爾者故知是影略隨轉門說也以非滅計滅非勝計勝以無清淨故但名取見即非見取攝也道諦下計非道計道即但有清淨無最勝者亦是取見即非戒取攝也今言見取二取各各皆有能得清淨皆有執為最勝即各具二義方名見取戒取也故知諸論說見取但有最勝者明知不名邪見但名見取者明知亦影取能得清淨能得清淨若無者即不名見取但名邪見也又說戒取唯有能得清淨無最勝者亦是影取最勝之義若不爾者即名邪見非是二取耶若互𨷂一者即是邪見非二取也是二取者即各各具最勝清淨二義也故知所引論文是影略而說也亦不相違也亦是隨理門說也若言實說見取唯有最勝無清淨者即是邪見見取義不成也夫為見取必須有最勝及清淨方名見取若戒取者亦有得清淨及最勝有此二義方名戒取若𨷂一者但名邪見也故知諸論說見戒二取各有一義者必是影略而說也可知上來總是會釋違文也上來有二初辨戒取二者會釋違文二文不同辨戒取了也上來有五見總是辨差別也上來有二初總辨惡見二者辨差別二文不同總是正釋上來有二初問二正釋二文不同總是第六辨惡見訖也上來六煩惱不同總是隨標別列上來有二初總標舉數二隨標別列二文不同總是第四辨根本煩惱訖也故疏云上來辨根本煩惱訖也可知自下第五辨隨煩惱者疏云第五文也分二至文二同前者一者總標舉數二者隨標別列二文不同且初第一總舉數論云隨煩惱二十者意云隨煩惱是總標也二十者舉數也可知自下第二隨標別列者疏云述曰第二文也即有兩行偈總攝二十隨煩惱盡即唯識偈云隨煩惱謂忿恨䨱惱嫉慳誑諂與害憍無慙及無愧掉舉與昏沉不信并懈怠放逸及失念散亂不正知問曰此是二十惑如何名隨煩惱答曰有其二義名隨煩惱也一者是煩惱分位差別假建立故名隨煩惱也問曰若是忿等五及大隨後三是煩惱分位假建立者即名隨若是中隨二大隨五是實有者應非隨煩惱攝答曰更有第二義故名為隨煩惱也即是煩惱之等流性故體雖是實以是他根本等流故名為隨煩惱即是根本同時等流果也故名隨煩惱也此合前總標舉數中解也可知第二隨標別列者分二初總辨三位隨煩惱二者別辨三位隨惑且第一總辨者疏云分三初明小隨各別起故至遍染心故者解云問曰何名為小隨答曰以行相極利一一別起名為小隨也即隨根本後一別起定不俱生即忿起時恨不起等也問曰何名為中隨答曰即能遍不善心故即有不善心時便有中隨也以不遍染也以染即寬不善即狹即此二數得俱起也不同小隨別起故問曰如何名大隨煩惱答曰後明大隨遍染心故即一切染心中皆起大隨也即此大隨煩惱最寬遍前小隨中隨小隨中隨即不遍他大隨即有染心處即有大隨八也此八隨惑得俱生也即遍一切有䨱不善故名大隨若不遍有䨱但遍不善即名中隨也若是不善亦不遍者名為小隨以各各別起故有此多義小隨中隨大隨各各別也此第一總辨三隨惑時第二別辨三位隨惑者三段不同且第一辨小隨者疏云此即初也分十如文且第一辨忿者分二初標二正釋且初標者疏云一忿者是標也可知第二正釋者分二初略辨體業二重釋前文且第一略辨體業分二初且出體二辨業用且辨體者疏云依對現前不饒益境憤發為性者解云依對現前不饒益境者即是現在可見聞事或是有情或是他見即緣事生五蘊論說現不饒益事故非無漏法也即是現違緣事即忿行相淺不深取故若對現無漏法此即嗔分位立也以憤發是嗔行故可知第二辨業用者疏能障不忿執杖為業者意云不忿即是無嗔分位也若忿起時正障不忿故是一個作用也第二更能執杖故是兩重業用也即將杖陵治前人是身業也下第二重業用者疏云謂懷忿者至身表業故者意云謂懷忿者多發暴惡即重解前能障不忿也言身表業者即重解前執杖也言執者是手執也杖謂器杖也即惡人粗猛故即依多分說言執杖為業也即手執杖時是身表業也且依勝處說其實亦有惡言毀之有語表業也可知第二解恨者分二初標者疏云二恨者可知第二正釋者分二初略辨體業二者重釋業用且第一略釋體業者且先出體性者疏云由忿為先至結怨為性者解云先有忿故即陵他不得便起其恨即懷惡不捨也即我與怨家九十未伏也便結怨故是恨之性也二辨業用者有兩個業用疏云能慞不恨是一個業用熱惱是兩個業也若有不恨起時即是善性若恨起即正障不恨是恨之別業用也以恨多時便生熱惱也若依顯揚說有五業者一能障不恨二者能障菩提資養故三者趣惡道四者損自他五者增長於限也即前忿亦有五業也即此恨行相深取於忿也可知第二重釋業用者疏云結恨者不能含忍恆熱惱故意云即結恨人多時又不能忍即便熱惱故或熱惱極便面門出熱血等可知第三解惱者分二初標疏云三惱者是標可知第二正釋者分二初略釋體業二者重釋前文且第一略釋體業者且先出體者疏云忿恨為先至恨戾為性者解云由先有忿恨故便極惱即前來執杖陵他怨家未得便以恨多時轉增故名惱也即思量得怨家便暴熱如火相似便恨戾前人也可知第二辨業用者兩個業用也疏云能障不惱是一個業用䖧螫為業是兩個業用也若有惱時即正障善法不惱不生也以敵相翻是別業用又能䖧螫自他故此䖧螫二字應兩用也若依顯揚論說此惱亦有五業也可知第二重廣前文者先重解其體者疏云謂追往惡至心便恨戾者意云若思憶昔時怨家便起恨戾戾是朧戾二重廣業用者疏云多發囂暴至䖧螫他故者意云對法顯揚五蘊皆言發凶險鄙惡粗弊之言也又以尤䖧於他人等也即有惱亦發身業也言暴者是卒暴等也上來有二初略釋體業二者廣解體業二文不同總是正釋上來有二初標二正釋兩段不同總是解惱從結前三皆依嗔分者疏云此上三種嗔一分為體也可知自下第四解䨱者分二初標次正釋初標者疏云四䨱者是標也可知第二正釋者分三初略釋體性二者從謂䨱罪者至不安穩故是廣解業也三者從貪癡下是二師解釋三段不同且第一略釋體中且先辨性者疏者疏云於自他罪至隱藏為性者以自造作諸罪恐他人知他人知者便失財利今恐失財利名聞故即身中有罪便隱不懺也自言清淨故故言恐失利譽隱為性也第二辨業用者疏云能障不䨱悔惱為業者解云此亦是兩重業用也即此䨱正障不䨱是別業用也以䨱此罪多時便自悔恨言苦哉苦哉也我謂名利䨱此罪不懺便生悔恨也上來略釋體業也第二廣解業用者疏云謂䨱罪者至不安穩故者解云即一生造罪不懺又不教他人知後臨死時思憶昔日我造此罪我今命終必須受苦果也便悔云我昔日不懺此罪既我有罪應入地獄作是思惟已便起悔惱不安穩也可知自下第三二師解釋者今疏中是第二師義也第一師義者論云有義此䨱癡一分攝論唯說此癡一分故不懼當苦䨱自罪故意云以是癡一分故即迷暗前境即不懼當苦所以䨱罪唯是癡分攝也第二師云此䨱是貪癡分攝即疏云貪癡一分為體至恐失利譽䨱自罪故者若是不懼當苦即是癡一分攝所以䨱罪若是貪一分攝者以貪他財利名聞等即恐失利譽亦䨱罪也亦是貪一分攝即前言不懼當苦者是癡分也後言恐失利譽者是貪分故可知上來有三初略辨體業二者廣前業用三者二師解釋三文不同總是正釋上來有二初標次釋二文不同總是第四辨䨱訖也自下第五辨誑者分二初標二正釋且初標者疏云五誑者是也可知二正釋者於中分二初略釋體業二者廣釋前文且第一略釋體業中先辨體性者問曰此誑體性如何答曰疏云謂誑利譽至詭詐為性者解云即為名利故便作誑誑他一切人我解佛法事業也即自身中實元德業謂求他利故便矯誑他憍者不實之義言詭詐者即是憍設虗僞之稱即謂自身無德詐僞有德故名詭詐也即是詐現有德也謂求利譽故次辨業用者即有兩重業用也疏云能障不誑是一重耶命為業是兩重業用也若有誑者即不誑不起也以相違故以能障不誑是別業用也言耶命為業者以誑他人得他財利者皆是不正命故名耶也即耶命食等有人解云邪見於意業同轉名耶命也今言耶命者以誑他矯設方便作詐僞言取他財帛名耶命亦名不淨財若依顯揚亦有五業也上來略釋體業也業二重廣前文者分二初重廣前體性二者廣前業用三者顯所依疏云憍誑者至不實者即出體業耶命事故此釋業用也貪癡一分為體者是顯所依也三段不同且初第一辨體性者疏云謂憍誑至不實者意云謂求財帛故便憍誑他人心懷非意異謀之計數也即便詐現精進之儀行此誑事也多現不實以誑他故次辨業用者疏云耶命事故以誑他得財帛者皆是不正命名為耶命事也以作種種謀計取他財帛故所得之物皆不淨物也故名耶命事知第三顯所依者疏云貪癡一分為體也即誑他人求他財故是貪分也以作方計誑他故作異謀者是癡分攝即對法云貪癡二法與誑為所依者與唯識同也可知上來三假總是廣解前文上來有二初略辨體業二廣前文總是正釋上來初標次釋總是第五辨誑訖也自下第六辨諂者分二初標二釋且初標者疏云六諂者標也可知第二正釋者分三初略辨體業二者從謂諂者至正教誨故是廣前體業也三者顯所依故疏云貪癡一分為體是也三段不同且第一略釋體業中先辨體性者疏云謂誷昌他至險曲為性者解云謂諂故便誷昌前人即種種言語矯設方便掩搨前人言險曲者撿者即不定名曲者不直之義為誷他故即論云欺彼人故或陵誷於他也如羅網網於飛時蓋却誷可思之此是體也二辨業用者有兩個業也疏云能障不諂是一個業正教誨故是兩個業用也即此諂與不諂敵相違若諂起時正障不諂也言教誨為業即能障他正教誨也可知第二廣前體業者旦廣體者疏云謂諂曲者至為取他意者解云謂誷昌他故便曲取他意或煩他情故即意望他者好也以求財故言語曲順他人故便矯設方便遂他意取故言為取他意也或順己所求故即曲順時宜也可知次重廣前用者疏云或藏己失至正教誨故者解云謂此人行諂曲故即不堪任為師友也亦不堪任為朋友也以此人貪名利行於諂故且非正教誨以行諂即非正道理故非正教誨也可知第三顯所依者疏云貪一分為體也可知上來有三初略辨體業辨體業二顯所依三段不同總是正釋上來有二初標次正釋二文不同總是第六辨諂訖也自下第七辨矯者分二初標次正釋且初標者疏云之矯者是也可知第二正釋中分三初略出體業二者廣前業用三者顯所依旦第一略辨體業中且先出體性者疏云於自盛事至醉傲為性者解云言自盛事者或有官位或財帛或身品端正即於世間有興盛之事便心生恃賴高舉不見前人此是醉傲也如醉人相似也問曰與慢何別答曰矯由染自法慢者陵他對法云隨策利之事謂長壽年等亦有矯舉也可如第二辨業用者有兩個業用也疏云能障不矯是一個業用依染為業是兩個業用也若矯起時與不矯敵體言能障不矯也言染依為業者即有此矯者染為所依也即因此有染法生故名染依為業也可知第二廣解業用者疏云謂矯醉者生長一切染法故意云即有此矯者即一切雜染皆得生長以於自盛事染生染著故即耽醉憍逸故也即諸染因此而生故言生長一切雜染法故也第三顯所依者疏云貪癡一分為體也可知上來三初略出體業二廣前業用三顯所依三文不同總是正釋上來有二初標二正釋兩段不同總是第七辨矯訖也自下第八辨害者分二初標次釋且初標者疏云八害者是也可知第二正釋中分三初略釋體業二者廣解業用三者顯所依今且第一略辨體業中先辨體性者疏云於諸有情心悲無愍損惱為性者解云以有害故即於有損惱故故名無悲愍也若是不害者即是悲攝今言害者即無悲愍也以損惱故即瑜伽五十於滅道諦亦起損害即此害亦緣無漏法生也此約俱此害說即是修道中修所起害也即通小乘亦有此唯約有情說為正義也第二辨業用者有兩個業用也疏云能障不害是一個也逼惱他故即是兩個業用也即此害起時即正障悲悲無量量即是不害也以敵體相違故既有於害便逼惱有情故無悲愍也即與不害相翻而說也若依顯揚說此害亦有五業也可知第二廣解業用者疏云謂有害者逼惱他故解云即此害能損惱有情支節也令他不安樂故名逼惱也可知第三顯所依者疏云嗔一分為體以不全即斷命故但有一分損支節故是嗔分為體也上來有三段總是正釋上來有二二釋二文不同總是第八解害訖也自下第九辨嫉者分二初標次正釋且標者疏云九嫉者是也第二正釋者分三初略辨體業二者廣辨體業三者顯所依且第一略辨體業者先辨體性疏云殉自名利至妬忌為性者解云此言殉者是人邊作者是求也訪也若是半死邊作者是即是死也即求自名利故便不耐他榮也即見他人有榮盛富貴安樂或有出世榮事者即是所從得勝功德法即通有為無為也於此上生嫉妬也若是天摩等即於無漏法起嫉忌故或世人於名利上妬他人故即心妬忌為嫉體性問曰何名妬何名嫉答曰緣他正法名嫉緣他榮樂稱妬玉篇云害賢名嫉害色妬可知辨業用者疏云能障不嫉憂戚為亦有兩重用也若有不嫉即是喜無量也若妬死時正障喜無量故名正障不嫉也以嫉即事事不如他便生憂戚也顯揚論云能障也即顯揚第四四無量中喜無量是不嫉是為體也可知第二廣解體業者先廣前體者疏云謂嫉妬者聞見他榮有二一者見他人有三學士業生憂名嫉二者見他榮樂心不欲名妬玉篇云害賢曰嫉害色曰妬廣前業用者疏云深壞憂戚不安穩故意云既憂戚已即自不安穩也可知第三顯所依者疏云嗔一分為體可知自下第十辨慳者分二初標者疏云十慳者是也二正釋者分三略辨體業二者廣辨體業三者顯所依且第一略辨體業先出體性者疏云耽著財法至祕慳為性意云財法者即妻盛事財帛等名財也若是教理行果皆名即於財法上不能捨故名慳言祕者澀也藏者惜也以耽著故即便祕慳是慳體性也言用者疏云能障不慳鄙畜為業者解云若有不慳者即施施與一切人物也名為布施今既有慳即正障於施行也故名能障不慳也言鄙畜者鄙者惡也即鄙惡故畜者畜積集積集異名也即名鄙畜為業也可知第二廣解體業者先廣前體性者疏云謂慳吝者心多祕澀解云以有慳故便祕澀不布施也即鄙吝慳澀不能惠捨故名慳也次重廣業用者疏云畜積財法不能惠捨也第三顯所依者疏云貪一分為體也若實論說有五種慳一住處慳二家慳三施慳四稱讚慳五法慳且住處慳者於己住處生慳念故言我獨住令我自在不用餘人此有五種一於未來諸比丘不欲令來二於已來諸善比丘責恚故三者欲令早去四藏僧施物不欲與之僧施生我所心計為恩德此人於彼苦有法中不能捨何況自身所有之物此人於解脫終無有也第二家慳者於往還家生燈想故言我於此家常獨入出不用餘人設有餘人者即令我最勝也亦有五種一白衣有不吉事與彼同憂二彼有利益與同喜三喜白衣有勝事四斷彼餘人令不得施也五生於彼家為廁中鬼也第三施慳者於他物生慳吝想令我於此獨得施物餘人不得設令與之而復過於我此亦有五一常乏資生二令施主不得福三令受者不得財利四毀訾善人五常憂惱當生地獄等設生人中貧窮下賤等也第四稱讚慳者於他稱讚生慳吝獨讚我莫讚餘人設讚莫勝於我亦有五餘人心生憂動二毀訾善人三自高卑他四名五於未來百千世中無有淨心第五法正法中生慳悕想令我獨知十二分教莫令他設令他知莫勝於我又自知義祕而不說過有所生常瞋二常愚癡三多怨四退失聖胎者智惠不生王諸佛怨賊障法眼故六善人十無惡不造斷佛種故上來小隨訖也自下第二中隨二數者文分為二初解無慙二解無愧今且別辨無慚者分二初標次正釋且初標者疏云慙者是標也可知第二正釋中分二初略辨體業者廣辨體業且略辨體業中先出體者疏云不自法輕拒賢善為性者解云此無慙緣自法生也自即自身法即自身中善法也即不𮨇自身善法故遂輕拒賢善人及法也此出體也第用者此有兩個業用疏云能障礙慚是一個是別業用也生長惡行是通業用也以與愧長惡行故所以名通業用且別業用者若有無慚時正與慚相違以正對慚與無慚故是別業也以法不能障他慚故唯有無慚能障礙也若依顯揚論無慚有其五業一者能障礙慚二者能障菩提深三者損自他四者趣惡道五者增長無慚故此能障礙慚是顯揚五業中第一業也下言生者是即餘四業也可知上來辨體業也第二廣辨體業中先出體者疏云為於自法無所𮨇者輕賢善者解云即不𮨇戀自身中疏勝法故輕賢人拒善法也可知第二重廣前業者疏云不恥過惡能障礙慚生長諸惡行故意云即惡事亦不著恥人也此是通相也非前相別相者即能障礙慚是別相也既若有者即諸惡行皆得生長也以無慚是不善可知上來有二初略辨體業二廣辨體業文不同總是正釋上來有二初標次釋總是第一辨無慚訖也自下第二辨無愧者分二初標疏云無愧者是也可知第二正釋中分三初略解體業二者廣重解體業三者二師解釋且第一略辨體業中先出體者疏云不𮨇世間崇重暴惡為性者解云世間者即緣他法也即有此無愧故便不𮨇世間人訶責也亦不𮨇他刑戮故所以崇重暴惡之人也即崇重惡法也言暴者即卒暴之人也惡即一惡法也即不𮨇世間訶猒故所以崇重惡法也是無愧之體性也辨業用者有兩個一者別業用二者通業用且別業用者疏云能障礙愧業用也即唯有無愧獨能障礙愧餘法不能他起故名別業用若通業用者疏云生長惡行者是也以無慚亦能生長惡行以共有故名通業用也若依顯揚論說無愧亦有五業一者能障礙愧二者能障菩提涅槃三者損自他四者趣惡道五者增長無愧也此疏中言能障礙愧是彼第一業也言生長惡行者是餘四業也可知第二廣重釋體業者先正出體者疏云謂於世間無所𮨇者崇重暴惡者意云即不𮨇世間訶猒亦不𮨇世間刑戮故便作諸不善事崇重常行不善之人也可知次重辨業用者疏云不恥過罪能障礙愧生長諸惡行故意云即作諸亦不羞恥此不恥過罪是通相也若別相障礙愧是別相也既有無愧者從此一切惡行皆悉得生也上來第二廣解體用也自下第三二師解釋者亦是會違文也且第一古師問曰此不恥過惡為是無慚別相為是通相第二師答疏云不恥過惡是二通相也意云此不恥過惡是無慚無愧之通相也以共有故古師云若言通相者如何諸聖教中說不恥過惡是無慙無愧之別相即是對法文也下第二師有三段一者會教二者難古師三者解行相且第一會教者汝古師言諸聖教中說不恥過惡是二別相者疏云會了故諸聖假說為體也意云即約無慙無愧皆有不恥過惡故即假名為別相也理實是通相也何以即無慙以自法輕拒賢善為別相無愧即以不𮨇世即重暴惡為別相也即非取不恥為別相也處說取不恥為別相者但是假說非實說也故諸聖教假說也可知第二難古師於中有四難一者無差別難二者不俱生難三者非實有難四者不遍惡難且第一體無差別難者汝若言不恥過惡是二別相者即無慙無愧俱以不恥為體者即應無慙即無愧體即應是無慙也以一種是不恥故即應二法體無差別也論云若執不恥為二別相者即應此二體無差別也即應苦樂受亦應同體何以以苦樂二受但以領納故既樂一種領納即應苦受體即是樂受耶既若逼迫適悅二體別相者即此無慙無愧亦爾量云無慙無愧是有法應別有自體性宗中法因云俱有不恥過惡故同喻如苦樂二受苦樂俱有領納故即苦樂二受各有別體此愧皆皆有不恥故亦如二受各各有別體也若業二受俱有領納者師應二受者即應苦受是樂也若爾者即苦樂有何差別也既若二俱有領納領納是二受通相於中苦受即逼迫樂受即適悅即二受各各體別今無慙無愧皆有不恥過惡者明知亦是此通相也第二不俱生難者亦如苦樂二受以二受俱以領納故即苦樂受不俱起也若有苦受時定無樂受也以苦樂相違故今既無慙無愧同不恥過惡者即應不俱生也以同是恥相故若令無慙無愧俱起者明知二法別有自相非不恥等為別相也古師救云我雖以不恥為二別相亦同時起也即所緣境不同故所同起即無愧緣世間力無慙對他說即緣以自他境不同故亦得同時起也由此實有難也若汝古師云所緣不同即無慚法力對世間力有異故說同時起說無愧緣世間自法力亦境不同所以同時者即是相待而也以待自他立有差別即應無慙無愧體無實也如長短等量云無慙無愧是有法應非定有故宗因云相待立故同喻如長短等可知古師又救云我不相待說但前後起亦得是實有也由此有第四不遍惡難汝古師若言前後起者即無慙無愧不遍惡心也以有無慙之時無無愧故即互不遍何名中隨遍不善耶上來四難總是第二難古師也自下第三解行相者即古師云若言不恥過總是通相者即未審別相如何論主答云言別相者即無慙以不𮨇自法輕拒賢善為愧即不𮨇世間崇重暴惡為性是別相若爾者亦不遍惡也若有善境至時即起便輕拒同時若無惡境至如何亦有無崇重耶答曰疏云不善心時隨緣何境至無有起失者意云但有一善境至時皆起得無慙也若於自法力輕拒賢善時畢有崇重暴義也若不𮨇世間崇重暴惡之時早有輕善之義也即正崇重暴惡之時即是輕拒善賢善之時無本是崇重暴惡也不必事有二憶一時至方起無慙無愧但隨有一境至即起得無慙無愧也疏云故此二種但遍惡心緣不異無別起生也問曰此無慙無愧二法於六釋中如何相攝答曰疏云此上二隨並無六釋也可知上來有二初別辨中隨二者二師解釋會文不同總是第二辨中隨二數訖也自下第三辨大隨者疏云分八如文也後七未至今且第十三辨不信者分二初標次正釋且初標者疏云十三不信是也可知第二正釋中分三初略辨體業二有兩釋前文三者從不信三相下是染淨相翻也三不同且第一略辨體業中先正出體者疏實德能不思樂欲心穢為性者解云實三是不信之境也不忍樂欲是不信之因即於實德能上不忍不樂不欲也心穢者是不體性也即翻信中深忍樂欲心淨為性也故不忍樂欲心穢為性故次辨業用者疏云能障淨隨依為業者解云若有不信起時即正與信相違故令信不生也言隨依為業者即此不信與為所依也即有懶隋故即是懈怠非精有不信為所依故便懶隋也與懶隋為是不信作用也若依顯揚論說不信亦有五能障淨信二者能障菩提涅槃三者損自他四者趣惡道五者增長不信者此略辨體業也第解前文者疏云謂不信者多懈怠故意云若信即有懈怠以與解怠為所依故以懈怠即墮也既若不信佛法便行惡事起諸不善懈怠故云多懈怠故可知第三染淨相翻者不信三相翻信應知者意云言不信三相者不信實有謂於諸法實事理中不信忍即不忍者非勝解也即與疑品相應也或於不事印忍者是不信之果即此不信於四諦理事皆不信不忍也二者不信有德謂於三寶淨德中不信樂故三者不信有能理於世善不信有力能得能成不信諸善不故即由有不信於實德能不忍樂欲即翻信也可知問曰於六釋中何釋如何相攝答曰云此無六釋也不可言不即是信等上來有三一者辨體業二重釋前文三者染淨相翻三文不同是正釋上來有二初標次釋兩段不同總是辨不也自下第十四辨懈怠者分二初標二正釋且初第一標者疏云十四懈怠者是標也第釋中分四初略辨體業二者有兩句即重釋前文也三者從於諸染事至無信不信者通外難也四者攝歸六釋且第一略辨體業先正出體性者疏云於善惡品修斷事中懶墮為性者解云於善品修時亦懶隋於即斷時亦懶墮即不能修善斷惡故為性也可知次辨業用者疏云能障為業也解云以懈怠故正障精進也以行善事故即令他精進不起故名能障精進增染為業者既有懈怠故即一切染法皆得即滋長染法故有此業用名為懈怠也顯揚說此懈怠亦有五業也可知上來第一辨體業訖也第二合釋前文者疏云謂懈滋長染故意云若有此懈怠者即滋長染法增長也以名不善勤也可知第三通外難者外人難云若言於善品不修即名為懈者即於不善染品而策勵者雖不修善於品而能勤行亦非懈怠應是精進所收答曰疏云於諸淨而策勤者亦名懈怠也問曰何以名懈怠答曰疏云退善法故也雖然事理合名精進以退於善品故名懈怠也名退善即名懈怠者若於無記事而策勤懈怠亦是精進也答曰疏云於無記中至是欲懈非別有體者意云此亦非是懈怠亦非精也但是別境中欲及勝解也是無記勤故即無慚怠之體性以是無記故下疏自解云如於無無信不信者此於無記事起印忍者亦非染亦不可名信不可名不信即無信不信但是無記也即於善品增猛修者名進於惡品勤修以退善心亦增盛故即名懈也第四六釋分別者懈即是怠持業釋者懈是用怠是體將用就體體能持用名持業釋也上來有四初略辨體業第二重廣前者答外難四者六釋分別四段總上來有二初標次釋二文不同總是第訖也自下第十五辨放逸者分二初標次正釋第一標者疏云十五放逸者是也可知第二正釋中有五段也初略釋體業二者從謂由懈怠至非別有是現顯所依也三者從雖慢疑等至遍策法答難也四者染淨相翻者疏云推究此如不放逸也五者六釋相攝也五段不同且第一略辨體業者出體者疏云於染淨品至縱蕩為性者解云品不能修於惡品不能防但縱恣蕩逸故名縱蕩為性也次辨者疏云能障不放逸增惡損善所依為業者即放逸起時正障不放逸也以不防惡法故名惡也以不修善品故名損善也即增惡損善是放逸業用若依顯揚論說放逸亦有五業可知上來第一略辨體業也第二顯所依四法功能而建立放逸也問曰四法者何謂由懈怠及貪嗔癡問曰有何行相即功能名放逸答曰疏云不能防修染淨品法總是非別有體也但是四法不防修功能假名放逸也無別體性也可知第三答外難者外人難云法有不防修之用即名放逸者即慢疑等亦功能何故不依慢疑等立放逸耶下答中分句是牒難次二句正答後二句即顯貪嗔癡四法之勝用也且牒外難意者疏雖慢疑有此能即離此慢疑亦有不妨修功能問曰不立放逸正答者疏云而方彼四勢用微劣即而者助句也方者比也即此慢疑不防修功能勢用比他四方即勢用劣也問曰何以劣法答曰即是四法勝能也疏云障三善根即此四法能障三善根能障遍策法也等以無此功能故即永立放逸也此第三答次第四染淨相翻者疏云推究此相如不放逸云即反顯不放逸行相也以不放逸是三善精進四法防修功能假名不放逸即信慚即有防修功能比他四法功能勢用劣故但上立不放逸也今此放逸即是四法上不防立放逸即反顯行相如不放逸也此是染翻第五六釋分別者疏云放即是逸持業解云此疏文作持業者有似錯也若言持將用就體能持即名持業今放逸二法是用故即不可將用持用成持業耶應無釋也上來五段總是正釋上來有二初標次文不同總是第十五辨放逸訖也自下第十六辨沉者分二初標次釋初標者疏云者是也可知第二正釋中有三師解釋且第一師解者於中有二初出體二者辨業用且出體疏云令心於境無堪任為性者此第一師意云沉是假但依諸煩惱無堪任者是沉雖此諸煩惱無堪任相即無別惛沉相也煩惱為體性故即一切煩惱無堪任上以令心心所皆無堪任故言業用者即業用也一者別業用二者通業用也且用者疏云能障輕安也若輕安起時即今調暢安和今既有沉起時即正違輕安生也以餘法不能障他輕安唯是惛沉能障安故是別業用也二者通業用者疏云舍那為業者解云即此毗鉢舍那是梵觀品也即能障觀為業此無漏觀等煩惱亦能障故名通業用也若有沉故無輕安之用又無智惠觀察之能也問曰如諸煩惱無堪任故名沉言是假非實耶對法論云依諸煩惱上皆無堪任義說此是假非實也第二辨第二師義者論沉癡一分攝論唯說此是癡分故惛沉亦無別體但依癡上立是假非實以何知之答曰瑜伽論說沉即是癡分知沉依癡分故第三護法義者即是也即於疏中分為四段初立自義二者會第一師義三者難第二師四攝歸六釋且初自義者疏云沉別相謂瞢重解云即沉別有自體以瞢重為相也瞢謂謂沉也即迷之相也言惛者是者重也即此瞢重是沉體性名為別此沉是實非假有空自體故疏云沉謂即瞢重也此第一立自義也第二會第一師義者前第一師云若爾者如何對法說煩惱無堪任假名沉耶正會云彼對煩惱無堪任為沉者是即今俱時心堪任故亦不是沉自體是無堪任也沉但取瞢重為別相也第三難第二師云第二師義若言自有體者即如何瑜云沉依癡分立是假非實故知是癡攝也下正難者疏云此與癡相有差別者解此沉行相與癡下相似故云有差別也行相似有差別者行相如何答曰疏云迷暗為相至下而非迷暗者解云此癡行迷暗為相即正障無癡也即不是瞢重故即迷暗而非瞢重也此沉即是瞢重為相正障輕安是迷暗為相也即此沉與癡所對亦別即行異即迷暗瞢重有差別也即疏文分明也故相有差別也即瞢重為沉別相也第四攝歸六釋者瑜伽論說是癡分者如何護法云是非即依癡也以行相各別故第四攝歸六疏云即是沉持業釋也以是用沉是能持用名持業釋也可知上來有四初立自義次會第一師義三者難第二師四者六釋分別四段不同總是辨議法正義也上來有三師不同總是釋上來有二初標次釋二文不同總是第十六辨沉訖也自下第十七辨掉舉者分二初標次正釋初標者疏云十七掉舉者是也可知第二正釋中有三師解也此疏文中但是後二師義第一師義者論云有義掉舉貪一分攝論唯說此分故意云此掉舉唯依貪分立是假非實也何得知答曰瑜伽顯楊對法皆言唯貪分立故依餘法立也既依貪即是假無別體性也即便有掉動也行相可思之次辨第二師初難前二者申自義三者會違文且第師者即此掉舉非唯貪分立以是遍染心故貪分者即有嗔無無貪應無掉舉即不遍故應非大隨攝以大隨皆遍諸染心故方成大隨隨也第二申自義者分二先正出體二者辨業用初正出體者疏云令心於境不寂靜為性者說成遍染義故即依諸煩惱不寂靜共掉舉也何以知之即五蘊對法皆言不寂靜故掉舉離一切染無別體性也即依一切煩惱不寂靜義說名為掉舉也又唯識論云又掉舉謂不寂靜即是煩惱共相攝故即離此諸煩惱相故言業用者疏云能障行捨奢摩他解云此有兩重業用一者能障行捨不即正與行捨相違也以行捨即寂靜為即是不寂靜為相以相違故故云能障奢摩他為業者即梵云奢摩他此云止也定之異名定即專一掉舉心不專一即是障業也第三會違文者前師難云若言依諸煩者即如何大論及對法等皆言唯依貪一分攝正會者答曰彼論言依貪分立者以掉舉分體殊勝故所以偏說依貪分也若據盡諸煩惱不寂靜功能共相假名掉舉也云雖依一切煩惱假立而貪位增且說貪不相違故上來第二師義訖也從次辨第三師者即是誰法義也於中分三初辨自正義二者會違文三者攝歸六釋且第一申自正義者疏云相謂即囂動者解云言者掉動也或掉是囂也舉者動也即此掉舉之別相是實有體也唯識論云有別有自性遍諸染心如不信等非說他分是實者即別有自然以囂動為體性也第二會違文者前師云若言不依非是假者即五薀對法等二論皆言掉舉是諸煩惱不靜共相立掉舉即以不寂靜為相耶如何口釋者疏云令俱生法不寂靜故意云諸煩惱但令掉舉同時心心所不寂故即是掉舉自性也又瑜伽論說掉舉非世俗有者是實有也即世俗有二一者對無為說一切有世俗二者以對實說假亦名世俗也今言非者但非是假故知以囂動為自性也第三攝歸六釋者疏云掉即是舉持業釋也以掉是體即將用就體體能持用名持業釋為正義也上來三師解總是正釋上來有二初標次釋二文不同總是第十七辨掉舉訖也自下第十八辨失念者分二初標次正釋且初者疏云十八失念者是也第二正釋者於中分三初略辨體業二者廣前業用三者顯所依且第一辨體業中先辨體業二者廣前業用三者依且第一略辨體業中先辨體性者緣境不能明記為性者解云即正念即不明記以與念癡分上立故即不明記也令失正念以不明記今既無正念者即不明記善事等故為失念也可知第二辨業用者疏云能障正所依為業者解云既以失念即起得散亂亂為所依故是失念之業用又能正障善正念不生皆是失念障令不起故言能障正念略辨體業也第二廣前業用者疏云謂心散亂故意云以失念故即起得忌念忌念得散亂也故云心散亂故可知第三顯所依有三師解此疏文中唯是第三師正義也即三師中且第一師義者即失念唯依染念立也問何以知之答曰對法論云失念是煩惱相應念是依煩惱起也解云由念與煩惱俱所以唯依染念為失念體也若念不與煩惱不名失念也此念若與煩惱俱時即與失念性也故知但依染念一分立也第二師義者念是癡一分攝也問曰何以知之答曰瑜伽論分者是癡等流性故故是癡一分攝也第三辨護法義者分四初難前師二者申自義三者會違文四者與六釋相攝且第一難前師者難第一師義此問云汝第一師定言念煩惱俱否第一師答云念常與煩惱俱生也護念唯緣過去曾習境今煩惱即通緣三世若煩惱緣未來及現在時即如何與念俱耶緣未來事故故知念不定與煩惱俱也若念去時與煩惱俱念上立失念若緣未來事時念即何為失念體也第一師云設爾煩惱緣未起念無失念者何失難曰若爾即失念不遍染煩惱緣未來是染心故必令與失念俱也若者即失念不遍染心也若成遍染義者即緣未念者即此失念俱依癡一分為體也如何前師癡分耶次問第二師者問曰汝第二師如癡分立失念第二師答曰失念唯依癡分通緣三世法故故知失念依癡分得立也又即唯識論云有義失念癡一分攝即瑜此失念是癡分故即依癡立也護法難云師若唯依癡立者即有違教之失也以對云失念依煩惱相應念立為失念如何唯依癡若第一師唯依煩惱俱時念者即不遍染瑜伽論文也即前二師皆有過失也前二師過失也前二師一時問曰若爾者即護法法與失念為體此第二申自義者護法疏云有義失念念癡一心為體者解云即念癡及依煩惱同時念為失念體以成遍染違教無前二失也可知第一師難云若爾何對法但言煩惱相應念立失念不立若癡上立者此文如何通會第二難言取煩惱同時念上立失念者即瑜依癡分立者即如何通釋耶即是下違者疏云由前二文影略說故意云瑜伽說一邊以互影說故對法唯說依染念即影取癡分也瑜伽唯依癡分者即影取依染念也即二論互影取略而說亦不相違第一師又云如何言互影便令癡分攝耶以言唯染念不言依癡分故即不遍染心亦答曰疏云論復說此遍染心故意云瑜伽論失念於八遍染者即須依念癡一分方正也癡分立者即不遍染心如何於大隨大中攝遍染心義者即須依念癡一分立也故論遍染心也第二師言若依癡分即可然若即如第七識無念故但有癡即第七相依如何有念耶護法答云依多分說此癡立也即第七名少分前六名多分也亦事須定依念癡但依多分說依念癡一次第四攝歸六釋者疏云失之與念至持勝者解云此意有似相違釋者似有理也是念以失劫正念故名失念失與念是相違也若言持業者即失是用念名持業者有似無理也即念是明記失者記以無此明記之法名失念即持業義也亦應細思之也上來有四初略辨體業辨體業所依四者六釋相攝四段不同總是正釋有二初標次釋兩段不同總是第十八辨失念訖也自下第十九辨不正知者分二初標次正釋標者疏云十九不正知者是也可知第二正釋有四初略辨體業二者重辨業用三顯所依四六釋分別且第一略辨體業中先出體者疏云所緣境謬解為性者解云即所緣境錯行為謬解即迷於前真境有錯謬故名不正外道煞馬祠天以求福故此是不正知也以謬又如殊屈摩羅取千人指求生天等皆名不謬解為性也次辨業用者疏云能障毀犯為業也意云若若有不正時正相違也以能障正知不起是不正知業用也毀犯者即錯行亂學多犯戒故或毀於正知行故毀犯為業也可知第二廣前業用者疏云正知多毀犯故有此不正知故便毀正教故可知第三顯所依者於中有三師辨第三師義也前二師在疏外也且辨者論云有義不正知慧一分攝也即是體也此惠是煩惱相應慧名為染慧即知體但是染慧非是煩惱也問曰如何知答曰對法論云是諸煩惱相應慧故言慧一也不依癡分故第二師云此不正知但是癡為體即瑜伽論云依癡分攝故不依慧如何言依慧體立也第一師云瑜伽依癡即體非癡分也但依慧一分為也第二云汝前師定言不正知依慧分立者如何聖無想定外道世共說彼有定無慧耶即無想定定即不正知不正知依於何法而立也以無想定故又憤恚天通眼相觀時但有定定者是等無有慧即起嗔之時便覺眼相觀即是染知以無慧故即不正知依何而立也第一時無不正知者亦有何失第二師難云不正知不成遍染義也前師云設不遍染難云即違瑜伽論文瑜伽論文言八遍染中正知故故知不正知是遍染心遍染心者即須立不依慧立也故知瑜伽五十五云說此不正癡分故第三護法義者分三初難前二師二者申自義第三會違文且難者汝第一師若言唯依慧分立者即違瑜伽十五文彼論云此八遍染中有不正知不正知染心故若唯依慧即不遍染心故即瑜伽論文癡一分攝如何前師唯言依慧也即違瑜伽第二師若言唯依癡分立者即違對法不正知依諸煩惱同時染慧為體如何唯癡者即違彼論文也即前二師二各失也第二申自義者疏云有義不正一分攝者解云即不正知依慧及依癡一第一師難云若爾言依慧癡立如何對唯依慧立耶又第二師難云若言依慧者如伽云唯依癡分攝也第三會違文者護法疏云由前二文影略說故者意云若對法言者即影取瑜伽癡分也若瑜伽依癡影取對法依慧也即二論而說相違故故言影略說也第一師又云說唯遍染心亦有何過護法答者疏云論復遍染心故即此不正知是遍染心所攝故所伽論說是八遍染攝上來有三師義總依訖也自下第四六釋分別者疏云以無離合義故不可言不即是正知不不是正知此無離合六釋不攝也上來有四總是正釋上來有二初標次正釋二文不同總是第十九辨不正知訖也自下第二十辨掉舉者分二初標次正釋且第一標者疏云二十者是也可知第二正釋者於中分二初辨體用二問答且第一辨體用者有二師辨且解分二初略辨體業二者重辨業用且初第一略辨體業中先辨體者疏云所緣令心流蕩為性者解云言流蕩是體也依三不善根上假立問曰如何知之答曰法五蕩集皆言是三分位故今言令心流蕩貪嗔癡馳流之時名流蕩故即緣境之惱亂或緣東西南北心皆散亂即於境上令心心所流蕩也即流謂馳流蕩謂流蕩也非別有散亂體故故令心流蕩也次辨業用者疏云能障正定惡慧所者解云有此散亂之時令定不生以定心故此散亂心不定有躁擾故歒體相違故正定也言惡慧所依為業者有此散亂染慧是此散亂也可知上來第一略辨體業訖第二重辨業用者疏云謂散亂發惡有散亂時便惡慧得生可知第二者疏文分二初申自義二會違文且申自義者疏云散亂別相即是躁擾也意云此散亂實有別自體性即以躁擾為散亂體性能別障三摩地故所以散亂是實有也若何能別障正定耶故知別有自體也第二會違文護法云別有自體者如何對法說散癡三上流蕩功能立散亂也故知是根上流蕩為散亂體性也護法會者令俱生法皆流蕩故意云但是散亂令同皆流蕩故非即流蕩是散亂體也即此流散亂通相也令散亂別相者即躁是擾云對法言是三分者但是彼三不善根故即非依三法立也如無漸等非彼攝云散亂是有法定實有自體宗因云流性故同喻如無慙等可知故知散亂實體性也此第二師為正上來二師不是顯別體用也後次第二問答差別者分四段也一者總問答者疏云問掉舉何令易緣者是也二者答難者疏云雖暫時住者是三結遍染心者疏云故掉舉亂俱遍染心是也四者攝歸六釋者散即是亂持業釋者是也四段不同且初總問答者初問次答且問者疏云問曰掉舉意云此掉舉散亂以行相稍相似故所即此二法何別此問可知次答者易解此令易緣解云掉舉即易解即若散亂即易緣心一境多即行相有異也障心為業散亂即障定為能即止與同也若約能障二法行相即差別也問曰掉舉易解名心多境一答曰即此掉舉緣時即一境體故即作種種解心故即名是易其解心也即不易所緣境此名易也如一青境止作種種青解即名解也言彼者是前來已說故說為彼也者即散亂散亂即易緣即一心境多即易境名易緣也即如一個心便緣青黃赤白境也即一個心緣得一切境以躁攝故便境也即此是緣易非解易由此作四句一者解易非緣易者即斷是掉舉常樂我淨之解或緣一青境便作一切青也二者緣易非解易者即是散亂緣青黃也等心即是一故即不易解以境多故名也即前念緣香後念緣味即於諸境上皆多境也三解緣俱易者即是強思計度心是也四解緣俱不易者即是任運心緣念緣青境後念亦是緣一青境即心境上來總問答第二答伏難者有兩復次答難且第一復次難者如六識中一念緣心如何有易解豈有一念中能作易解易緣耶即一念作不成易緣亦不成以一念故下正答者分二初答且沉答者疏云雖一剎那至有易義雖一剎那緣無易義故令言解緣無易解者即是云雖一剎那緣者即是掉舉緣者即是雖一剎那解緣二法無易義者即於而說有易義故以一念中解緣二行說也即於相續多念亦有易義也以相續顯解緣二法有易義故即疏中言雖一剎那易者且亦牒外難詞也更言易於相續有故即是通也此沉答也次正答者外人又難云若有易解易緣者即一念中無易緣應非有易解易緣方成掉散故故知第一念易緣者即應解緣二法非遍染心即第散亂掉舉故答曰疏云染汙心時由掉亂應念念易解易緣者意云即此掉散二法念易義也以性是易解易緣也設爾一念中亦有易義即是遍染心故但有染心時即此易解易緣也此正答也上來有二初沉答二答二文總是第一復次答伏難也第二復次者先難云若散位可說有定染心持以掉散若無掉散若有掉散應不成定若定即須有此二法以是遍染心故下答有二初正答次成且第一正答者疏云或由念定等力所意云由有正念制伏掉舉易解也由定易緣也即有此念定之時暫時折伏其體亦非無也若言粗著行相即無若之本性是易義也若無染心時即不心時設有念定制伏者亦有微細易義以體性是易義故猶如何等下舉喻者如暫猿猴有暫時住者即如猿猴被繫手腳雖繫不動即心意皆是躁動之物也性是囂掉動之物即粗相即無亦有微也可知上來第三辨不起法也第三結遍染心者疏云故掉與亂俱遍染心者若無念定心時皆有此二也若是染念染定時亦有以行相微細故以是遍染義故有染念定散也可知第四六釋相攝者疏云散持業釋者以散是用亂是體以用顯體用名持業也上來有四一者總問答二者答伏難三者結遍染義四者六釋分別四段不同也上來有二初辨體二問答差別兩文不同釋上來有二初標次釋二段不同總辨掉舉也上八段不同總是辨大隨訖也上來有小隨次中隨後大隨三段不同總是別辨也有二初總辨三隨二別辨三隨二文不同總是上來有二初總標舉數二隨標別列二文不同總是大文第五辨隨煩惱訖也自下第六辨不定四者疏云述曰第六文也分二者一者數二者是隨標別列所以言文文不同且第一總標舉數者舉文如何四者是總標也言四者是舉數也標別者論云一睡眠至伺者疏云述曰也分四如文且第一辨睡眠者分二初標次正釋中分四初略辨體業二重解體性三者顯假實四六釋分別且第一略辨體業者疏云在昧略為性者解云言令身不自在睡故搖動亦不覺故以極暗昧不明利者也略者小也唯是意識無解前五識昧略即令身不自在也可知辨業用者為業者解云即是障毗鉢舍那為業有此睡眠故令觀心不生正障觀品也可知第二重解體性者疏云身不自在即解前令身不自在也心極暗故重解云前昧略為性也以夢意識無前五識唯意識故名一門轉也非無也唯於意根門轉故不於五根門轉故名也即夢意識同時相應心所亦有也即也亦不妨常有遍行等心所也此中意顯意識故可知第三顯假實者分三一者顯實二者辨假相三者舉例重顯實性且初者問曰如何名昧略答曰疏云昧簡在悟時令顯睡眠非無體用者此有三種此夢中意識即雙簡定散明了意識不字簡定中獨顯意定中獨顯意以極明也言略者簡散明了散明了意識根門轉或獨顯者亦明利故即此夢故簡二位意識名昧略為性是睡眠之定中唯意識以明利故散位有多故六識皆有非也故言昧簡在定略別悟時即昧者暗也略者少也問曰若取意識睡眠名心所者即將何為心王耶答假借為心所意識為心王也應細思即此以睡眠之體性故言令顯睡眠非無體意識名有心睡眠名為實睡眠也者即假名為睡眠也若准小乘說睡眠今言非無體用者遮小乘義也此上顯實二者辨假相者疏云有無心位立此名者解云聖教說有於無心位亦名睡眠此唯是假說五位無心中此無心睡眠是假睡眠亦經部師義即執睡眠無體但是總聚上立大乘解云此無心位是假睡眠睡眠者即是有心也以無心位似有心睡眠故即觸塵中收也問曰有心睡眠是實相如何下舉例重顯實體者疏答云如餘相應故解云以實睡眠是有心故非假心攝故名有心也以與心相應故說是有心喻如蓋纏等法是心所法即有心故此重釋前非無體用也言蓋纏者即蓋纏有八纏問曰五蓋者何答曰言五貪欲蓋二者嗔恚蓋三者沉睡眠蓋掉舉惡作蓋五者疑蓋間曰如何名蓋答曰蓋者是覆惡心令善不轉即是蓋義也問蓋者即覆於何法名為蓋答曰由貪界於染法上起令欲故即於上是復他樂出家者名貪欲蓋也問曰嗔障覺起耶行故名蓋也問曰蓋覆何法亦名蓋答曰此能蓋覆於定慧明了定不顯名為蓋也四掉舉惡作蓋能蓋覆定生故即正障明利專注法故行捨不生亦名蓋即障信智不生名蓋也可知即總束五蓋能障三位法也三位法者者二者修正行者三者人定正修正舉三位法名為蓋也若蓋因緣故亦名為蓋是因緣即涼風飲食溫耎等是蓋緣也即法故可知解八纏者俱舍偈云纏八無慚愧眠掉舉與沉或十加忿覆若言覆二法也且明八纏者分二初列名二障法且列名者一者沉二者睡眠三者此卷亦首尾共缺不可知何本矣私案恐是百法論題幽抄第七末釋論云一貪二嗔乃至不定四者一睡眠之文也撿本文鈔所引彼鈔三本云二禪以上借三識不借鼻舌識云云四本云諸識互用云云此釋前五識也又五末云前七識望第八亦互為因云云又云論應說此品疏所緣緣一切位中有無不定云云又七本云此七識四分何能熏云云又云諸法於識藏云云又云第六緣過末熏種否云云以上諸文總釋八識諸門也又同七卷云樂欲為精進依云云此釋善位中信心所也次七末云苦受無分別為是無分別為復分別云云又釋曾受境四句云云此解釋煩惱隨煩惱之諸行也准如上引文則此抄三本至七本廣釋八識及五返行善位心所畢矣依此思之今此本即是當七末也然而本文抄所引之文應在于此次乎明治四十三年八月念三日定胤和南
