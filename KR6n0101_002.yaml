body:
  text: 皆是唯識也又若言無唯識者即無俗諦俗諦是依他唯識體故俗諦既無真諦亦不可得以真俗二諦互相依故若有為既無無為亦遣也若言真諦俗諦皆空者即一切皆泯也即諸佛説為不可治者應知諸法有空不空離有無邊正處中道也上辨唯識成空難説也自下第五色相非心難者難云若諸色處亦識為體者即應識亦如色相一類不斷相續而轉既若心即有間轉色相等即實山河大地世間現見目擊道存心外實色如何言唯識即心外山河不曾間斷能緣心即有時起有時不起即色等即一類堅住故何成唯識意云心有生滅境即不隨心生滅如何成唯識也下論主答者由諸有情從無始時來妄作相續解名言熏習種子在第八識中由彼熏習勢力此山河大地等起相續而轉第八所變山河大地是第八相分名不離心故知唯識無境也山河若望第六識即六識間斷山河相續此望第八識説是第八親所變相分故若有情滅時彼山河一重相分隨彼人滅也故知一切不離能變心故知無境唯識理成也自下第六親量違宗者難云色等外境五塵境等即五識分明現量緣證是現量所得實有外境即大小乘極成如何論主令撥為無言唯有識耶即因明論有三量是楷定有無若比非二量由心比度起執如似現量法是實有五塵等法即五八識現所證故若言無外實境如何有比現量心也有現量心時現證外境外境既無即現量心應亦無也現今證外實境應知不唯有識即現量境是性境性境不隨心者明知是心外實境也下論主答者論云現量證時不執為外後意分別妄生外別妄生外想此是依自宗正義答也意云即五識及同時意同緣境時俱現量得時不執為外也以得法自相體也即境非現量緣時無計度故若後念獨頭意識生時便妄執似外境相現作分別心相像似外境但妄作解也其實無外境也現量照自體故是五識相分也以識所變故亦説自相分是不離識也若言外有境者即是計度妄執情有理無也約妄情執心故即有我法實境今約實理説者即離心外更無有境也唯內心所變若執計心外實法者説非有不稱故但是隨情妄有亦不離妄心也亦名唯識若妄心之時外境忽無如眼中有翳妄見有蠅等若是五俱意識不作外境解也小乘師云我不問論主意識分別有外實色等如何論主自難自答耶與我問意不相當也我問論主五識現證外實境有耶論主答云此答前解五識不執為外意識執現是前來答汝難訖也今説五識所緣相分似外境有即體非實外境但顯正義也答小乘難訖也意云五識緣境不作解得法自相故名唯識也第二念作心外實有不隨心解即不離中故談唯識也自下第七夢覺相違難者外人難云言夢中是唯識夢境無實以覺後心了知夢中都無實境不離夢心是唯識即將以夢中無境名唯識者為喻例覺時心亦如夢境是唯識者即何故世間人現覺時不知現境是唯識耶但是覺後反緣夢不離夢心故名唯識即不知自覺後境是唯識以見有實境是心外實有故明知覺後不自知是唯識者如何論主一切皆是唯識也下論主答者有二先舉極成為喻二者正答且舉喻答者即夢中境有者要覺後及後方知是唯識即論云如夢未覺不能自知要至覺時方能追覺覺時境色應知亦爾解云正舉喻者如夢未覺正作夢時總不自知是夢即執為實境若後覺時方知前來作夢時夢境都無皆是唯識即要至覺時方知夢是唯識也舉喻可解二正答者論云未得真覺常處夢中故佛説為生死長夜由斯未了色境唯識解曰意云覺時境色亦如夢中之境自不知是夢是唯識便執為實有外境亦不知現覺時是夢也要至真覺時方知無始至今皆是夢境皆是唯識也二十唯識頌云未覺不能如夢所見非有即謂未得真覺常不能自知至得無漏真覺之時亦能追憶生死長夜之夢境即覺知他一切凡夫皆是夢境境亦非有一切皆唯識也問曰如何知生死是夢答曰未得真覺常處生死夢中故佛説為生死長夜如夢也由斯道理未了色等境是唯識也上來答夢覺相違難訖也自下第八外取他心難者外人難云論主前來立色境是無已極成訖也以外色境實無我亦不論也若他心既是實有寧非自識所緣也此意令自心親緣著他心此中若緣者他心者即唯識義不成以心外取他心故若緣他心不著者何故有境而不緣著即何名他心智也二十唯識亦有此難彼云若不能了知他心者何名他心智若能緣著者即唯識應不成也下論主答者誰説他非自識境我許他心是自識之境所以有他心智我但不説他心是自心親所緣故自心親緣著他即不得但變影緣他心亦得名他心智故所以唯識得成也此緣他心時亦非如手等親執其物亦不似他鉗甲物等亦非如五根親照境體此識緣境時但似鏡照物但得其影不緣著質故他實心是他心唯識所收他人五根五塵是他人唯識攝也五識所緣相分外質是第八識相分唯識極成也即見相二分是自證分上用與自識分不即不離也緣他心時作他心解即緣著他心影像也唯識得成也自下第九異境非唯影難者外人難云唯識之義但離心之外更無有物既若有他心所變境有實者即異於自心所變境何名唯識是他人身實色根等不是自身所變之境何成唯識以自心外有他實色故下論主答并毀責者論云奇哉故執觸處生疑豈唯識教但説一識意云豈唯言唯汝一識更無餘人識也外人又問曰若不唯一人識者行相如何論主答者論云汝應諦聽若唯一識寧有十方凡聖尊卑因果等別誰人説法謂誰人説法也何法何求故唯識言有深意趣意云即反難外人意也若唯有一人之識者寧有十方凡聖尊卑因果差別又寧有他人色之與心等別若唯佛一人者佛謂誰人説法以無衆生故亦應無佛即無善知識即何所求也故唯識言有深意趣也外人問意趣如何答曰即解本宗意者即一切有情各各有八識遍行等六位心所各各自體分及所變相見二分及色心分位二十四不相應等六無為二無我理所顯真如以空為為門顯真如也所以許有八識自體者是識自相故名唯識許有心所者即識相應故名唯識許有色故是前王所所變也餘二位可解言唯者遮外境有言識者簡識亦空也即離有無故成唯識也若如是知唯識教意便能無倒善備資糧速入法空識無上覺救拔含識生死輪回非令撥無惡趣空者違背教理能成是事故定應信一切唯識也上來總答前違理難訖也九難外更有一難即是外境既成無忘應不起難者外人難云若無心外實所緣境由何而生種種分別分別者即八識也若無外境八識因何而起論主答第八識內有一切種子以有種子故諸法從種生也既生現行時有增上力能牽諸識起故知識起不離內心所變之境故知一切唯識理成雖言唯識亦有因由然始得生得生之由即四緣也既有四緣牽發力用分別識起於義何乖此答外境既成無忘不起難訖也即一切皆唯識即五位之中居第一位己心最勝故三界唯心萬法唯識前來廣成立訖也若唐三藏成立唯識作比量者真故極成色是有法定不離於眼識宗中法因云初三攝眼所不攝故同喻如眼識言真故即簡世間相違過以唯識是佛法勝義甚深義即世所不知也言極成者簡不極成色不極成色是小乘不共有者如小乘有者如小乘説佛是有漏色最後身菩薩是染汙色但取今一切有漏共者説也問曰何名初三答十八界即眼根界眼識界色境界此是初三乃至最後意界意識界法界後三也都有六今三也今且成一切色不離眼識故言眼所不攝故即此色境不是眼根攝也喻如眼識眼識非是眼根攝也即眼識不離眼識體今色境不是眼根攝亦不離眼識也問云何眼識不離眼識耶答眼識見分不離自證分也問若爾小乘不知有自證如何言見分不離自證答對小乘但言不離識體色亦不離識此無過也此共比量也若不言初三攝但言眼所不攝故便有不定過也言極成之色為如眼識是眼所不攝定不離眼識為如復五三眼所不攝定離於眼識故知應言初三攝者簡不定過也又若不言眼所不攝但言初三所攝故更作不定過為如眼識初三攝定不離眼識為如眼根初三所攝離於眼識耶故知初三攝眼所不攝故眼識無過也下新羅順璟法師是三藏弟子歸本國已即破三藏比量作決定相違過也量云真故極成色是有法定離於眼識有故宗因云自許初三攝眼識不攝故同喻如眼根即寄此比量與慈恩來請為解釋慈恩云若自比即以他比以破若共比即以共比破若將自破共比者即不解因明道理也今言自許初三攝眼識不攝者此因便有隨一不成也以大乘自宗不許眼識不攝也所以疏云謂初第一心即是法至持業釋也此是成立唯識訖也自下依疏文辨心法者有六段文如疏中於中分二且第一義解心者分為二初正釋二義二者翻前文者疏云或初集起下是且第一正釋二義中且解第一義中分三初立義分二屬當分三解釋分問曰如何名為心疏答曰一集起名心此是立義分也二者問曰有八種識何識名心疏答曰唯屬當分也三者問曰第八識名心有何功能獨名為心疏答云集諸種子起現行故此是解釋分即下二句解上集起二字也言集諸種子者解上集字也言起現行故解上起字也故名集起名心也言唯屬第八集諸種子起現行者此破經部師義也即經部師云我無第八識但有前六識中互相持種以六識不俱起如眼識起時即眼識中持餘五識種子及諸色種子若耳識起時即眼識滅已餘五識種子也種子等即在耳識中持也乃至第六意識起時餘五識種子在意識中持以六個識定不俱起故六識中隨一識起能持種子從次護法破前師者分二先破前師二申自義且破經部師者汝經部師將前六識互持種子者不應正理以闕四義故前六不能持種也一者前六闕常義二者闕遍義三者闕一類無記義四者闕堅住義即此四義一一各作比量破前六不能持種也但將一個喻四個因第一量云汝前六識是有法應不能持種故宗中法因云非常相續故同喻如電光電光非常相續電光即不能持種汝前六識無常相續義亦不能持種也第二量者量云汝前六識是有法應不能持種故宗中法因六個識不遍三界故同喻如電光反覆可知經部師云此有過也以因有不定過論主言不遍三界者為如將第六識遍三界證六識持種為如復將前五識不遍三界證六識不能持種耶即論主將非一類無記為因即此量無過也量云汝前六識是有法應不能持種宗中法因非一類無記故同喻如汝宗過行等反覆可知若不言汝宗簡者即大乘宗第八識相應遍行為不定過也將他經部宗遍行遍行是六識相應者皆通三性也以非一類故第四量云汝前六識是有法不能持種宗中法因云不堅住故同喻如電光反覆可知經部師被破已便轉救云將識類亦能持種論主云識類者亦非成正類以聖人識是凡夫識之流類凡夫識是聖人識之流類不聖人識變凡夫識熏者即應聖人識便通有漏不善性應聖人却成凡夫耶又凡夫識變他聖人識熏者即應凡夫識便成無漏應凡夫便是聖人耶以是識類互相持種故若不爾者如何將識類持種耶故知須有第八識持種子以具四義故申正義者即唯取第八識持種子也所以疏云唯屬第八集諸種子起現行故此識能聚集諸法種子復能起諸法現行故唯取第八識名心也如倉庫等能集一切財物故此第八識亦爾即梵云質多此名為心也言集諸種子者即第八識中有色心種子人天五趣種子三界種子無漏種子三乘種子等有無量無邊種子故名集諸種子也言起現行者即三界五趣有漏無漏一切色心等現行皆從第八識生起故名起現行也即第八識是能集起前七種子是所集起現行所起也即取能集起名心也問曰第八識具四分取何分名心也答曰四分中唯取自證分名心也問曰夫言一切唯識者即四分皆成唯識如何四分中除三分不名答曰相分是色見分是用證自證是後邊故知唯取自證分名也能含藏一切種子故名心也即自證分能集諸種子復能起諸法現行即令種子不散是自證分功能也從無始至今更無間斷持諸種子即第八識有集起義名心以與種子力令生現行復是依持生起二因故名心也即第八識是集起名心可知從此第二義解者疏文亦有三段即第一立義分者問曰何名為心疏答云積集名心二屬當分者問曰八識中何者心識疏答云屬前七轉三解釋分者問前七有何功能積集名心答曰疏云能熏積集諸法種故即前七識現行能熏得一切種子即前七現行多法共集故名積集即前七識能積集種子在第八識積多無量故是前七功能能積集故可知如眼緣色時意識同緣即是二識共積集得色種子即是二識共熏種子此共熏時種子名所積集也識現行名為能積集也餘耳識等亦爾即取前七現行名心以能積集得諸法種子即現行頭上持種子故得名心問曰前解集起者即種子能起現今解如何種子不能起現行答曰前據第八識中舊種子生故名起現行今説七識現行頭上新熏種子未能生現行故問曰七識現行如何名心答曰七識現行如禾莖也頭上新種子如禾邃邃從莖而生即禾莖名為心即前七識能熏得種子在第八識中即是七現行功能也問曰第八識種子因何而有答曰因他前七現行能積集得也即前七現行名心也問曰約何教據説前七識名心答曰亦無教據但是疏主約道理解之此非正理也此或是治法師義即前七識上但有能重義無積集義七識現行頭上但有剎那持種子功能後念即落在第八識自證分中持即是第八功能如何言前七識功能熏便是積集義第二翻釋前文中又分為二初正釋前義二重段兩文者疏云此上二解下是也且第一正釋前義二前義中先第一義者分二初屬當二解釋且初屬當疏云或初集起義屬前七轉是二解釋現行共集下是釋云言集者即前七識多現行各熏得種子名集問曰如何名共集答曰如眼識緣色時即意識為共集也共集種子也問曰第六與五識共造一事業者名共集此是明了意識也與五同緣若是第七緣第八見分既七不與六因緣如何名共集答曰申七為依六方得轉即第六與第七亦名共集者此亦不然如入二無心定前六俱滅唯第七淨分能熏種即何成共集此同明了意識與五同緣共熏集種也或與心所同緣共集者亦得名共集無失也即七識現皆名共集也以熏種子取中間現行名心也又解云前七現行但説集起即前七識各熏得種子故名集起即剎那後落在第八識中即前七識無積集義積集義是第八識自證分故但説集義屬前七轉也問曰何名轉識答改轉不定三性易脫故名轉也問曰前六通三性即三性不定名轉易如似第七識不通二性唯是有覆性不同前六三性易脫應非轉攝答曰雖有覆性以因中易脫者即名轉識即十地位中第七識漏無漏易脫不定亦名轉識也難曰若爾者即無種性人第七定不通無漏何名轉識耶答曰此有二解一云無始有不共無明輕若至今即無明二障漸重即輕重有異亦名轉易也二者生欲界二執無明即粗重生上二界即二執漸細輕重亦名轉易也於中有九品九品粗細有異故亦名轉易也從方所解者將王就所解以有掉散二易解易緣名轉易也問第七初地成無漏即名轉識第八果位成無漏應名轉識答曰果中第八一向無漏不名轉易因中第七漏無漏間雜故名轉識難曰前五識果中一向無漏應不名轉識答今但取因中易脫者方名轉易前六三性易脫第七漏無漏易脫五變易脫三境易脫三量易脫有多易脫故即前七皆名轉識也即前七轉識共集并自同時心所共集義得成共集熏種子也但名集起不名積集也從此第二翻釋第二義者疏云後積集名心唯屬第八含藏積集諸法種故即第八自證分中有無量舊種子皆在第八中持故名為積也更能集得無量新種子故名集也更有集起之義能起得一切色心現行色心現行從第八識自證分中生起故名為起也故積集之義唯屬第八識問曰有何行相即第八獨名積集獨名為心答曰疏云含藏積集諸法種故自證分能含藏得一切種子故從無始至今持種受熏故名積集諸法種者即是三界種子五趣種子有漏無漏種子三界五趣種子三乘五性種子色心等種子名諸法種皆在第八識中持故含藏積集諸法種故積集之義局狹以屬第八識故若集起義寬通通八識通種現皆有集起之義若積集集起是第八自證分故復是總報主也即第八具二義名心一積集義二集起義積集集起解心者唯第八識獨名為心也此為正義唯識論云能遍任持世出世間諸法種子故是含藏義也即自證是能持能積集一切種子是所持所積集也即薦福非疏主云第八識無始相續受熏持種可名為心今前七現行但有剎那持種子義後念即落在第八識中也即前七現行何得名心耶故知唯第八獨為名前七非也從此第二段兩文者疏云此上二解至應思者言二解者即前七亦有能所二集七現名能新種子名所也第八識上亦有能所二集第八現行名能識中種子名所今但取二解中現行是能集名心不取種子名心也即七現亦名心以皆是心王攝故第八極成即八個識現行皆名為心故名應思也於中第八現行有似勝也問曰種子何非心答心者緣慮種無緣慮故亦是就勝而説且言取能集現行心故問與第三義何別第三亦是緣慮名心答第三唯取緣慮心此中但説能集之義故不相違也第三義者疏云二緣慮名心者梵云質多此云心也俱能緣慮自分境者即八識各能緣得自分所緣境故通八識説故名俱能緣也問曰何名緣慮答緣謂能緣慮謂思慮或云審慮籌慮故名緣慮薦福云緣慮名心者解心通名也問八識各緣自分境行相如何答曰説前五轉識唯緣五塵是自分境除諸根互用及佛位也第六緣十八界為自分境及三世法即一切法有法無法或出世間法皆是第六識自分境也第七識緣第八見分為自分境若無漏時遍緣不遮今且有漏唯緣第八見分為自分境也第八識欲界繫者即緣欲界根身器世間種子通緣三界為自分境也若色界繫者即緣色界根身器世間種子亦通緣三界也若無色界繫者即第八識唯緣三界種子為自分境也即不簡三性有漏種子為自分境也若聖護月菩薩解者即許一界第八識緣異界現行為自分境若護法第八但緣異界種子不緣異界現行因中第八不隔界變約定通之力即不決定若約業果決定不緣異界現行法也即三界種子通緣為自分境唯有無漏種子不緣也問曰有何行相不許緣無漏種子答有三義故所以不緣也一者第八是有漏正是無漏法對治識故二者體性異故三者不相順故即但而不緣四分中依自證而住問曰第八識既不變緣無漏種子即何成唯識答曰但有依持義持令不散故不離識故亦名唯識也舉喻如赤眼人把火也亦如人頂上帶物雖不見以頂持之若第六即緣得無漏種子也問曰六八二識一種是有漏如何第六即緣得無漏種子也第八即不緣答曰第六識即踈緣親緣即非也第八識緣種子時不許變影事須親緣即不許緣無漏種子也問曰既不緣無漏種子亦得名相分攝否答曰演祕有二解一者無漏種子與第八相違不為相分也二者因中無漏種子是果中相分之流類是相分攝故亦名為相分也若據濮陽後義為善問曰器世間與他人扶塵許第八隔界緣否答若依定通力即許變緣若業力即不許變言力者有五力一者大願力二者定力三者通力四者法威德力五者業力且就業力中第八變器界者問曰第八變者亦通異界器等變耶答曰此有三師解一者月藏二者難陀三者護法且月藏論師解云即此器世是一切有情上至諸佛下至蕉具等即三界有情皆能變得此欲界為自分境也即此師意許一界第八識通變緣三界器世間等即引教者立世經云一切有情業增上力共所變起故即一切諸佛等皆能共變此欲界為自分境也第二難陀論師難前師者有三難也一者聖人應變穢難二者凡夫應變淨難三者無因變下難且第一聖人應變穢難者若言諸佛菩薩變此欲界為自分境者即諸佛菩薩應實變此雜穢境耶若假變者我亦許也若實變即不然諸佛雜穢種子久已亡故此第一難也第二凡夫應變淨難者破云諸異生等應實變他方此界諸淨妙土若佛菩薩菩薩神力加備等我亦不遮若説業力者即有漏淨土外法異生不應實變不能受用故第三無因變下難者上二界有情不生下界來但實變下界為自分境者作何而用以欲界粗鄙惡如色界梵王許變下界器世者即不𭞪梵王受用梵王若下來此界升化梵王不得由如粗羅中成火不能礙得梵王既若不礙梵王受用變為何用亦無因由故實變者亦不許汝也即色界有情生無色界去不下生欲界來變欲界者復何所用故知現居者及當生者異熟識變為此界也問曰若爾者何故經云一切業增上力者同變此界答曰經依少分説也業同者即是當生業同者變也不是一三界等皆變也即取上界當生者變也難陀意取現居者變即取當界現在有情變亦不言傍欲界變也言當生者即取上二界有情變下欲界也故知現居及當生者變也第三護法宗分二初破前師二者申自義且第一破前師者難云若言現居有情變者即器將壞時既無現居及當生者謂異熟識變為界此世界欲壞由何更有生者現居有情又總已無也此欲界臨欲壞時都無有有情謂人第八識變為此界為自分境也又難云謂諸異生生無色界預變無用也此生有頂壽八萬劫不妨此界數成壞即變之何用耶可知第二申正義者言現居者變及當生變及器若壞時即取傍化三千欲界第八變為此界也以此界無有情故言當生變者即取器欲成時上界有情臨欲生欲界來一念捨上二界身命時從中有身一剎那間能變此界亦不是上界有情變下界也以剎那中有屬欲界繫故若是上界身命者即是上界繫以隔界故不變此界故為自分境也若欲壞此世界時此世界已無有情又無有情當生者此界由末壞即但取傍三千界有情異熟識變令繫住故若初或世界時由未有生來者亦取傍三千界有情變為此界問曰未有生來者世界如何得成答曰但是傍欲界有情業增上力變此世界得成以遙受也若是壞時即是當界有情共有壞業種子感世界壞也問曰若言有情有壞業種子生現即壞者即傍欲界有情未有壞業種子生現亦變此世界時應彼傍界有情亦有共壞業種子耶若言有者即應一切傍欲界應同時壞盡耶即不爾者如何將傍欲界有情不壞業者變此壞世界耶答曰不然以有所隨順能隨順故此界現居有情有共業壞種子故即是所隨滅也傍欲界異熟是能隨順能隨順亦亡也不是他方有情亦有壞業故若是此界初成時即是傍欲界有情當生者業增上力感此界得成也即第二師難云瑜伽論説當生者變如何不取上二界有情耶答曰言一切者但約少分一切也如一切人見國王但是一城之內有少分人見也不可見言一切者便將為大地有情皆見此國王耶即瑜伽論言一切者但約決定當生此界來者不約不生來者説也故知當生者即一念中有身即第八識頓變此界為自分境也即八識皆緣自所變之境故疏主俱能緣慮自分境故上來總是第三義訖也自下第四義者疏云四或名為識了別義者問何名為識答曰識者了別境為義即八識見分能了別於自境故如眼識了別也為境耳了別聲為境乃至第八識了別三亦以了別為義問曰見分能了別見分名識自證不了別外境自證應非識答曰自證是體見分是用用不離體即自證見分皆名識也即了別以解識八識通名識若了別粗境以解識前六獨名識也所以唯識論云了境為性相善不善俱非也又言能了諸境相是説名為識也可知第五義者疏云或名為意等無間故即前念八識與後念八識為依止故即前念八識名意也前若不滅後因何生依前滅後方得生故前念八識有依止用名為意也於中無自體為間隔故名無間也問曰大乘過未無體如何取等無間名意如何不取第七名意答曰此謂順小乘宗作此解也以小乘取前念六識與後六識為依止故名為意以不信有第七意故若大乘意者具二義名意一者思量二者無間具二義名意也不同小乘唯取過去為意也此名意者是依止義解意也如似第七與第六為依止義故名意即此無間意者是通名意也若等無間以解意八識通名意若思量以解意者即第七獨名意可知問曰第八如何名等無間答即剎那相引其實無斷若約能引業説引第八異趣生似有斷其實不斷第六義者即解心意識三別也疏云六或第八名心第七名意前六名識此中分二初正解心意識差別義二者引教證成從由此入楞伽下是也且第一正解心意識差別者此是約勝別名各別立號也第八積集起以解心第八獨名心第七思量以解意第七獨名意前六了別粗以解識前六獨名識也若説通名者前來解訖也即是了別以解識八識通名識等無間解意八識通通名意緣慮以解心八識通名心也可知此第六義是正辨別名也即第八具二義獨名心一者積集集起者緣慮也第七名意具二義一思量二等無間前六名識者亦具二義一者了別以解識二者別別粗境義即各具二義約勝雜名即心意識三差別也問曰前六識如何名粗答具四義故名粗也一者易知故即嬰兒之屬皆知有之二者共許有故即三乘皆共許有也三者行相粗故即了別行顯現也四者所緣粗故即五塵境也今依疏文即是第四義故以了別粗境故名識也問曰第六通十八界如同前五名粗也答曰若緣十八界理合不名粗亦與前五同緣五塵粗境亦名為粗即前六識名了別粗境俱名為識也即三法各據勝義得名也第八積集集起義獨勝故第七思量義獨勝前六了別粗境義獨勝即三種得名差別也正解差別訖也第二引教者問曰言三種各約勝彰名心意識有何教據耶答曰疏云由此入楞伽經至是説名為識也又瑜伽識六十三云雖此識皆名心意識而隨義勝第八名心第七名意前六名識問曰釋中何釋也答曰疏此心一字全無六釋也可知上來六義解心也自下第三釋心所者分五段一者解心所義者疏云第二心所亦有三義至繫屬於心者是也二者釋心所名者疏云如屬我物至名心所有是也三者舉喻疏云如畫師資作摸填彩者是也四者法合者疏云心所緣總別相如次應知是也五者六釋相攝者疏云此心所言至依主二釋是也五段不同且第一解心所義者即此心所定具三義方名心所疏文分二初標三義二正釋三義且標者疏云第二心所亦有三義可思第二正釋三義者不具三義者不名心所問曰觸等與心不即異即名心所無為還不即異應名心所常與心俱起觸等即名為心所無為亦與心為性應名為心所以無為與心不即不離故何妨亦名心所將第一義簡疏云一恆依心起簡無為法無為法雖與心不即不離即不常依心起即無為是心之所依夫為心所者即心所是能依既若無為與八為所依定非心所無為不恆依心起無為無為無相湛若虗空更有何義言有起耶不可説無為有其起義也即第一義恆依心起簡無為也問曰若爾者即色不相應依心起即取色不相應名心答曰將第二義簡之疏云二與心相應即定與心相應故方名心所色不相應不可説與心相應也今言心所與心相應者又須具四義故方名相應問曰四義者何一者時同二者所依根同三者所緣同四者體事等具此四義方名相應也問曰將前念心所望後念心王應名相應者須時同定須同剎那起名定俱生滅也前後念時不同不名相應難云若爾言定同時起名相應者即第六識亦與前五亦同時起即應第六與前五互為心所耶以同時故答曰將第二義簡須所依同以五識依五色根第六依第七意根即所依不同不名為相應也即心所與心王定同一所依根者方相應難云若言所依同即前五與第六亦同依第七識亦是所依同如何不互為心所相應耶答曰今言所依同者須是不共所依根同今第七與五識是共依根即第六不與前五識相應也即前五以五色根為不共根第七是第六識不共所依根即約不共所依根者方名根相應也難曰若言所依根同即名相應者今六八識同依第七意根亦是所依根同應六八王為心所名相應故答曰將第三義簡須同所緣境即所緣同者方名相應以第六識與第八不定同所緣故以第六識遍緣一切法第八識即唯緣三境行相差別皆不相應故有説六七是依同難者即亦得即六七識雖依亦同第七依第八依第六依第八即是疏依是共依根故設取不如將六八名依同也所簡之中所緣不同故不名相應也亦不取第六七同依第八識即境不同也將第四義簡即不取心王與心王作所緣須是所與王説相應也難云若言所緣境同者即名相應即如第六識心所受相等與第八識相應同緣三境時應是第八家相應心所耶答曰將第四義簡夫相應者須體事等即一心王有一受一想名事等今第六受想等與第八相應者即體事不等也即一心王便有二受二想故即體事不等不名相應也故知具四義方名相應相應簡色不相應相應不與心相應故不名相應心所也即五十一心所各皆與心王相應故名心所也難曰若爾者即心王亦與他心所相應四義具故即應心王亦是心所耶答曰將第三義簡之疏云繫屬於心也即心王雖與心所相應即心王雖與心所相應即心王不繫屬心所即繫屬於心王即具三義故方名心所又更解云問曰若言恆依心起名所者即是遍行有恆依心起即遍行名心所餘別境等不恆依心起應非心所耶答曰雖不常依心起亦有與心相應之義亦有繫屬於心故亦名心所也即此六位總簡餘四位法即第二心所獨名心所也即簡心王色不相應無為也故知此心所具三義故名心所也上來第一釋心所義説也第二釋心所名者疏云如屬我物至名所有者即將上二句喻顯下二句下二句是正釋名也先喻顯者如屬我家所有之物是我所有物故立我之名從我得名也法中解者即是心王家所有故名心所心即是勝所即是劣劣依勝心王立名心所有也是他心王家所有故名心所有即所有不是心心不是所所以從心王得名故名心所也可知第三舉喻者疏云如畫師資作摸填彩者言畫師是主也資者是弟子劣於主故名資也若準唯識先解行相後舉喻百法疏即先舉喻後法合也畫師即作摸弟子即填彩也即摸上填其彩色彩色中有衆多即青黃赤白色也師如心王資如心所也畫師如心王家緣總相資如心所緣別相別相中有種種行相如色中有青黃赤白等舉喻可知第四法合者疏云心王心所緣總別相如次應知意云即合上喻將師為心王資為心所也師作摸如心王緣總相弟子填彩如心所緣別相也問曰心王心所緣總別相者行相如何答曰此有三解一云心王緣總別相心所亦緣總別相如眼識緣青色時是總相即青色中有多種青色故即青依青草青天等是別相也心所隨心王青境處緣是他心王總想於五心所中各各行相別故名別相也問如何心王心所三皆緣總別相耶答曰瑜伽論云同一所緣故既言同一所緣者明知王所皆緣總別想也第二解云心王唯緣總相心所唯緣別相如眼識心所緣青時是總相但緣總青更不作多解即緣總想相青也心所緣別相者即五心所作意引心驚心為別相觸以調和為行相是別相即諸心所各各緣境行相別故名緣別相也即瑜伽論云不同一行相也即心王緣總相如作摸心所緣別相如填彩也以疏中總相而言心王所緣總別相也第三解云心王唯緣總相心所通緣總別相也心王緣總相如總相作摸也心所緣別總別相者如弟子於總相摸中填色也即心所於心王總青境上作領納相像造作種種行相即是通緣別相也即瑜伽論云同一所緣如心王心所皆緣總相下言不同一行相者即是心所緣別相遍行五法行相各各不同也即合取前二解所引瑜伽文總合説者方是也以前二解各引一邊道理不圓應總取論文道理方是即心所別相亦不離總相中緣也如資不不離模中填種種色也即心王心所緣總別相也即第三解為善也故疏云如次應知者即是解總別相應可爾也故言如次應知也從次第五六釋相攝者疏云此心所言至依主二釋者言有財釋者即心所分取他心王之名也本來但名所不名心即取他心一分名名心所也是有財釋也言依主釋者即心勝所劣以勝顯劣心之所故依主釋故言有財依主二釋也上來五段不同總是止釋也上來有二初標次釋二文不同總是第二釋心所名訖也自下第三釋色法名者分二初標次正釋且初標者疏云第三色亦有四義者問曰如何言亦有答曰以前來心心所法有云義三義等故今色法所以言亦有四義也標可知第二正釋者分二初正釋名二攝歸六釋且正釋名者有四義如文可見且第一義者疏云一識所依色唯屬五根者意云即舉能依識以顯所依根也此言識所依色者即簡所緣色也即是簡五識所緣色非所依色也亦不遮六八所緣色以六八二識緣得五色根故此但遮五識所緣色名識所依色也問曰此五根既是色法即幾塵所成答曰其能造四大所造四遮即八塵所成五根也問曰五根與五識為所依色若二禪也上五根無能依識應不名識所依色耶答曰亦為識所依色以與借識為所依故亦名識所依色也問曰若爾者即鼻舌二識在欲界即有從初禪上皆無此鼻舌二識亦無借識故即應上界鼻舌二界應非識所依色答曰是欲界識所依色流類故亦名所依色也此辨識所依色訖也第二辨識所緣色者疏云二識所緣色唯屬六境者即遮內五色根故言識所緣色唯屬六境言唯者遮簡之義即遮自六境不是所依根也亦不遮他五根是所緣色故以六八二識緣彼五根為所緣故言識所緣色者舉能緣識顯所緣境也問曰現在前所緣六境可名所緣餘遠處色不緣著處色應不名所緣色答曰境之類故亦所緣攝今言六境者但對前六識若對第八識理實亦應言識所變色以第八識所變色中通六境即五境全法境少分實定果色也問曰此六境幾塵成答曰具能造四大所造四遮即八塵所成也法境即不定也問曰既許第八通變六境何位中變答曰從初結生時一剎那間便能現變且如欲界胎生初變生位於一剎那頓變山河等至他化天下至風輪於一剎那頓能變起問欲界第八識何不變色界境答曰隨業力所感唯變自界若通變上界境者即三界互變雜亂過也若定通力變異界境亦不遮也難曰第八識不許隔界變其第六識如何許變異界境答曰第八識隨自先業是總報定故不許隔界變第六識不隨先業又不是總報主故許隔界變也問曰欲界第八既不變上界色如何馬勝第八變得初禪梵王宮殿等又梵王下至欲界佛邊聽法來即初禪梵王第八亦變欲界器世等及他人浮塵如何言不隔界變答曰有二説一云由自界業力第八識不遙隔界變他色界業果色若定通力即不決定也二云自界第八近即變其定果色隔界遙遠即不變他界定果色也上來識所緣色六境攝也可知從次第三正辨色義者問曰色者何義答曰色者質礙為義即疏云三總相而言質礙名色者此名色者通根及根依處皆名為色以質礙故問曰一切色皆有能造四大所造四塵八塵互相涉入如何言質礙答曰四塵雖不礙他但各各自礙故即如色礙色香礙香味亦自故名質礙名色也問曰地獄無數有情同處受苦一一身皆遍滿亦無色礙又佛自受用身有無量無數各各皆遍法界不障礙故何言質礙又如中有身能透過七重山七重山亦不障礙也即質礙義何成答曰亦自礙故不礙他也如中有身望類亦有質礙也受苦之人望彼人即不障礙但一一人皆自質礙故亦名礙也即刀輪火等皆能礙也若佛身一一色相皆不障礙者不思議故不定也若準法菀章中問云大種造色有對同處既無障礙云理不説無對性耶答曰互相順生不相障礙故人此類業增上所生諸根遍故皆互受用如中有身雖有對性而不相礙此亦爾問曰如大種造色等既互不相離者何名質礙答曰準瑜伽第三説諸色處有二不相離一同處不相離二和雜不相離且同處不相離者如能造四大同處互相涉入即成相根身其實諸塵各各有異也即質礙成如水乳合在一處不可簡名鵝王飲之元來有別即地中有水水中有火等也二和雜不相離者即能所二造相和雜故互相涉入雖在一處無本有異非如穀麥等分折故名和雜不相離也即大造同類相望名同處不相離異相者能所造也大造相望一處住者名和雜不相離非如他宗同類極成有別不同一處也此解礙者有二一者俱礙即是實色相礙即能礙他亦為所礙即如手礙手是也二所礙者即是假色但是所礙不能礙他也前來解不相離者即四塵各各守自性故亦名礙也即諸塵一一皆有守自性故若望前二不相離皆渾一處即不名質礙今八塵合一塵色根等有實用故便有質礙也又眼根等雖在身根一處同既能所二造合成一相如何此色相分從自種生耶答雖成一粗相中有八塵各自有種生眼識但見八塵中一色塵中一色塵一色塵自有種生也即不教眼識見餘塵故也餘四境但餘聲塵聲塵是孤行也餘三成一粗相一粗相中有三相分也即眼鼻舌身四識名緣自地即於一粗相上各緣得自相分故不爾應成互用耶即犯諸根互用也今言能造便是身根識得雖諸根同在處以各根皆守自性是實亦名為質礙名色也可思從次第四義者疏云又色有二一者有對等者分二初辨有對二辨無對且有對中分三初正辨有對二敘異計三顯正義且第一正辨者疏云一者有對有三種有對色一者障礙有對二者境界有對三者所緣有對也且障礙有對者即十色處五根五境也是對礙義如石礙石如手礙手名障礙有對也即約色自體説有實自性有對礙用故名障礙從二即約對根識義別辨後二有對也二境界有對者謂五根照境故名境界有對但對根故即名境界也以是實境故復名有對也三所緣有對者謂心心所法是能緣對所緣之相分故名所緣有對也即五塵境是五識之所緣境也名有質礙名有對若五根與六八為所緣有對也實定果色亦是有對色也但對能緣心故名為有對即對心名所緣對根名境界也以俱礙故名障礙有對問曰所對與境界何別答境體是一約不同故有異也對根説為境界對心名所緣也問曰識緣根境為變影緣為親緣答有二解一云變影二云親緣名同境根故境之種子即是識重得生現與二為境問既此境與根識為境者即有境時必有識境若無識不生亦應境無時根不轉耶答識有間斷隨境而説根是相續無境時根不斷即根如鏡有色即照無色時常有用也即三有對色體無差別也若約色自性體説即名障礙此色對根識即名所緣境界也其實體無別也此有一有見有對即是眼識緣青白等時眼所見故有見色有質礙對礙義故名有對也二無見有對者即聲香味觸等又實定果色眼識不見名無見自有相礙故名對問曰定果色既是實如何眼識不見耶答曰定果是第六家定果色眼識不能直緣但是變影像緣即影像但屬業果攝也云無見無對者即是極微等假色無表等眼識不見又無對礙義以無質礙故亦名無對也所以疏云一者有對也疏云若唯有宗極所成者言有宗者即三世實有之師也即佛滅後四百年初健馱羅國王問脅尊者曰諸部立軌範何者最勝尊者答曰諸部之中莫過有宗即疏主引此宗言極微所成也有云是世友尊者是有宗也問曰何以知之答曰昔日罽利吒王每請諸羅漢在宮供養後時僧多王便簡之唯取無學故阿羅漢請五百人供養唯簡四百九十九人欠一人即世友尊者非是羅漢在一淨處坐納百納諸羅漢曰汝不斷結何以變著衣服何不速斷煩惱證取無學果且向王宮受供養以少一人故世友答曰我棄羅漢如啼唾何要證羅漢果也即諸羅漢等一時責之即世友尊者云汝若不信我者即衣中抽一條縷團作一團著擲在空中縷團末至地中我便與證羅漢果諸羅漢皆不信世友便擲縷團在空中忽然諸天一時下來捧縷團將不肯令下諸天云大士修行經無量劫今次補佛處何以為小小事劫退趣小乘果諸羅漢見之悉皆悼然便供養請為教主便是有宗也即執一切皆是心外實極微所成三世皆實有三得得三世法令不失故引此宗是極微所成也即梵云薩婆多此云一切有一切皆執實有故一切積極微所成以計諸法心外實有故名有宗也即執能成極微與所成粗色皆實有故此薩婆多有新舊二師且古薩婆多云七極成聚成粗色然七極微成其粗色即成一相名和集色此師意雖七極微和合一處以各各自成粗色不相資也即許極微有質礙故若順正理師即是新薩婆多即七極微同聚而體相近一鄰虗地相質與力各各成其大相始成粗色名之為和集即新舊二師同是和集相似也若是古薩婆多極微無方分為圓故故細從粗十色處攝也即極微有質礙故若準經部師極微礙實積成粗色粗色是假此師極微隨粗色攝即於十色處攝也問曰此極微是何識緣答曰是第六識緣積成粗色粗色亦眼識緣也實從十色處攝也即是細實粗假也此經部師不説微是眼等識所緣緣以眼識無極微相故即此五根皆是極微聚成粗色如阿拏色方是眼識之境阿拏色者即是七極微成也此師意極微有方分質礙是對礙義即諸小乘師皆許極微成五根塵大地山河等皆積極微所成也即俱舍論偈云極微微金水兔羊牛隟塵蟻虱麥指節後後增七倍二十四指肘四肘成弓量五百俱盧舍此八踰繕那以此倍倍積成世界也若是大乘宗不許極微積成粗色以極微本來無體更將何成粗色耶由此總作四句分別者一者經部十色處粗假細實二者大乘世諦門中粗實細假三者薩婆多粗細俱實四者説假部粗細俱假此下破中但破經部薩婆多二宗也餘部同此破也先破薩婆多極微是實者論主云汝薩婆多執極微是實有對礙者量云汝極微是有法此應是假宗中法因云質礙故同喻如瓶衣等反之可解次破經部極微有方分是實破云汝執極微是有法應可分析非實故宗因云有方分故同喻如粗色也反之易知又量云汝極微是有法定是假宗中法因云聚成故同喻如粗色粗色是極微所成粗色是假汝能成極微成粗色故如粗色亦是假也下正破薩婆多無方分有五難一者極微無方分應無光影難二見濁無差難三一應成六難四極微無中表微聚不異難五極微無方分應無障隔難且第一極微無方分應無光影難者汝薩婆多便執言極微無方分和雜成粗色者即應所成粗也亦無分方分也以體即極微故應立量云汝和合色是有法應無方分故宗因云體即極微故同喻如能成極微能成極微以是極微故即無方分即所粗色即極微故亦無方分今破已即令粗色亦無方分也既成無方分者即立量云汝和合色是有法應不能乘光發影故宗中法因云無方分故如非色等非色等以無方分故非色等即不能乘光發影汝和合色無方分如非色不能乘光發影也若極微有乘光發影者如日輪才舉照一柱等時東西兩邊光影各現此柱東邊即乘光西邊即發影故知乘光發影處既不同即所執極微定有方分也若言無方分者即日照柱時照柱東時應柱西亦有光明即柱應無有影何以以無方分故以無障礙故即左右皆是難也若言粗和合色有方分者即應極微亦有方分又量云汝之極微是有法應有方分故宗因云即和合色故如和合色可知故知定有方分也若粗細二色有方分者即可分折如何言極微是實耶第二見觸無差難者難云汝若言極微都無者應眼見及手觸壁之時應見此邊時應見彼方分耶手觸壁時得此邊時應便得彼邊耶無方分故粗色既即極微者便有方分故知極微成粗色有方分者明知能成極微定有方分也以體即極微故也第三一應成六難者難云汝薩婆多若言無方分者即極微隨所住處應有六東西南北上下六方若無六方者即應東即是西南即是北既若六方有差別者即知極微定有方分以粗色是假微成粗色即有六方若言定無方分者即此粗色東邊便是西邊等若爾者即應如非色心心所也若似心心所法無方分無相貌者即如何更能成得山河大地等耶若不爾者明知極微有方分也第四極微無中表微聚不異難者若言極微無方分者即無中也此粗色既是極微成者即應粗色亦無中表也是極微成故七極微成粗色即一個極微既無中表無方分餘六個極微亦爾即粗色即是細色細色即應是粗色以極微猶自無中表無方分如何所成粗色即有中表耶既無中表者即非色等即是心心所也即汝薩婆多師相資義不成以極微無中表故更何相資也第五極微即粗色無方分應無障隔難者即汝有對粗色應無障隔以即極微故猶如極微極微猶自無障隔即所成粗色如何即有障隔耶若粗色有障隔者即應能成極微亦應有障隔也如何言無方分耶以汝執有對色即極微極微之外無有對色也極微若無方分粗色應亦無方分無方分故亦無障隔如非色等量云汝粗色是有法應無方分宗中法因云無障隔故同喻如心心所心心所無障隔故心心所即無方分粗色無障隔亦無方分也是故汝執極微必有方分有方分故便可分扸可分扸故非實有即諸小乘師一時向前來論主難我非實有色者即論主五識豈無所依色根豈無所緣色境下論主申正義者論主言雖非色而是識變非是心外妄執實有此言識變者意顯不同小乘師也我大乘宗相塵色皆是從種子生現行即此所造色等皆從自種而生假大種為能造也所以疏云大乘即用能造色即十有色是也即一切皆是第八識頓變也論主然識變時隨量大小頓現一相若生長時即漸漸長成大相必定皆是第八識頓變如松樹百尺初生雖未長成第八已頓變百尺訖也二云或一日一時頓變即念念頓變皆從種字生故心外實有也又如無色界人本來無身形若禪色究竟天時即前剎那無形後剎那從第八子頓生一萬六千由旬身故名頓變問曰如胎生生初生一念有羯羅藍中唯有七八二識第二念方有第六識乃至五七日五根具時方有五識如是經三十八七方出母胎作嬰兒童子乃至老死皆是漸漸生何名為頓變答曰雖即如此但不從心外極微生故名為頓變但從自種子一念即頓生名頓變也所以大乘即用能造色成即十有色是也問所造不從自種生要假能造造所造既從自種生何要能造造所造也答曰所造雖從自種生由有能造故所造得生若無能造所造雖有種定不生也問曰第八識中能所造何先何後答曰同時生也問曰既同時有如何能造造所造答曰雖同剎那以能造正生時所造還生以依能造起所造同時生也亦名能造造所造也問曰前來説皆是第八識頓變即更何用造耶答曰言頓變者種子生現行名頓變非如有宗極微成也若言種子生現行即所造色亦有種子生何用能造即以有為法仗因託緣彼方生故亦假能造造所造所造雖自有種以所造力劣不能自起要假能造為助緣也亦如大鏡鏡雖有火用要日光為助緣也疏云二者無對非極微成至法處色是也解云無對者以無對礙故是假色也即法處五般色皆是假色不對眼唯對意識故問曰逈略二色是假極微色又遍計是妄變所引非是即可言無對若定果實色五識既緣何言無對答曰一者言無對者但約多分説也二者亦是約細實定果及假定果説以眼不見故即法處色名無對若是粗實定果色亦不妨是有對也或言無是順小乘以小乘宗唯信有法處變所引色對故言非極微成者問曰大乘若有對是極微者即言無對非極微成大乘既有對中早非極微成何以無對中更言非極微成耶答曰此疏文順小乘云言非極微成也不爾前有對中大乘應是極微成耶即小乘唯信無表色是無對非極微成仍是實色即小乘有對中是極微成故所以無對中言非極微成也若大乘無表色是思依善惡分限假立無表色以防色發色假名為色也其實是思種上假立之下破小乘實無表從表生者問曰小乘無對非極微成即從何而生答曰即無表從表色生也下破云汝身表語表非實有以有動有動轉故即分扸分扸故即是假無體既無實體即表不成表不成者即無表何立以無表依表故以無有表不更何言是實耶語表實有以依聲上立故聲若一剎那無詮表故即表義不成即無表何立故知無表定非實有也大乘無表亦是假也可知上來四段不同總是正解色名從次第二六釋收攝如何疏云此色一字亦無六釋也以一個字無離合故六釋不攝也上來有二初正釋色二六釋收攝二文不同正是第二正釋訖也上來有二初標次正釋兩段不同總是大文第三釋色法名訖也自下第四釋第四不相應行名者分三初正釋名疏云第四不相應行如理應思已來是正釋名也二者與六釋相攝者疏云行即不相應持業釋也至相違釋也至相違釋已來是也三會釋論文者疏云有本云至俱實亦非心所相應是也三段不同東域傳燈目録云百法論顯幽十卷京總持寺從芳釋潞府記豫曾索之於我南京諸大寺經庫而未得為憾也久焉今茲君遙寄此書云斯書原本實是係大原良忍上人珍襲也惜哉首尾共欠不知何書誰作仍見奈何之乃案此本往往有現行頭上新種之語是所未見於基大師等章疏也偶撿唯識論本文鈔第二之四引顯幽鈔九本中有此語又間間舉薦福之説此亦本文抄第二之二所引彼鈔第七卷中所出也況乎無漏種緣不無漏種唯識及第六相例并相分攝在四番問答是本文抄第二之二所引彼鈔二末全文也當知此本是百法論顯幽抄二末也蓋釋論云一切法者略有五種乃至四所顯示如是次第之文也然則所謂疏主者指潞府義忠法師又云沿法師者或是玄沿法師百法論鈔乎今幸獲此珍本不勝歡喜之至敢記愚案以為答書而已定胤和南
