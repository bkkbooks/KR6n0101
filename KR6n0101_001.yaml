body:
  text: 見等二身見者即煩惱所知各有身見故此地不行也由斯四地說斷一愚一等至愛愚即是此中定愛俱者即定同時起貪著等至故障他四地也愛著定是菩薩縛也二法愛愚者即是此中法愛俱執著身實者名法愛也是所知障也此修道惑弁愚者皆是所知障弁非煩惱也愛者是貪也斷却此二愚即入四地也自下第五難勝地斷二乘般涅障者謂所知障中俱生一分令猒生死樂趣涅槃即同二乘之人猒苦忻寂即障他五地無著差別道能證所證名無差別故所名差別真如能證智名無差別道即觀生死與涅槃更無有差別何有忻猒耶即見有生死是妄今既知生死本無即涅槃也即所知虵即是麻也可思入五地時此下我障便能永斷此五地觀生死涅槃皆悉平等更無差別也若第四地中智同聲聞作四諦觀亦猒生死速趣涅槃入五地時便能永斷故由斯五地說斷二愚及彼麤重一純作意皆生死愚即是猒生死苦也二純作意向涅槃愚即此欣涅槃也此二愚即是猒苦欣寂入五地便能永斷也自下第六現前地者斷麤相現行障謂所知障中俱生一分俱生一分者即唯所知障之地故要斷之以前四地執四諦下所證理有染淨故苦集是流轉因果名染滅道是還滅因果名淨以見有染淨因果名麤相也世親攝論云亦名麤相現行障與唯識同也以望第六地說故名麤相也以七地名細也入六地時便能永斷即四諦觀因果有二染二淨此六地所證真如名無染淨真如也能證亦名無染淨智以非安立故由斯六地說斷二愚及彼麤重一現觀察流轉愚即是此中執有染淨即諸行流轉染分攝故觀苦集是是染流轉因果障執有染也障六地故二相多現行愚即觀還滅之道是淨相故即見有多麤㒵故正障六地無染淨真如智亦名無染淨智也此地更不觀四諦是染是淨本來清淨畢竟不可得也自下第七遠行中斷細相現行障謂所知障中俱生一分以執有生滅細相現行者即是有相也以六地有相少也彼障七地妙無相觀八七地時便能永斷由前六地作緣起觀觀流轉還滅所執有生滅微細相故故名為障以七地純無相觀障此無相故所證真如名種種法無差別真如能證智名妙無相智入此地時細相之障便永斷故由斯七地說斷二愚及彼麤重一細相現行愚即障中執生者猶取流轉細生相故即苦集諦也二純作意求無相愚即是障中執有滅者猶執還滅細滅相於無相作意勤求不能於空門中起諸勝行故今此地中既除此障能於無相門中不專懃求乃於空中起有勝行所言空者即無相空理即於真俗二諦雙起行故即於真觀中便能起得俗觀俗觀中即起得真觀即於無相空觀中便起殊勝行也所以十地論云七地中即空方便智發起有中殊勝行也於此地中斷此二愚也自下第八不動地中斷無相中作加行障即謂所智障中俱生一分令無相觀不任運故以有加行智故世親攝論云於無相作加行義同唯識也以前五地有相觀多無相觀少以觀心劣故於第六地有相觀少無相觀多由觀染淨平等真如多住無相第七地中斷細相生滅相故純無相觀相續故即有加行道也與八地別由無相中有加行故未能任運入無相觀不自在故未能現身土如是加行障第八地無功用故若入八地便能永斷故得二自在也八地已前入滅定時即定前意樂繫發也亦現相土未名自在不能任運即入八地時無意樂繫發加行心故即起無邊化身也故八地現相者任運現變金銀珠寶等也所現國土或大或小皆得也即相土皆自在故名得二自在也由斯八地說斷二愚及彼麤重一於無相作功用愚二於相不自在愚即令於相中不得自在故相土亦不自在也以有此愚障也八地已上純無漏道任運起故三界煩惱永不行故第七識中細所知障猶可現起也以生空智果不違彼故斷此二愚已得無加行道相用及土皆得自在也自下第九善慧地中斷利他門中不欲行障謂所知障中俱生一分令於利樂有情事中不欲懃行故樂修自利也彼障九地四無礙解十地論云不能善利益眾生故世親攝論云於饒益有情不能行故大意同也以八地中得無相行躭著擇滅不肯進修躭寂滅酒於有情不見有眾生相不度眾生也又不見有佛菩提相不求菩提是故諸佛叱勸方能進修佛言善男子修行道既至三僧祇劫府臨成佛如何滯著無相汝情昔本願願度無邊眾生誓願求菩提汝如何滯無相即佛勸已方能進求斷第九入心利他中不欲行障以障四無礙解四無礙解者一法無礙二詞三義四辨才也可知入九地時便能斷此利他中不欲行障也由斯九地說斷二愚及彼麤重一於無量所說法無量名句文後後慧辨陀羅尼自在愚二辨才自在愚將四無礙解所障法此二愚是能障也前第一愚障前三無礙解第二辨才自在愚障辨才無礙解且第一愚障前三無礙解者即於無量所說法陀羅尼自在者即障義無礙解也即於所詮義中總持自在於一義中現一切義也二者於無量名句文陀羅尼自在者障法無礙解也以對能詮總持自在於一名句文而現一切名句文也三者於後後慧并陀羅尼自在者障詞無礙解也即於言音展轉訓釋總持自在於音聲中而現一切音聲即諸方言音一切眾生音聲出現之也此愚若斷盡時即起得三無礙解也第二愚障辨才無礙解者二辨才自在愚此無明為障此辨才無礙解故名辨才自在愚令此辨才不自在故以有辨才無礙解故即能善達機宜巧為他說甚深法故即是四辨七辨也言四辨七辨者四無礙解智今云四無滯智也道理亦同也即四無滯以無漏後得智為體於義無礙解一分通本智故也四辨中第一法無礙解者解教是能詮故即名句文於此無滯故一切名句文皆曉故二義無礙解即是解一切所詮理故皆無滯也所詮中有真理是本智詮故三詞無礙解即解諸方言音四生六道音聲皆無滯故詞即是聲也問此與法無礙解何別耶答亦別前法是假名句文後詞無礙解是聲即實也故有別也四辨才無礙者即為眾生說法問此言說法即與前法無礙何別答亦別前約意解法故即不言說也今約能說不約所說法故即辨才無滯中更分七辨七辨者一辨說言即言無塞訥故塞者澁也吃者重也此菩薩說法不澁不重故名辨也二迅辨懸河津論不遲訥故即表菩薩說法流速也三應辨者即應時應機不增減故應時者即眾生根熟時應根者即三根差別皆應根而說也言不增者眾生宜聞少法即少說宜聞小乘即說小乘也不減者眾生樂多即多說樂大乘即說大乘法也四無疎謬辨者所說契理名無疎也不邪錯故名無謬也五無斷盡辨相續連還名無斷也終無竭故名無盡也六凡所演說豐義味辨一一句言多理事故即言少理多是菩薩辨凡夫說法言多理少故七一切世間最上妙辨具足甚深如雷清徹遠聞依智度論說有五種音聲從佛口出一甚深如雷雷一震即百草生芽蟄虫開戶令佛音聲如雷三乘聖道互生一切眾生啟生死戶一者清徹遠聞二者悅樂即經云悅可眾心也三者入心敬愛四者諦了易解諦者真實也了者了達了悟即是巧說諸法也五者聽者無猒行相可知也此愚障四無礙解故即第九障攝也此愚即得四辨七辨也自下第十法雲地中斷於諸法中未得自在障者謂所知障中俱生一分命於諸法不得自在即是情執執諸法有實自性是法執即於大法不自在也彼障十地大法智雲及所含藏所起事業大法智者即是緣真如之智譬如大雲故名大法智雲也及所含藏者即是百千陁羅尼門百千三摩地門諸功德法也即大法智雲含眾德水充滿身故即所含藏諸功德法所起事業即諸大神通也此十地諸功德法未自在者皆由此障也入十地時便能永斷也由斯十地說斷二愚及彼麤重一者神通愚即是此障中所起事業也二悟入微細秘密愚即是此障中大法智雲及所含藏法也如障應思之也微細秘密者即是所障微細妙境智功德也即第十地出心中障者即此十地於法雖得自在而有餘障未名最極謂有俱生微細所知障及任運煩惱種金剛喻定現在前時彼皆頓斷入如來地雖十法得自在亦未名佛也此法極微細二障要至金剛心方斷盡此障也即於第十地出心中開此障也以論文無別第十一障名也但佛地有二愚名也論云由斯佛地說斷二愚及彼麤重一於一切所知境極微細著愚即是此障中微細所知障也二極微細礙愚即是此障中一切任運煩惱障種也所以集論云菩薩得菩提時頓斷煩惱及所知障成大阿羅漢及成如來證大涅槃大菩提故也上來十地有斷十一重障治二十二愚者總是辨闢昏衢也此是他受用身闢他昏衢也問曰此皆是十地菩薩自起無漏智自斷惑如何言佛能闢昏衢也答曰理實是自斷但假佛說無漏教法為增上緣令彼斷障故亦名闢他昏衢也問曰何智能闢答曰通於四斷也若據實義唯妙觀察智闢也問曰十地斷障皆起二道否答曰皆起二道也無間道斷種現解脫道斷麤重習氣也問曰十地入心皆言斷障住出心中豈無惑障耶答曰准對法等住出有障即每地有三心皆有障斷也即成三十重障也即每心斷惑皆起二道即三十無間道三十解脫道也即每言斷障者但所知障若煩惱障十地中現行伏也煩惱習氣即每地解脫道斷也問曰三十重障多少時斷盡答曰薦福云每地三心各一僧祇即十地有三十僧祇方斷盡也問曰地前一僧祇初地至七地第二僧祇八地至十地第三僧祇因圓果滿如何言三十僧祇答曰梵云阿僧祇劫此云無數時言三無數劫成佛者此約大無數時也此言三十僧祗者約小無數時也上來總是辨闢昏衢義也即是第二兩句歎報身訖也自下第三有兩句嘆化身者分二初一句出現世間第二句辨說應機霏法等也上句大千但說器世間也第二句百億但有情也前句出現於大千第二句澤閏百億眾生也不爾即無別也疏云靉慈雲至百億者言靉者是雲盛之貌也雲興之貌也慈者大慈悲也即意業化也言雲者是喻即喻如來身業化也而者助句詞也誘者引也又誘也秀也秀是出也即引出有情令離苦海以如來有悲決定即從本智流出後得智後得智中有大悲故現化身也即化彼三乘五性人即大千界有情皆能化得大千是所化境也即靉慈雲者即如難陀龍王欲降甘雨先布慈雲七日已來令眾生知意定不損物滋閏百草然後降注於雨即此龍喻如來自愛用身雲喻化身也雲中所含注雨即閏一切有情即化身說法閏三乘之人也雲從龍雨從雲雲喻化身從慈悲心起故云慈雲也即依心有身依身有口依慈心起化身依化身方說法即依龍有雲依雲有雨即法報二身似龍起慈悲化身故又慈者意業化雲者即是身業化也霏法雨者即語業化也又靉慈雲者即經云靉靆垂布者義在茲也雲者有其七德一含雨德二光明德三警覺德四眾喜德五掩日德六清涼德七普遍德故經云慧雲合閏也如慈心龍王起雲含雨經七日不下待農夫作了方始下雨也喻佛慈悲雲內含其萬德待眾生機熟應機器而宣揚也即三七日是也二者電光晃曜喻佛化道明也三雷聲遠震者即警覺羣生即違者即生恐怖也即喻佛出興諸魔恐怖也四者令眾悅豫者即眾喜雲興當蔭覆即喻眾生見佛生欣仰心故五者日光掩蔽者即喻除煩惱之日即華嚴經說掩邪見日也六者地上清涼喻眾生於生死熱池得涅槃清涼也本日照地熱熱地燒著眾生今掩邪見日即於生死便得清涼即真如是地也七靉靆垂布如可承攬者靉者昧也靆者黑也即雲興盛之㒵也如可承攬者喻佛降靈作大模軌慈悲感令生欣樂當得作佛也承攬者可得之㒵也霏者細雨之㒵也即佛地經云起三業化等法者是法體也雨者是喻也即化身佛說三乘四諦十二因緣六度等或八萬四千法門方便之法由如細雨滋長一切有情道芽增長猶如細雨澤潤百草等澤者潤也百億者即所化眾生也大千者器世間也有說大千百億是屬對亦無別義即未祥之此化身大千界化諸有情名霏法雨而津百億也即法華經云其雨普等四方俱下者即喻四生也流注無量卛土充洽即如來所流之教普閏百億有情也從五俱輪說四諦即漸漸說乃至六度即霏也問曰此百億是何佛化境答曰是大化身所化境也小化身但化一四洲一四洲者即是一國也問曰如何得知答曰梵網經云我今盧舍那方坐蓮華臺周迊千華上復現千釋迦一華百億國一國一釋迦各坐菩提樹一時成佛道言周迊千華上復現千釋迦者即是大化身也言一華百億國一國一釋迦者即是小化身也即大千界者即是百億四天下百億須彌山日月等故知小化唯化一四州也此千華座是第一重他受用身所生蓮座也又言百億者總有四類一者十萬為億有百億也即大化境也上來總是依文辨也上來有二初玄辨三身二依文配屬總是辨第二所歸敬境也上來有二初辨能歸敬儀二辨所歸敬境總是第一總嘆三身勸修歸敬說也自下第二眾生無感應盡還涼者分三段初然以二字是結前生後二者懷生莫感殲我法雄者是辨應盡之因由也三者於是息唱金河韜光鶴樹者是辨如來入滅時處也三段不同且第一結前生後者然者是結前也問曰如何然是結前以是生後耶答曰謂前嘆三身皆是常住我今亦許故然也然者是許可之詞也前言三身常住理然也問曰我等如何不見佛身耶答曰下是生後之文也以懷生莫感者前來三身雖常住為眾生無感故所以佛不出現也即是生後之文佛身實是常住故即佛言吾身即是常身法身也但是如來方便示滅即法華經云實在而言滅以常見我故而生憍恣心但是眾生無感故如來入滅也此生後也言懷生者即懷者含義即懷含情識而生故名懷生也亦是懷含生死法故名懷生也眾生第八自證分中懷惑業故以二障惑業發業閏生故名懷生也又懷者即異生眾生有情之異名也即懷煩惱而生名懷生此有十種名一者名類生二名藏生三名群生四名懷生五名蒼生六名眾生七名含生八名異生九緣生十有情故有十種名也言莫者無也感者應也即懷生無感也以眾生不感如來出世故名莫感又感者如人家家和合稔等名感應也今感者眾生善根成就即感佛出世名感應既眾生善根未熟不感佛出世故言無感也問曰雖眾生無感但知出世何矣答曰有二義一佛本出世即為教化根熟有情既眾生根未熟說佛出世眾生不發心既化有情不得既無利益故出世何益故眾生無感佛不出世也二若眾生無感佛但出世即眾生於佛生猒即反墮眾生故所以經云不能生難遭之想等以佛慈悲恐反墮眾生故所以示相入滅也問曰佛出世謂何善根成熟即出世答曰但謂三乘順解脫分順釋分無漏善根成就也不為人天善根成就即出世也故名懷生莫感也問曰三乘順解脫分善順決釋分善與人天善一種是有漏如何唯為順解脫分善順決擇分善根熟者出世答曰人天善根但求人天世間有漏果也即順生死故以三乘順解脫決擇分善能求出利解脫無漏果故即順無漏也是故佛祖為無漏善根成熟者出世也今既無解脫善根成熟者佛不出世也故言懷生莫感也問曰憂波菊多化得無量人皆得聖果如何佛不出世耶答謂有一類眾生發願願於佛正法中成聖果所以滅度後正法中無量眾生聖果也此一分有情於佛無緣故佛不出世故言懷生莫感也言殲者盡也即是示相同二乘入無餘依涅槃更無身智故名盡也我者即是慈恩和上自稱言我法雄者即佛也三界獨尊智慧威猛故名法雄也故經云大雄猛世尊也上來總是應盡之因由也自下第三正辨如來入滅之時處者問曰於何時何處入滅耶答曰正辨時處者有二一云周穆王壬申之歲二云穆王五十二歲癸酉之年二月十五日即於第二解正也前壬申第二癸酉教一年也即二月十五日夜半子時入滅也處者即於中印土俱尸那城西去五里餘有金沙河此河南北流河西邊有沙羅林中入滅處也故言入滅時處也故疏云息唱金河韜光鶴樹者言息唱者息者止也休也唱者轉唱也以眾生無感故佛入滅休說法也故言息唱也依荼毗分中說如來於其中夜寂然無聲故言息唱也言金河者以河中多有金沙故名金河也涅槃經云阿利羅拔提河邊入涅槃也即梵云阿梨羅拔提河此云金砂河也問曰如來於此河邊入涅槃有何意趣答曰有所表故即河中有金其河中水念念遷流其金砂無不流故水念念流者喻眾生有煩惱流浪生死如水不住其身中清淨佛性即喻河中金砂也本無去來故金生麗水東俗所傳提河有金西土咸悉即生死如河流不竭故涅槃如金可寶重故即表生死中而有涅槃也如砂不流也故有所表矣佛於河邊入滅也故言息唱金河也言韜光者韜者藏也隱也光者如來常光一尋即金色光也圓光等是也又佛說法時皆放光明也又涅槃經云從面門放種種光從入滅後更不放光故言韜光也又言韜光者即入滅時欲荼毗時有一羅漢名迦葉從山中來於門徒家乞一千張白疊盛如來金色身著以金色身在彼白疊中藏隱故名韜光也言鶴樹者即是娑羅雙樹佛入滅時變為白色似鶴樹也即金河西邊有四雙樹佛於此林中北首面西入涅槃也即入滅時時此四樹便𤍜聲變為白色也四樹元青翠不變也即東邊有二樹青者名常樹變白者名無常樹南邊二樹青者名樂樹變白色者名無樂樹西邊有二樹青名我樹變白者名無我樹北邊有二樹青者名淨樹變白者名無淨樹問曰如何八个樹四个變白四个不變耶答曰此無常無樂無我無淨白色者表如來示相入滅也四个青者是常樂我淨不變表如來常住故云吾今此身即是常身法身言鶴樹者約變白者得名也此上第二正辨如來入滅時處訖也自下第三辨聖教相承法猶一味者於中分四初辨年代二辨能傳教人三辨所傳教法四答外難第一辨年代者疏云佛圓寂後百歲已前者言佛者西方名佛陀即是梵語也唐言翻略為覺義即略却陀義也覺者是佛也此亦念佛者以言佛者生善也若言覺者以呼之不生善也若准諸經梵本皆稱本師名為薄伽梵佛教安置此一言含諸功德故即攝得六義也自在等六德故翻譯之主意存省略隨前生善故名為佛也若約義解即是覺義覺義有三義故名為佛陀若闕一義佛陀義不成也問曰言覺義者唯佛名覺為復因中亦名覺義答曰因中亦有覺也以闕少故不名佛也唯佛具三覺故一自覺二覺他三覺行圓滿具三覺義方名佛也一自覺者即簡一切異生異生從無始至今常處生死長夜被無明所覆不自覺知復被生死所盲障其慧眼不見聖道不自覺知是故佛自覺者簡凡夫也二覺他者即簡二乘唯自覺不覺他以唯自利故問曰凡夫不自覺凡夫不名佛二乘既自覺二乘得名佛答曰二乘自覺亦覺他二乘許可得名佛二乘唯是自利攝不能覺他非佛攝以二乘猒苦忻寂之行故無利他行也問曰若約自覺亦覺他二乘自利不名佛十地菩薩具二利自覺覺他應名佛答曰十地菩薩具二覺自利利他理是佛十地覺行未圓滿十地菩薩不名佛以等覺菩薩猶有微細俱生所知障未斷盡故即未圓滿唯是解脫道中妙覺如來具三覺義故方名佛也佛地論云具一切智一切種智如睡夢覺如蓮花開言一切智者是根本智能自開覺即如睡夢覺一切種智即能開覺一切有情如蓮花開也是後得也一切智者即觀空智唯理唯真無分別故一切種智者即觀有智是事是俗智也如睡夢覺者如者似也即似夢覺也如人作夢見種種境執為實事不知是夢後夢覺已知之夢境皆空今本智亦爾前未起覺智時在有漏即執世間諸境為實今得無漏本智證真理故知妄境皆空今即生死為夢也如蓮華開者即後得種智似蓮華開蓮華開時香氣遠種智生時拔濟眾生得出離似蓮秀也或云如蓮華開者即華開以見華華者是子也種智生時化眾生已得果故如華開見臺也問曰如何名一切種智耶答種者類也即一切眾生根性若干種類此智能知一切種類差別故得名也即覺義者正是唐言也今隨方生善故言佛新翻經皆言佛薄伽梵為簡外道薄伽梵故所以置佛言也今云佛者有十義勝故一者覺勝天皷天皷無思成自事天皷有四德一者能覺諸天怨來言來怨去言去佛即不爾能令眾生覺三毒煩惱若煩惱生令知生若滅知滅也二者天皷能護諸天眾能破脩羅佛名不爾能護群品能破四魔三者天皷能令諸天受五欲樂佛名不爾能令眾生受出世樂四者天皷能令諸天生貪著佛名不爾能令眾生生出世心不貪著故二者佛不由他悟唯由無師智覺一切法即是自開覺智也以居果位更不由他故名無師或智性名自然智相名無師能覺一切也三者斷二無知即斷煩惱所知障也四者已過眠夢凡夫眠而不夢長在無明窟煩惱成之也二乘亦眠亦夢有無明故亦是法執忘智故佛不眠不夢無無明已捨忘執故五者猶如蓮花日光所觸蓮華即開十地行圓佛智自發六者性淨無染有五義不染一體無相故譬如烟霧不能染空二是能對治故譬如熱䥫不停蚊虻三非處所故譬如大石非空而住四不轉變故譬如白玉涅不淄五忘不能染真譬如幻刀不能斫石具上五義故名性淨無染也七者具足三身八者三事涅槃即具足三德也九具三寶性即同體三寶也十者自知令他知以智力照真如境名自知復以悲力說十二分教令他知具此十義故不舉餘也即妙覺中如睡夢覺如蓮華開雖諸惑障圓顯法身即妙覺獨名為佛因中不爾也覺義者正是唐言也今言佛者即不翻也以佛生善故不翻之但言佛也言圓寂者梵云波利呢縛喃此云圓寂波利名圓呢縛喃名寂圓寂者圓謂圓滿寂謂寂靜雖煩惱障得真勝義名寂靜故名圓寂圓者遍義簡諸法自相自相以局自體故不遍非圓也此圓者遍一切處唯一味故寂者簡有為法有為法非寂也以有生滅故即簡共相法也或有為法四相非寂也今言圓寂者是涅槃義也舊云泥丸者不善翻譯也即傍辨涅槃義也問曰涅槃有幾種答曰有四種涅槃也問四種者何答一自性清淨涅槃二有餘依三無餘依四無住處即因此傍解涅槃義也略以七門分別一釋名二出體三約人四約障五與大般涅槃相攝六與六無為相攝七問答分別且釋名者一自性清淨涅槃者謂無如來本性清淨雖有容塵覆之而不能染故名自性涅槃在凡夫一切有情清淨佛性即是本來自性涅槃也若在無情名法性此自性涅槃在異生身平等平等也即不假斷障所顯也以本來涅槃故即唯識論云一本來自性清淨涅槃謂一切法相真如理雖有客塵而本性淨具無數量微妙功德無生無滅湛若虗空一切有情平等共有與一切法不一不異雖一切相一切分別尋思路絕名言道斷唯真聖者自內所證其性本寂故名涅槃即入三乘見道即證自性涅槃也自性淨淨即涅槃持業釋也以遍一切皆是真如與彼為性也即青青翠竹盡是真如等也故言不一不異也雖一切相絕諸戲論超過尋思名言道斷口欲談而詞喪心欲緣而慮忘雖四句絕百非唯將得本智內證故涅槃經說本來而有自不曉悟迷處輪迴生死此性猶如貧女宅內真金之藏家人大小無有知者時有異人善知方便於此貧女家中掘出真金之藏貧女見已心生歡喜生奇特想敬重此人善男子眾生佛性亦復如是此是涅槃經文解云一切眾生不能得見真如性故如彼貧女不知金藏也今能普曉示一切眾生佛性者即是如來也貧女即是一切愚迷眾生也真金藏者即是佛性也意云但眾生迷悟差別其佛性本來平等而有也即法華經云示佛知見即將此性曉示三根令悟懃修行故即得證入也故經云諸法寂滅相不可以言宣故本來自性清淨故名涅槃也二有餘依涅槃者餘苦依未盡故名有餘依謂斷煩惱障盡餘苦依在名有餘依此約二乘出煩惱障雖苦依身苦而障永寂故名涅槃也以離縛法故名涅槃故唯識論云有餘依涅槃謂即真如出煩惱障雖有微苦所依未滅而障永寂故名涅槃也有餘依之涅槃依士釋也三無餘依者謂斷煩惱障盡又苦依分段身已亡故名無餘依以二乘化火焚身入無餘依界故名無餘依涅槃無餘依即涅槃持業釋也即離二種纏故名無餘依煩惱既盡苦依亦亡離喧煩惱故名涅槃也故論云三無餘依涅槃謂即真如出生死苦煩惱既盡餘依亦滅眾苦永寂故名涅槃四無住處涅槃者謂初地菩薩分斷所知障分證得無住處涅槃也問曰何名無住處答曰謂證二空理便獲得悲智有智故不住生死有悲故不住涅槃故名無住處涅槃即真如體無有住處故無住處即涅槃持業釋也若悲智同依一理故名無住處之涅槃即同依釋也又無住是悲智涅槃是所證理將所證涅槃就能證悲智說名無住處涅槃即依士釋此非二乘得此無住處涅槃以二乘不能出所知障故所以不得此涅槃也問曰佛位即言有悲不住涅槃此菩薩有悲不住何涅槃耶答曰頓悟不住自性涅槃無覺漸悟不住有餘依涅槃也故論云住處涅槃謂即真如出所知障大悲般若常所輔翼由斯不住生死涅槃利樂有情窮未來際用而常寂故名涅槃也上來第一釋名訖也自下第二出體者一自性清淨涅槃以在纏出纏真如為體謂一切有情雖有惑障纏擾其身中清淨之性常有故即凡夫身中自性涅槃即取在纏真如為體若二乘無覺十地菩薩已去取出纏真如為體即有餘無餘體即自性也二有餘依涅槃即取出纏生空真如為體謂二乘無學煩惱斷盡故名出纏顯得生空真如故涅槃但以出纏真如為體三無餘依涅槃亦以出纏生空真如為體若約大乘亦有法空真如為體問曰有餘無餘皆以出纏生空真如為體二涅槃有何異也答曰有餘依涅槃斷煩惱障盡名出纏真如為體即出一重纏無餘依有二一出煩惱纏二出苦依分段身纏以出兩重纏故名無餘依所以有餘無餘有差別也四無住處涅槃以出纏二空真如為體以斷分別二障盡分顯得涅槃名出纏也問此言出纏佛位可爾菩薩煩惱在如何名出纏答初地已出分別二障亦名出纏若俱生未出即半出即半不出也此後三涅槃非在纏真知為體但以出纏真如為體即是擇滅真如為體若約體無別但約用即三涅槃有異也問如何自性涅槃通在纏後三涅槃唯出纏答曰自性涅槃不要斷滅顯故本來清淨故通在纏真如為體後三涅槃唯是斷煩惱盡方顯故所以唯出纏真如為體也自下第三約人辨者自性涅槃一切凡聖皆有此涅槃無有有情不具此涅槃者即一切有情凡之與聖皆有初一由此經云一切有情平等共有本有涅槃若約證得即三乘見道初證得故二有餘依者佛位得也二乘無學亦證得此涅槃若凡夫二乘有覺皆未證得後三涅槃也即二乘有覺與一切凡夫有初一也二乘無學具前菩提也唯佛世尊獨具四涅槃也三無餘依涅槃二乘無學證得也二乘無學中若是趣寂入無餘依者即得此無餘依若不定性迴心即不得此涅槃也以灰身滅智故十地菩薩有餘皆不得以得初也佛位有極成也第四無住處涅槃十地分得餘二乘皆不得無住處涅槃也以無悲智故若至佛位中四涅槃皆全得故論云一切有情皆有初一二乘無學容有前三唯我世尊可言具四容者不定若不入無餘依者即有前二也自下第四約障辨者障有四一煩惱二者煩惱障中餘苦依分段果報障三所知障四所知中有變易報障此有六位辨四涅槃一凡夫并前三果人煩惱障位內唯有自性涅槃以此煩惱未斷盡故二者二乘無學斷第一煩惱障得有餘依并自性二涅槃也此說未入滅者三者二乘無學斷却第二煩惱障苦依分段盡得無餘依并前二得三涅槃也四者頓悟菩薩斷却第三所知障分得無住處涅槃并前自性涅槃也五者漸悟有學迴心同頓悟說也若無學迴心至初地斷所知障得三種涅槃也即自性有餘無住處也六者佛位斷却第四變易障盡四種皆得也自下第五與大般涅槃相攝者問曰前來說四涅槃大槃涅槃即四涅槃中何涅槃相攝答曰雖四涅槃不同若至佛果總名大般涅槃也此解大般涅槃有二一者於真如上義說三德涅槃二者正辨三德涅槃且第一於真如上義說三德涅槃者即真如體上三義具故成大般涅槃也即是摩訶般若解脫法身即謂真如體即是圓覺智故名無上菩提也即智名為摩訶般若也即是大智故真如體即是覺性也即依真如上亦有智義也以能與大智為所依故即所依處亦名智也問曰以何知之答曰大智度論云說智及智處皆名為般若即真如是智所依處故又解深蜜經云菩薩菩薩斷皆名為菩薩意云即智起時斷或顯法身法身名斷德故此是真如上義說為大般涅槃也問曰如何真如上義說名法身答曰此真如至果名法身者極成也不是義說之即此法身出所知障盡處顯得實如名法身也故勝䰓經云在纏名如來藏出纏名法身二乘不斷所知障不顯法空理故非法身也但是離煩惱障解脫處顯得解脫身非法身也非功德法所依止故此佛位具二義名法身一離縛法故名解脫身二離所知障名法身也問曰如何真如體上義說名解脫答曰以真如體上眾苦都寂亦性本無染名解脫故在二乘雖無煩惱未離分別所知障故不名真解脫也未圓滿故即果位真如出纏顯得與無為萬法依止名法身也即真如一體具此三德涅槃也故此三德名大般涅槃也第二別辨大般涅槃者即涅槃第二卷說要三事具足名大般涅槃者能證二空之智法身所證二空理解脫者即是由智證理障盡所得假擇滅體故即異於前解也即性相差別也即摩訶般若是能證解脫即是所斷惑盡處名解脫也所證理名法身也即此三法定非前後也即涅槃經云大般涅槃要三事具足名大涅槃也即摩訶般若是梵語此云大智也法身是所證理也解脫者是智證法身時二障皆盡離縛義名解脫也如西方伊字三點成伊字也即三點不縱不橫不一不異此三德大般涅槃亦爾也不縱者非上下累也言不橫者即不前後也言不一者即三義差別不異者體差別也智正起時即是顯法身法身正顯同時離縛故得解脫三法定同時也更無前後故即兩點在上即是智及離縛也一點在下即所顯法身也即如倒品字也即大般涅槃不縱不橫不一不異即理智說名不一不也若攝相歸性名不異也又伊字即三點雖縱不橫乃相離今涅槃三法體不相離又喻之如虗空是法身日光為般若空中闇盡處名解脫亦不前後故問伊字如倒品摩醯首羅目即一點在上二點在下即與伊字不同如何皆喻三事涅槃何者為是何者不是耶答即各據一義且如伊字兩點在上一點在下者即能依所依解下之之一點一是法身為所依故上之兩點是摩訶般若及解脫俱是能依故在上也第二如摩醯首羅者即是能證所證解上之一目似摩訶般若即能證也下之二目似解脫及法身即是所證也解脫雖是擇滅亦是所證故大意但取不縱不橫義西方伊字三點不相離相離者即伊字不成即似此也又解脫者即由能證智證法身時二障滅盡更無縛法即假說名擇滅即是解脫也即此三事涅槃名秘密之藏也故言不縱不橫不一不異唯佛得有三德涅槃至果位皆名大般涅槃也非如小乘解此三法體別有其三亦前後別得也將此四涅槃與三德涅槃更分別不可說定異也問此三德何是假實答曰智與法身是實解脫是假以離縛義假名解脫也自下第六將四涅槃與六無為相攝者此門意四涅槃六無為中何無為攝且自性菩提六無為真如無為攝若有餘無餘即擇滅無為攝以斷縛得故若無住處涅槃有兩師解第一師解云無住處涅槃斷所知障所知障覆法空理但斷此障證得真如故於真如中収不是擇滅攝也問曰此無住處涅槃亦是斷障得所知滅處亦是真擇力簡擇滅故如何非擇滅攝答曰定非擇滅攝擇滅者是斷煩惱障縛法離生死縛此所無住處涅槃斷所知障得以所知障不招生死非縛法故顯真如但是非擇滅攝也難曰煩惱障障有餘無餘涅槃斷煩惱得擇滅涅槃此所知障亦障無住涅槃如何斷彼不是擇滅攝也答曰此所知障不招生死非縛故斷此障時不是擇滅攝也即所顯得無住處涅槃是大悲般若補翼真如不着生死涅槃故名無住處涅槃不是斷縛所顯故非擇滅攝也問曰有何教據答曰唯識論云諸無為中初後即真如中二擇滅攝此四涅槃應作四句分別者一唯涅槃非擇滅者即是自性涅槃無住處涅槃二唯擇滅非涅槃者即前三果人斷煩惱障三亦擇滅亦涅槃者即是有餘無餘涅槃也四非擇滅非涅槃者即一切有漏有為色法等是也此是第一師義訖也第二師云無住處涅槃亦擇滅攝也由真擇力滅障得故其無漏慧斷煩惱障故名擇滅無漏慧斷所知障盡亦名擇滅也即感生死煩惱斷名擇滅所知障亦名滅得無住處涅槃故知擇滅攝也是故唯識論第十說云四圓寂諸無為中初一即真如後三擇滅攝也自下第七問答分別門者問曰如何前三果人是有學不分得有餘依涅槃初地有學即如何分得無住處涅槃耶答曰有餘依涅槃據全斷盡方得有餘依所以前三果不得也若大乘初地分得無住處涅槃以有悲智故即許分得也問曰佛位如何有有餘依涅槃若言佛有有餘依者即應佛有苦依身未盡也若言佛有無餘依涅槃者即應佛身智俱滅如何能現他化身耶所以論云如何善誓有有餘依答曰有二解一云佛位義說有四涅槃即非有有餘依也又有餘依但是示現有也即現有苦依身如背痛等也無餘依者即雙林示滅化火焚身身智俱滅即示現有無餘依涅槃也二云佛有四涅槃寶也從金剛無間道後捨一切惑障變易生死一切習氣盡名無餘依涅槃也以無苦依故名無餘依也即佛身是學妙色身名有餘依也即捨無常色獲得常色也即先得無餘依後得有餘依也即顯有前後其實齊立也問曰四涅槃何名無上涅槃答曰但取無餘涅槃名無上涅槃也問曰二乘亦有無餘如何不名無上耶答曰二乘身智都寂不能舉動施為但名下劣涅槃也佛果無餘形對二乘立也名無上涅槃也以能熾然起身智用而常寂故名涅槃也以小乘無餘涅槃無身智故不名無上今說果無餘涅槃名無上問曰佛唯說無餘涅槃名無上為復亦說三涅槃名無上答若至佛果四種涅槃總名大般涅槃總名無上問自性菩提佛果有果中自性說無上一切眾生有自性自性涅槃名無上答曰雖有自性惑染覆故不得名無上若如是者初果斷惑亦顯應得名無上答初果不證有餘依所以非無上問無學已證有餘依應名無上答是苦依身故不名無上唯佛樂依故說名無上問二乘無餘無苦依應名無上答二乘無餘無作用復無身智故不同佛無餘有作用有身智故若無上問佛果無餘總無身所言無上今既有身云何名無上答無餘必竟總無身二乘無餘不無上佛果無餘是有餘所以名無上問佛果有餘無餘既參雜何名無上答有餘無餘並然別在彼二乘不無上佛果即無却是有有無不碍說無上問無住涅槃菩薩亦有何不名無上答是分得不同果位全故所以不名無上即小乘入無餘依唯有清淨法界無其身智故名下劣也一性宗云雖即身智似滅即第八無不滅即隱在真如藏中後時出無餘涅槃受變易身修大乘行也或入無餘依時便入變易身八六四萬劫至大乘十信初位也五性宗云入無餘者是定性聲聞也即灰身滅智同大虗空一切皆無也以佛言不受後有我生已盡等以因亡果亦喪也若言入無餘後却起生者應更受後有身即違佛語也一性難云汝五性宗不許入無餘後受變易者即如何舍利弗受記作佛如何化火焚身耶即無身智華光佛身從何而有也若不許受變易者即受記者虗言也五性答云舍利弗化火燒身但焚化身也非焚實身實身受變後時成佛何爽一性云若入無餘涅槃身智俱滅者即有情界減也如何世尊言有情界從無始不增減耶既不許有情界減者即五性入無餘灰身滅智義不成也即一性宗自結云佛言灰身滅智者但是訶責之言也即有情界又不減也此承前古解兩宗無平文也若據愚見有似一性宗勝也亦未敢祥究也可知問曰在滅定位以無心如何化火耶答曰欲入定時先發願願住定多少時節承先願已滿火從定中起焚身若無願力定中不死也事須出定散心中死也問曰四涅槃中何假實答曰自性涅槃是實後三是假依真如立也自涅槃即真如是也是實無過也上來辨涅槃義有七門總是解圓寂義訖總是第三辨年代訖也自下第二辨能傳教人即是異人挺生群聖間出是也且辨異人者即是能傳教之人也即異人挺生總嘆五人德也異人者即是奇異之人也越於凡常人故名異異者即五常教中說人為五常之首即人義禮智信人為首也人者是五義即溫良恭儉讓等此五人雖人義同越於常人故名異人也即是非常之人異常故名異也言挺者即挺特而生即出現之義切韻解挺訓出也言羣聖者即五人皆聖故名群聖也又羣者眾也即簡異凡夫此五人無非是聖也即有多聖人出現名群聖也言間出者間謂間隔即隣次相間而出也問此五人各相去年代多少時答曰此五人共有一百年出難曰若千年一聖出五百年一賢出可言間出既若共有一百年如何言間出耶答此聖人出雖同一百以各居一國出名間出或五人隣次間隔而生名為間出又五人相繼不斷名群聖時不同故名間出也言五人者一迦葉二阿難三末田地四商那和修五憂婆菊多且第一大迦葉波者梵云摩訶迦葉此云大飲光此人身上金色光為能吞飲日月之光又云少欲知足也此大迦葉不是憂樓頻蠡迦葉等三人此大迦葉少欲知足常行頭陀行也在靈山修行次忽然見光明等天雨四花大地振動迦葉見此異相便入定觀乃見大師在林中入般涅槃也火急便至涅槃會上來顏㒵慘然中路逢着外道外道手儛足蹈報迦葉言瞿曇在日教法如火瞿曇滅後教法如煙不久即滅也迦葉聞之轉更悲慘至涅槃會乃見世尊被諸王等及大弟子荼毗焚燒迦葉悶絕良久乃蘇即焚燒不着迦葉繞金棺行道發願請世尊付樂教法世尊不現身即雙足足者足跡意在迦葉屬付教法也迦葉見世尊現足深得世尊意世尊便從心化出火自焚燒焚燒已又從心府藏化出香乳流至四邊遂滅其火収得八碩七升舍利諸國王等戰諍取舍利供養迦葉言不應戰諍但各分取供養即迦葉語葉語諸學言此供養作福之事是俗人應為佛弟子等應須結集聖教若不結集三藏聖教聖教不久即滅恐中他外道言故事須結集也作此語已諸天子等請迦葉結集法藏廣利眾生即是六欲天子等請也遂說偈請偈云耆年欲恚慢已除其形喻若紫金柱上下端嚴妙無比眼目清淨如蓮花又諸大阿羅漢語迦葉言尊者知時今法船欲破法城欲頹法海竭法幢倒願大慈悲早結集法藏即迦葉亦恐諸大阿羅漢入滅去遂交弟子作神通至妙高山頂擊犍槌犍槌中有聲遍大千界聲中有言有是佛弟子者不應入滅久住羅漢聞已皆來結集即召得萬餘人凡聖相計迦葉語諸羅漢言若日久求化遣日即恐外道結難且務對之如何更結集得耶為闍王是王舍城國主遂請為外護主致養事王遂許之王言我即受尊者之言我亦有請若尊者入涅槃時即與我相報迦葉亦之也遂將諸羅漢於畢鉢羅窟內結集法藏即付法傳云置四高座此窟在摩竭陀此云無毒害國國人有過皆遣出國於此國正中有城名上茅城也梵云矩奢揭羅補羅城唐言上茅城摩竭陀國之正中古先王所都之處多出勝上吉茅草因以為名也崇中四圍以為外郭西通狹俓即小路也北闢山門闢者開也其城東西長南北狹周一百五十里內宮子城周四十餘里羯尼迦樹遍諸道路花含殊馥殊馥者香也色爛黃金暮春之月林皆金色此樹唐言無敵對即不翻也或云懷樹也宮城北外有一窣堵波是提婆達多與未生怨王為親友放護財醉象欲害如來如來指端出五師子醉象降伏處次此東北有窣堵波是舍利子逢馬勝比丘得初果處次此不遠有大深坑是室利菊多此云勝密火坑毒飲飯欲害佛處次宮城東北行十四五里至姞吉栗陀羅矩吒山唐言鷲峯接北山之陽孤標特起既栖鷲鳥又類高臺空翠相暎濃淡分色佛成道後四十餘年多居此山廣說脫妙法西邊山名毗富羅山也城北有迦蘭竹園西五六里近南山有大竹林中有大石窟名畢鉢羅在七葉巖間於此窟中結集迦葉將諸羅漢至窟中欲結集遂見大眾中有凡夫者遂簡去之唯取聖者就聖者中又簡去有學唯取無學無學中又簡去慧解脫者唯取俱解脫羅漢三明六通具八解脫者有說千人者亦有說唯簡得五百人俱解脫羅漢其時阿難是有學被簡出也窟內唯是俱解者窟外唯是有學及凡夫亦有千餘人阿難被簡出便向林中習定修行斷惑於一念中起上上智斷却三界俱生煩惱盡得八根本定一念得俱解脫大阿羅漢遂却擊窟門中來迦葉言汝是有學如何擊門也阿難言我已得無學迦葉言既得無學即戶鑰中入來阿難遂化神通而入窟內由來結集窟外諸大眾凡聖等還結集諸藏即於先結集也窟內在後結集迦葉為上座忽然不見憍梵波提遂遣一人至妙高山頂尸利園中喚憍梵波提憍梵波提巳世尊入滅不來遂化三道定果水水結偈云憍梵波提頭面禮尊者迦葉紫金身象王既去象子隨大師入滅我隨滅便化火焚身也即迦葉見憍梵波提不來遂便結集先請憂波離為首座結集如來一代時律藏次是阿難結集經論二藏也即此窟外大眾於先結集了窟內却在後也窟內便內便是上座部窟外是大眾部即大迦葉為教主也問曰同時有大羅漢如何迦葉偏為教主兼阿難等答曰此等皆是佛在日以玄記也即傳中說也即迦葉為散主經二十年廣作佛事宣法藏度脫有緣及同梵行化緣將畢即自思惟我今年邁深可厭患世間今涅槃時至遍禮舍利於四塔八塔前禮也將入涅槃即教法付與誰人誰人堪受付囑即命阿難佛已記之即依受付囑也阿難恐迦葉入涅槃不離左右曾不捨離後於餘時告阿難曰汝獨入城乞飯我亦當隨往爾時迦葉着衣持鉢入王舍城便作念云阿闍世王本與我為約若涅槃時必來相見我今當往問闍王既到王門守門人語言王正睡次新有嚴命我若睡之時不許奏事若警王覺罪我無限迦葉具陳上事而語門人曰王若覺已為我申意大迦葉欲入涅槃故來辭王遇王消息不敢驚勅旨語門人訖而去即往鷄足山也闍王於夢見屋樑折忽驚覺已心生惶怖門人遂來白王言迦葉欲入涅槃來與王別值王睡次不見而去王聞語已發聲大哭悶絕躃地良乃星我何薄福垢障深重諸聖涅槃不覩一人遂往竹薗所禮阿難足問其處所阿難云尊者在雞足山去也即闍王嚴駕與阿難同往鷄足山山有三峯由如仰鷄足也即尊者未入山時遂發三願一願我入此山中三峯即合掩蔽我身二願闍王與阿難來願此三峯却開令彼得見我身若不見我身恐彼二人終於此處三者願我將此如來金蘭袈裟及鉢盂待彌勒慈尊下生生將此衣鉢奉上慈尊發三願已即入山中三峯掩合為一諸天雨花遍覆迦葉身闍王與阿難至三峯却開見迦葉儼然而坐即以種種供養供養已具知教法付囑阿難闍王欲將香木焚燒迦葉阿難語王曰此尊者入滅盡定持僧梨衣待彌勒定力任持假使劫火亦不能燒況是世間火而能燒也王聞已焚燒心息盡情供養已與阿難却下鷄足三峯還合為一也即婆娑一百四十五云釋迦滅後經五十七俱知六十百千歲慈氏如來應正等覺迦葉從山而出而出作禮慈尊以僧伽梨衣跪上慈氏爾時彌勒受僧伽梨衣三會度人廣宣妙法廣如婆沙說也上來辨第一教主訖也次第二教主者即是阿難即闍王見阿難受付囑已即告阿難大迦葉入涅槃我亦不見如來入滅我又不覩若尊者入涅槃時事須與我相報王與阿難為約已即却歸入城即阿難廣說法藏彌布世間利樂眾生及同梵行任持教法命不斷絕經二十年行至一竹薗所見有一比丘錯習伽陀云若人生百歲不見水老涸不如生一日而得覩見之阿難忽然聞見慘然悲嘆世間眼滅何期今日顛倒忘言阿難遂與正此偈云汝所習者不是佛偈汝當諦聽與汝宣佛偈偈云若人生百歲不解生滅法不如生一日而得解了之比丘聞已說於本師尊者阿難示我此偈本師云阿難老邁智慧衰劣言多錯也不可信之汝即依前習我偈却至竹林習舊偈阿難重聞舊偈即却問比丘云我語汝如何不依我之說偈比丘云我師言阿難以昏昧不堪為師範俱依舊習也阿難聞此語已即自嘆言此小比丘由不依我教我住世何益不如早入涅槃即阿難無弟子受付囑也世間甚難久住吾師同梵行皆悉入滅遂作念已為闍王先與我為約我當辭去遂行至王宮告守門人曰阿難尊者在門外將欲涅槃故來相別門人答曰王今睡不敢警動忽若覺已罪我非輕阿難云王若覺時與我傳意闍王夢中夢見傘蓋落忽驚覺門人奏王具陳阿難之語王聞悶絕良久乃醒發聲號哭而作是言嗚呼恠哉世間眼滅三界苦惱誰當拔濟一切眾生永沉生死也王問門人阿難於何處入涅槃門人答言不知即竹林所有竹林神白王尊者阿難向毗舍離國入涅槃去也闍王聞已即嚴駕四兵往恒河側即見阿難至恒河中流王言何期三界明燈已棄我而去唯願尊者不須涅槃其時毗舍離城神即報毗舍離國言尊者降阿難於我國內入涅槃即恒河神又請阿難淹然不語于時大地六種震動天雨四花即雪山中有五百仙人見其異相至阿難所難化水為金地為仙人說法時仙皆得道果其五百羅漢皆欲先般涅槃即阿難念曰佛記健馱羅國當有比丘名末田亦名末田底迦也與商那和修同時受付囑法藏即恒河中龍王請阿難在河中入涅槃空中帝釋又言唯願尊者向我宮中入涅槃阿難進退不為四王遂化火焚身入涅槃分為四分也即四王各収一分供養也此辨第二教主化緣化緣畢也從次辨第三教主者即是末田地者是舊譯也若名末田底迦者為正即末田地此云金地以阿難化水為金地時以得果故名金地二云末田底迦此云金頭以頭髮似金色故名金頭也即阿難云世尊付法與迦葉付法與我我付囑與汝末田地即雙付二人也問曰此二人是同時如何末田地先為第三教主答曰為約位次即商那和修合為第三教主也謂商那和修與憂波菊多有緣合為弟子以憂波菊多為第五教主故所以將第三商那和修為第四教主亦無失也問曰此末田在何處往化答曰如來在日將諸比丘飛騰遊行至於迦濕彌羅國佛告諸比丘等當知於我滅後五十年中有大羅漢名末田底迦化於此地造五百伽藍即是佛懸記此人也即末田地聞佛玄記之即我今得道以了心生歡喜即往彼處大龍池中去即末田地先從他龍王邊乞其龍王大忿嗔與此尊者覺神力即尊者是大阿羅漢作十八變現大神道以龍王是業通故即龍王墮附也即龍三見尊者威力雄猛大地振勤其龍王問尊者云乞大池應不得若乞少分我應得尊者云我欲此處造一精舍流行法藏也以如來玄記我於此地中王化造立精舍亦不乞多即要一座具地或一膝地不定也其龍王聞已即許也如是尊者即展座具時水即漸漸縮少座即漸漸展大乃至造得五百伽藍池唯於西南角留少分水周圓十五里也龍王於此西南角居也此池後造五百所伽藍經一千年既有精舍眾僧須得淨人供給乃於諸國貿易即此淨人後經多時僧眾轉少淨人轉多即淨人相扶為王隣國皆言為之奴國梵云乞利羅此云買諸國皆輕之不相交往後時羅漢即於此國化火焚身入般涅槃即是羅罽賓國或云迦濕彌羅國是也此辨第三教主也自下第四辨商那和修者亦云胎衣是舊譯也若新翻者即梵云商諾迦縛蹉此云草衣此尊者過去久遠時曾為假客入海求珠逢一和上是辟支佛身着草衣即此商主以衣奉施此佛并供養遂發願云願我當來似此和上還着草衣願我所事和上即勝於此和上倍萬倍即阿難是也發願已至後身時與胎衣俱生隨身長出家之時變為着草衣故云胎衣也後至涅槃時留此衣以表法也即傳云此衣若損時法亦漸滅也即唐三藏從西方來見此衣以損也將知佛漸似滅也故云衣有所表即商那和修受阿難付囑即班宣法藏廣度有緣也即佛玄記云摩竭陀國有長者名曰菊提菊提有三子最少之子於我正法當得聖果也其尊者商那和修即記得佛玄記後時將千徒弟至彼長者家與菊提長者為門徒後時更去即徒弟漸漸少更經後時尊者獨自一身至菊提家即長者問曰前度有眾多弟子如今如何獨自一身來尊者答曰弟子捨我而去便問長者云能與我為弟子否即意不在取長者身意在第三子也此菊提長者無子息長者云我不能與尊者為弟子我未離財色故若後時有子息即與尊者為弟子也尊者見許子便去後時長者生得子名阿難陀菊多尊者便從長者乞長者不肯我家業廣大要此子貿易也若更有第二子必與尊者尊者見許許遂去後時有第二子名阿叔畢菊多尊者亦從乞長者亦不肯我第二子知外第一子知內若有第三子即一任將去尊者遂去後時長者有第三子名優波菊多尊者從長者乞彼亦不肯尊者即衫理教化此第三子汝經已為白心多力里心彼問曰何是白心黑心耶尊者答曰饒益人是白心不饒益人是白心不饒益人是黑心菊多答曰我唯黑心多尊者言汝應黑白二石子益人者置一白石子損人者置一黑石子乃至後時唯有純白石子尊者便謂說法此菊多便於言下得證初果以黑心者是貪嗔癡等白心者是信等十一法也即尊者白四羯磨乃得第四果也既化得弟子自亦不入涅槃於一山中領諸徒弟於此山中修行也自下第五教主即是優波菊多既受付囑已廣宣法藏度脫有緣利益群生若有夫妻二人相愛者化得獲得聖果者以折細草為籌籌長四寸在一石室從廣一丈六尺或云三丈者不定也折籌滿室後時涅槃取焚身得足每度說法皆有得聖之者後時說法座下多人不證道果菊多作念我說法時無有不得聖果者今此眾中與我無緣者應是吾師方能化得也即商那和修於山中遙知菊多憶念便作神通至菊多所其菊多不在既至已即於繩床上坐其菊多弟子見髮爪長利不知是大阿羅漢遂作罵你是何方老僧坐我和上繩床即便推挽由如須彌山終不能動遂報菊多菊多云應是我大師至彼果如所言即以頭面而作禮問訊起居諸弟子由自憍慢不息雖即我師作禮未必道德勝於我師也即知諸弟子慢心未除安坐之次即於指端放五百道神光或有云五百道香乳亦不定也商那和修即告菊多曰汝知此瑞相從何禪定而發菊多見已即入定中盡其神力了不能知乃白和上云我盡神力不能知此神變師云汝應不知以世尊三昧神通大迦葉不知迦葉三昧阿難不能知乃至我有神通三昧汝不能知此是龍奮迅三昧今付與汝汝當受付於是諸弟子等憍慢心悉除言下皆證得聖果商那和修即於此處入於涅槃菊多乃収舍利起塔供養於後菊多說法之時座下無有不獲聖果者廣化有緣時人號為無相好佛後於一時說法之次天魔作念此是大阿羅漢善化有緣我有徒皆悉屬他我作神通或變為女人或作同類或雨七寶等當嬈惱菊多命說法不得知後時菊多於說法處聽法之人都無一人證得聖果者菊多云應是天魔惱我徒眾即入定觀之見有天魔惱我徒眾不令證果又彼將頭冠安在菊多頭上在大眾中而儛弄之天魔既爾即彼菊多將三死屍即狗猿猴虵等化為瓔珞語波旬云汝之天魔既爾即彼菊多汝奉我頭冠我今與汝與汝瓔珞波旬為之是實而納受之遂被菊多安着頭上却伏本形嗅穢無堪波旬神力上天入地種種施為不能除之即上告梵王云此是十力弟子所變化我終不能除之汝却至菊多所求哀懺悔命知此三屍餘皆不得波旬却至彼處懺謝菊多許之告波旬曰我聞汝善能許現如來相如來相好我為不見世尊汝與我現世尊相好威儀須一相似我與去却波旬云我與尊者現身尊者不得禮拜波旬入林中現如來身紫磨金色長丈六帝釋引前梵王隨後八部四眾悉皆圍繞菊多不覺禮拜又語波旬曰汝自今已後與我發二種願我與汝除之一有說法者不令惱亂二有坐禪修道不得亂彼身心波旬云我能依此奉行至今所有修行人不敢惱亂惱亂時即菊多二十三死第五師付教法訖上來五師相計共有一百年是故疏云百歲已前有五師皆是其異之人異於凡夫故名異人挺生群聖間出也上來總是第二能傳教人也自下第三辨所傳教法者疏云淳源尚挹真軌猶同者解云即辨法也即是如來正真教法更無邪謬由如佛在日無異故名真軌猶同言淳者有二解一云淳者是無雜之義即法花經云純一無雜也二云不是無雜之義疏中是此淳字以享從水故非是無雜義此淳字是精也亦是清也即訓為清也源者始也水之初出名為源意說此五人傳法一味也即真正教法名清源也若有雜亂者即名濁也解源者亦有二解一云真如名源即本源一切萬法皆從真如中流出故二云佛金口所說十二分教即本來皆從佛口所生也金口為本源也亦如水出初源也言尚者猶也近也挹者酌也又挹者是親得之皃也意云此五人所傳教法尚猶湛寂即挹者不惻也意云百年已前五人傳教不異如來在日親見佛之正法之本源相似故言挹也言真是實也正也即真實正法故名真也軌者即軌則也軌範也言由者因也所由也意云此五師傳教一依真實之理與佛所說之教更無有異故言真軌猶同上來第三辨所傳教法自下第四釋外難者疏云雖眾聖住持叶如在之化者外難云若佛在日唯佛一人說教即可言教一味今既有五人傳教即是各各不同如何言教法一味即真軌猶同義不成也下正答者疏云雖眾聖住持叶如在之化雖者即義兼得失也意云雖五人不同以見解所付法皆淳正故亦是許可之詞也眾聖即五人也或有解云眾聖者即五百羅漢是眾也今且取五人名眾聖也言住持者即任持佛法也即是正法中住持之人又住持者無有毀犯也故云住持也言叶者和合也同也意在前解以五人雖異以見解和合也或與佛在教法和同也一味無乖反故名和也如者似也即如世尊說更無異故即似彼佛在日法故名如在之化也即此眾聖住持佛法皆似佛在之所化也上來第四釋通外離說上來四段不同總是大文第三聖教相承法猶一味訖也自下第四辨邪徒競起異見繁興者分三初一句總辨教異二者舉喻三正陳異見者疏云邪徒亂徹至虧其實是也三段不同又科此疏文為二者邪徒競起異見繁興者分二初法喻總辨教異二者別顯異執疏云邪徒已下是且第一法喻總辨分二初法後喻且法者自後法乖一味是也且第一總辨教法異者即依宗論說法乖一味也言自後者自者從也後者是百歲已後即自從百年已後異見乖覺也百年已前五師傳教皆不乖覺一味也乖者背也或云諍也但取背義即背我淳正法故名背背是乖也自從優婆菊多後百年已後二百年初諸弟子等乖背異見不同佛在日法一味也二百年初即乖他一味也問曰佛在日說大小教等是不一也如何言一味法答曰然即教法多種為佛說法之時具其五德故名一味也一者難化能化德二者斷疑納也三者人天尊敬四者法不虗設設必有益五者能伏邪徒有此五義故名一味法也二百年初乖此一味法故問曰是何傳教乖一味也答曰即大天說偈是最初乖一味法也即自述情懷任言說偈是故名乖背聖言教也即宗論云薄伽梵涅槃後百有餘年去聖時淹如日久沒慈恩造宗輪論疏云如來滅後一百年外摩竭陀國蘇摩城有王名無憂無憂是阿闍世王子時佛法初分諍也問曰大天是何人答曰西方有末土羅國商主之子即此商主取一少妻後生一子顏容端正名曰大天後時商主將諸財寶行諸他方貿易即他方遇其反亂被隔多時不歸大天長大遂染於母後時父既歸來大天恐事彰露與母同情遂殺其父也復恐人知遂將將母遠至摩竭陀國波吒釐城即父在之日即家中常供養羅漢是門徒也即此羅漢後因行脚偶至大天家中大天見已恐說他惡事方便請至家中殺却羅漢已作此惡事天不祐之後時貧窮與人庸力母與人私通大天知已併母亦殺也即造三業罪由不斷善根深生憂悔自思惟我先如是罪𠎝作何方計即得滅除此罪也為此逆即此人善根不斷也自言我聞沙門有滅罪法即往鷄薗寺中問滅罪法至寺門裏已一比丘經行次念一伽他云若人造重罪修善得滅除彼能照世間如日出雲翳聞此偈已即詣比丘所云我意樂出家是若聖人即觀根受道觀此大天有三逆罪不肯度之巡房問聖者皆亦不肯與出家末後有一凡夫僧不問事由即與剃髮大天為性聰明不久之間誦持三藏聖教皆悉通達言詞清切并能化道後時國王數數請入宮內供養兼請說法遂為國師焉有云與王妃交通後至伽藍不正思惟作大妄語我得阿羅漢果於後夢中漏失不淨染衣命弟子洗浣弟子云我聞羅漢諸漏已盡如何和尚更有漏失不淨即問師云如何羅漢更有此事即大天妄答云汝知之漏有二種一者煩惱漏羅漢永除二者不淨之漏羅漢由有即如大小便痢㖒唾等是也我此漏失亦是天魔撓我方有此不淨是第一事也又與諸弟子等次第受記別汝得初果已次者得第二果乃至得第四果次第記之諸弟子等心生疑惑遂問師言我聞證羅漢一切自知我等如今悉不知也大天答言汝等知之無知者有二一者染污無知羅漢已斷二者不染汙無知由有故汝有不染汙無知即法執疑即不妨有也是第二事也又諸弟子等後時問曰師言我等得阿羅漢果即合無疑疑生分別入見即除我如何於三寶四諦由生疑惑大天答言疑有二種一者理疑聖人已斷二者事疑由有羅漢疑黑赤鹽之類疑是甲虫也是第三事又於後時弟子問言諸經說言阿羅漢有慧眼於自解脫能自證知云何但由化入證知令他而都無自證知我是無學即合度自家都不知耶大天答云羅漢有二一者鈍根一切皆不知要令他度二者利根即自知利根之中猶有不知者如舍利弗大目揵連等是智慧第一佛未與受記時皆不自知由不知何時成佛佛與受起然後乃知是第四事也又後時大天自思惟造眾惡罪憂惶所逼失聲唱言苦哉苦哉諸弟子等聞已至明朝問師言我聞大師昨夜唱苦哉苦哉如無學人所作已辦因何唱苦哉大天答曰汝亦何恠我今年老邁數入聖道不得要假聲呼方乃得見前我為慜眾生故呼聖道也所以不覺唱言苦哉是第五事也記有此五種妄語後於白月十五日眾僧布薩時次當大天念戒念戒已了即將前五事自為一偈眾中座上說偈云無學漏失因魔撓無知疑惑由他度聖道不現假聲呼此是如來真淨教若約宗輪論中偈云餘所誘無知疑預他令入道因聲故起是名真佛教若翻第四句云汝言非佛教義亦同前既結此偈為諸聖者有學無學多聞持戒修淨慮聞彼所說無不驚呵咄哉愚人寧作是語於三藏教中曾所未聞呵叱大天翻第四句是汝誰言非佛教因此遂有諍生至明不休息僧寺眾無有安者一切道俗悉之後經多日紛諍不息國王知已嚴駕就寺中為殄其事即誰是誰非大天白王戒經中說若滅諦法應取多人語即用多人語於是眾中得聖者少凡者多聖者即為一朋凡者為一朋王勅令行黑白二籌籌多者為是少即非於是聖者把白籌者少凡僧黑籌多有聖教云魔王來為把黑籌故所以多也因此兩朋便分二部一大眾部二上座部王聞上座部人少為非無憂王即生嗔怒諸聖者聞遂出遂造漏船於恒河中當欲溺殺諸聖者知已已得聖者借與未得者神通至恒河中護牙借字相扶接而自飛騰如鴈行西北而去或變似鴿或為鴈望加濕彌羅國而去無憂見之審知聖者所言不謬遂發一使往彼國請諸聖者却還本國聖者悉皆不肯王就彼國遂造五百伽藍名為鴿薗寺大天於後因行遇相師云此人却後七日當死大天聞已即告諸弟子我於後七日當般涅槃乃至後時以白狗糞焚燒也即二部初分因此而起梵云摩訶僧祇此云大眾也梵云體毗理此云上座即大天五事是分部之因也即上分大眾上座二部也依文殊問經云摩訶僧祇部分別說有七體毗理十一是謂二十部十八并本二皆從大乘出無是亦無非我說未來記即大眾部中分出七部上座分出十一部且解偈云摩訶僧祇部分別說有七即第二句體毗理十一者分出十一部是為二十部也十八并本二者大眾分出七上座分出十一即十八也并本二即二十部也言皆從大乘出者即無有小乘不從大乘而分出大乘是本二乘是末也言無是亦無非者即所立之義各各自執自義毀也故名無是也二十部皆是佛真語故名亦無非也言我說未來記佛言我滅後百年內法一味猶未諍起於一百年外諸部紛起名未來記也若依宗輪論大眾部中分出八并本部成九上座分出十部并本即十一也前依文殊問經并本有八即無說假部也然大眾部凡多聖小所以二百年內數有乖諍於此時內意義情見不同遂分出三部一者一說部即世出間皆說為一假名故名一說也即如喚火時不燒口等等取餘法即名無得物之功二者說出世部此部主意明世間之法從顛倒生今出世法非顛倒起滅道二體皆真實有可依憑故名說出世也三者鷄胤部即古仙貪欲染彼母鷄胤嗣相傳因名鷄胤此部唯弘對法不弘經律經律是世間方便教故出家講經必起憍慢憍慢起故不得解脫唯有對法是正理也後至二百年欲滿更分出一部名多聞部此師廣學三藏聖教深悟佛言從形名名多聞部後不經年月更分一部名說假部於二百年滿有出家外道捨本邪教歸佛正法亦名大天於大眾部中住重詳前義大天五事有可不可因茲乖諍分為三部一制多山部即大天所住制多此云靈廟即安置聖靈之廟處也故從山彰名二西山住部三北山住部此二部既與此大天不和因慈任在山西北也從處立名也如是分出八部也并本即九也上座部至三百年初一味和合此部於前二百年殊無異諍至三百年初迦多衍尼子於上座部出家先弘對法上座後弘經律既乖本旨遂有興諍即分出說一切有部即有為無為雖真俗差別皆是實有三世等實有故次於有部中分出一部名犢子部即古仙染犢生子故以為名次於犢子部中分出四部一法上部律主之號有法可上或可有法出眾人之上或善能說法名法上或是部主之名也二者賢胄部賢謂部主之名胄謂苗𧜟之義即是羅漢之苗也三者正量部者楷定義即量量無邪謬目之為正此部所立皆深法義楷定無邪故稱正量也四者密林山部部近山林林密故以為名也次於有部中更分出一部名化地部部主本是國主化治土地後時出家學道却歸自國中王化故名化地也又於化地部中分出一部名法藏部亦名法密部此師含受正法如藏密從人立名也次從三百年末從有部中更分出一部名飲光飲光是婆羅門姓上古有仙身有金色暎蔽飲光名為飲光部主是彼之胤從本立名也次從四百年初從有部更分出一部名經量部也師唯依經為量不言律論即經量部師也并本部成十一部也本部即名雪轉亦名雪山即上座本弘經教不弘對法闢於義理上座移入雪山從處為名也二從喻為名者上座漸次而行如雪因風飄流漸次而下似雪相似故以為名也問前一說部亦是說假說假部亦是說假二部何別答曰一說部即說一切法皆有假名不說體亦是假此說假部不論體用因果一切皆假故有別也故部主從自見解立名說假也上來多段不同總是依宗輪辨法乖一味也從第二舉喻者即下三句疏文是也水乳兩和是依涅槃經也彼經云牧牛女搆得乳初時乳純一味有人喫著眾病皆除後經多時乳中添水命乳淡薄雖即淡薄由勝於水飲之亦得病差此喻佛滅後三百年中教分多部雖教法淡薄由勝外道教千萬倍也但依之修行皆得聖果故云破戒惡行諸比丘由勝精進諸外道次依文殊問經及四分律即譬折黃金是也即彼經云佛在之日佛言我滅度後二百年初已來我諸聖弟子滅分五部或分二十部等其舍利弗見佛說便問佛言世尊滅後二百年分二十部等遣後代弟子依何部修行即得聖果何部是佛正法也佛答云譬如一修金杖分為五段二十段等何段是真金舍利弗答云皆是真金世尊言我滅度後雖分五部二十部等皆是正教法但依之修行皆得獲果是故疏云譬折黃金是也下第三句文疏依俱舍論客偈猶分白疊者即是人受二萬歲時迦葉佛父王訖栗枳王夜作十夢等白佛言我作十種惡夢有何災也莫是有惡人侵我境云佛答言此事不關王事此記未來人受百歲時有佛出世號釋迦牟佛佛滅度後二百年已來諸聖弟子分佛教成二十部也問曰何者是十夢答曰有一偈云謂大象及井栴檀妙薗林小象二獼猴廣堅依鬪諍第一夢者即夢見一大象於一室中無門戶立有其窓象從窓出全身却出猶有尾被窓礙出不得此記釋迦弟子割愛辭親而求出家身雖出家心由貪著名利不能修行如象全身出尾猶不出相似也第二夢見一口井具八功德水有人渴看此水而不飲即井逐渴人渴人走都不迴𮨇此記釋迦諸弟子道俗等身受眾苦不能聽佛法即僧將經法就俗家轉念等俗人之意目不覩也人雖有渴而不飲之也第三夢見有人將一升真珠博一升猶自不肯博也此記釋迦遺法弟子將佛聖言就俗人家博他財帛財帛猶不肯博也第四夢見將一尺栴檀木博一尺凡木凡木猶不肯博也此記釋迦遺法弟子將聖教博他俗書等俗書等猶不肯也第五夢見一妙薗林花菓茂盛有一群賊一時來殘害盡此記釋迦遺法弟子小乘二十部互相非斥殘佛教也第六夢見眾多小象逐出大象大象與他出也此記釋迦遺法弟子破戒惡行結伴侶逐出有德清淨比丘也第子夢見一獼猴極劣眾獼猴共扶為王將四大海水灌頂已立王也此記釋迦遺法弟子自身破戒造事即相扶為尊德為師也第八又夢見一獼猴身塗不淨湯突餘者此記釋迦遺法弟子破戒惡行者兼謗清淨比丘也此第八者合是第七夢也攝時錯也第九夢見一張白疊價直無量極殊妙也即二十人共諍分此衣衣由不破此記釋迦弟子共諍如來教法分為二十部也雖衣依同分多部部皆是佛正法依之修行皆得獲聖果也此是廣堅衣也第十夢見多人互相征伐此表遺法弟子各儻自宗互相非斥以為鬬諍是故疏云猶分白疊者是第九夢也上來總是舉喻也自下第三正陳異見中分二初通辨邪徒者疏云邪徒亂徹正法陵夷也別明情執且第一邪徒亂徹者不正曰邪和雜穢亂徒者徒儻也徹者疏也即正教大乘之跡也即正教大乘之文車蹤曰轍如來教法由如車蹤道路更無邪僻也外道等教三德六句二十五諦虗空實我等如下廣明外道五師三計等也此邪徒者即外道也或總是小乘亂徹者即將二十部互相見不同亂我佛教即是邪徒也亦將小乘為邪徒也本來一味正教便異見紛諍也亂正法之徹跡也如春秋云齊魯二國交戰齊軍大敗退其魯軍即欲逐之魯軍有一人名曹劌曹劌云魯軍且住恐齊軍是詐伏兵使人望者若齊軍車馬縱橫干戈倒載即是真敗使人望車乃見縱橫方知實敗退也今被小乘外道等𥪰興異見亂我佛真正之教也故云邪徒亂徹也言正法陵夷者即是我如來所說之教名正法也高峻曰陵也夷者平坦之㒵也爾雅云大埠曰陵夷者平也即謂諸小乘外道等摧壞我正真之教平平若是又諸小乘師云諸大乘經非佛說也即小乘謗大乘言非佛說者正是邪徒也即使正法之山平坦也故名正法陵夷也上來第一通辨邪徒也自下別明情執分二初明小乘情執二明大乘情執且第一辨小乘情執者疏云色心假實異其宗者即是執假執實異於正法之本宗也如一說部執色心皆是假有名為執假也即世出世世間一切法皆唯有一假名也又犢子部師執我法俱有也即於有部中分出所以情見執一切皆是我法實有也小乘三世有與有宗別也執一切皆實三科法門三世法皆是實也或計肉摶為心精靈四大等成五根皆是即此二十部護執不同色心等假實不同乖正法故名異其宗者異中道宗也疏云有無之說虧其實者虧者少也即覺天經部一意問曰何名有無之說答即或執外境如識非無是增益也或執內心如境非有是損減名無也問曰如何名實法答不空不有即唯遮境有識簡心空菩薩執唯有一个意是有餘者即假皆是無皆虧大乘八識五十一心所法也若執無者即是青辨即從四百年後至八百年已來空宗大乘大行空教即執一切皆空也不簡遍計圓成依他皆是空即內果皆空也青辨造掌珍論同時有五个論師名五日出即五天一時生中印土是龍樹東印土是馬鳴南印土是提婆西印土是室利羅多北印土是鳩摩羅多即五日出也大弘空宗即青辨掌珍論中作比量破菩薩涅槃皆立即彼論偈云真性有為空如幻緣生假無為無有實不起似空華如青辨宗八部般若經故以般若經說一切皆空也以青辨不了如來隱有談空教便執一切皆空者是青辨惡趣空也如來般若經中言一切皆空者是真空不空是妙有故即此經意說心外境空也亦不說依圓亦空也青辨不知佛意便執一切空二轉依果亦是空即青辨第一比量云真性有為是有法空空故宗因云云緣生故同喻云猶如幻事幻事是緣生幻事是空真性有為是緣生亦是空也即此似比量乃有過也即因中有所依不成過喻上有一分所立不成過一分是能立不成過言因無所依不成者前陳有法意通通兩宗共許青辨既立性空有為以為有法者言一分前陳有法者即護法不許有緣生之因依彼轉故是一分所依不成言喻上有一分能立不成者因言緣生表是緣生及餘三緣故致生字幻事之喻但假合起非因緣有何有生字故於因上合言緣成言一分所立不成者幻事之喻通貫兩宗護法幻事非空非有所立空宗於彼不轉即於喻上半有半無故是一分所立不成也第二量土涅槃是有法定是空宗因云不起故同喻如空華等定是定即護人宗中空如我宗中且不空也汝應言青辨自許宗空者方簡他宗也既不簡他宗即他不極成過也汝又言是緣生者是不如何言空耶既若犯多種過即比量不成故知菩薩非空也若是空者汝青辨菩薩修行求於何果又一切眾生修行歸趣何法也若一切眾生有所歸敬處是可求果故遍知計是無依圓是有涅槃是圓成四智是依他也具有能所證即有凡聖生死亦有菩薩涅槃即知三性中唯遮遍計是也故知佛法正道理者即苦集是染因果滅道是淨因果二轉依果非空非有妙理中道故離二邊也離心外妄計有故名不有離青辨惡趣空故名不無也即不無邪契中道諸有智者應順修學捨彼生死輪迴之業無上覺也即乍可執有如須彌不可執空如芥子何以即執空者滯其空邊諸佛說為不可治者此上即是大乘異師亂轍訖也上來最是大門第四邪徒竟起異見繁興訖也自下第五啟彼中道方陳邪論者分為五段一者解論主之名即疏云爰有大士厥號天親是也二嘆德者疏云嗣至聖之玄風紹法王之令軌是也三者明述作之意疏云造斯論五法合成者是也四者正顯中道除執二邊至異執是也五者總結深意遮彼迷情今更科後二第四破執歸中第五總結深意也疏云文邃理愽難可詳焉者是也五段不同且第一明造論之人即爰下二句是也言爰者于也粤也即爰粤也大士者即褒讚之詞亦是簡異二乘非大士也以求大果大行大涅槃故名大士也即大菩薩之士名大士也有云但合言正士也合名大士大士者是佛也以無上事故名大士也若行大行求大菩提之事名大士理亦然也大士通因果若無上士者唯局果解云十下作一是士字也十者數之終也一者數之始也此菩薩解行即有始有終故名士也此是以字解也即不如前解也即當九百年中出世也言厥者其也號者德號也如人初生至二十已來方得為名也若國家與官於國有忠於家盡節即眾人與作名稱號也於國有忠與立其號也如張燕公是也即此天親於佛法盡忠即造論解經接引眾生皆能入佛法獲聖果故世人因此菩薩造論令一切善芽增長即菩薩與眾生為之出世父即立號也號曰天親或名世親即是唐梵各不同也言世親者是唐言也梵云筏蘇盤豆此云世親梵云拔蘇盤豆此云天親舊云婆搜盤豆者非也亦云世所親近名世親也或云於天神邊乞得故名天親問曰何名天親答曰為父母無子息恐後絕嗣遂於天神邊乞得西方多有人事天神也即是自在天也從所乞處得名名曰天親即於經部出家學經部義闇破有宗造俱舍論却潛破有部宗也後時有新有部師名新薩婆多見天親潛破有部宗即新薩婆多造四十卷論破俱舍名俱舍撲即俱舍論即馬駄著於五天逐之天親遂走問曰何天親却走答曰天親言以無人監故長去十五里後時新薩多患疾便遣弟子將四十卷論呈似天親見詳之乃見道理善順俱舍與立名目名順正理論也此天親前後造五百部小乘論皆謗毀大乘經典言非佛以無著是兄既知見已便勸令修大乘行其天親不肯迴心後時無著我有小疾令弟子往喚天親於天親所宿處無著弟子於高樓上念華嚴經十地品偈云若人欲了知三世一切佛應觀法界性一切唯心造聞此偈已遂發大乘心修大乘行後時思惟我已前謗毀大乘經論後必當入地獄我先毀方等經都由此舌我今為悔此過應須截舌方得謝邊也即自執刀欲截其舌去無著所三由旬遙知欲自截舌即現神通以手遮刀語天親言汝不須截舌夫人因地而倒還須因地而起昔日將舌謗大乘經典如今應將此舌讚大乘經即謝過也天親受教後時造五百部大乘論讚嘆大乘廣破小乘即此百法論是一數也西方千部論師者天親是也即初迴心時造攝大乘論也㝡後造俱舍論也即慈恩和上嘆云晦孤明於俱舍孤明大乘明慧也示同塵而說有即示現依小乘也解慧縛於攝論慧縛者即小乘慧名為慧縛今棄之故名解也表縱聖以談空鑒冷智周窮神盡叡即疏主厥號天親是辨能造論之人也第二嘆德者兩句疏文嗣至聖之玄風紹法王之命軌者嗣者繼嗣也如人家養兒即繼嗣先家此天親亦爾繼嗣世尊也言至聖者有三解一云天親繼嗣無著菩薩無著菩薩是初地也以天親因無著發心又是無著之弟也是燸頂之高士樞要云位居明陰道隣極喜即天親繼嗣無著菩薩無著是至聖也二云天親但繼嗣彌勒以依瑜伽論為主故云至聖也以當來成佛故云至聖也三云但繼嗣佛也既不繼嗣餘人至者極邊之義又聖法王是至聖也此方盡理玄者妙也風者風範即此玄風者是如來教法天親能繼嗣佛正法故云嗣至聖之玄風言紹者繼紹也法王者即是佛也問曰言至聖如何後更言法王答曰但是文家屬對亦無別義至聖即是法王也以於法得自在自在者是王也故繼經言已於法得自在是故稽首此法王也命者隔也命是正也軌為軌則途徹規隔之義即天親皆能紹繼故云紹法王之命軌也第三正明述作之意者疏云造斯論五法合成者正明造論因由也者興也盛也造者作也述也斯者此也即是天親興作此論也問曰世尊在日說法有不了之教即更要天親造論化諸有情佛在日說法皆是了教如何菩薩更造論耶答曰菩薩造論有深意趣問曰有何意趣耶答曰有四意故造斯論一者為嚴顯佛經故所以造論以佛經甚深微妙難了知故菩薩造論解經解經義顯現也二者為摧邪顯正所以造論慈恩云風飛三量即外道靡其雅宗既避正法得顯也三者令法久住菩薩所以造論以論解經正法顯現後代流行命不斷故四者利樂有情所以造論命眾生除邪正見解生依教修行出離生死輪迴受法樂也故名利樂有情天親慈悲有此四意所以造論也雖有四意意在嚴顯佛經若不造論解經經中奧義難曉也造論解經意有五喻一者如見蓮華未開見雖生喜不如開已香氣紛馥如來說教義意深隱見雖生喜不如造論釋之命義顯現二者如見金鋌見雖生喜不如鍛鍊為莊嚴具菩薩造論釋經亦復如是三者如見美饌見雖生喜不如食已知其美味造論釋經亦復如是四者如得慶書見雖生喜不如披覧知其慶事造論釋經亦復如是五者如見他財寶見雖生喜不如攝為己財菩薩造論釋經亦復如是諸經教義深意難知造論釋經如前五喻四意也下有三師解造論意各各不同一安慧二火辨三護法且第一安慧菩薩明天親造論意者問曰菩薩造論有何意趣安慧答曰有三意故一者令有情生正解二者令有情斷二重障救三者令有情得二勝果故此初也即令有情生正解者以一切異生諸外道小乘等有迷謬故不生正解問曰何以一流之人不生正解耶答曰謂異生愚癡故執我法故於二空理全不解了故名為迷也問曰如何名謬答曰如二乘空宗青辨等一類名謬也謂二乘執心外實變故是增益邊此二乘名為愚也以不正解故若青辨等執惡趣空撥無因果依他圓成亦空是損減邊即二乘青辨總名謬也即合此二乘凡夫青辨總名迷謬也今天親造論者謂於二空有迷謬者生正解故即令迷者生解謬者正解也問曰何名二空答曰即是生法二空也今說二空者即是人我法我即空也以本無我法之體故此言空者不是離二執有空但是二執即空也以本無我法之體故此言空者不是離二執有空但是二執即空更無別體即智緣空起為所由履門於空門中顯得真如名二空理理體非空也即言空者離心外遍計執有故名空也言難空者即真如體是妙有即真空妙有正遮二邊也如下文廣解之即梵云舜若此云空也若名舜若多即是空性也即於二空所顯得實理故即二空之性依事釋也有人解云真如空者不盡理也此是第一令迷謬者生正解也所以唯識論云今造此論為於二空有迷謬者生正解故上來第一總令有情生解所以造論也從此第二令有情斷障故所以造論既若於二空生解故即能斷二重障也言重障者有其四義故名重障也一者此重障由如金剛難可斷故即世間一切色法皆可斷唯有金剛難也此重障如似金剛難可斷也二者有此煩惱所知重故難越生死故有此重障難越四流也三者厭溺有情四生故也四者墜有情輪沒三界謂此重障發業閏生無休息故有此四義故名重障也若證二空彼障斷也即唯識論云生解為斷二重障由我法執二障令生若證二空彼障斷也即天親造論謂令有情斷二障故所以造論也自第三令有情因果所以造論也問曰得何果也答曰得二勝果二勝果者即是菩提也問曰如何名勝果答曰勝謂殊勝果謂酬因即三劫行因得順益果也此是殊勝之果以因勝故果亦勝也因果相攝二乘得二果非極圓滿故非勝果也究竟二果過出於二乘十地故名勝果也故唯識論云斷障謂得二勝果故問曰言斷障者是何障有何行相得二勝果答曰即唯識論云由斷續生煩惱障故證真解脫由斷礙解所知障故得大菩薩也問曰如何煩惱障名續生答瑜伽五十九云一切煩惱皆能續生即俱生分別也能發業閏生令三界生死不絕故名續生地前通分別地上唯俱生名續生也以閏十王果報故即煩惱正是縛法無始有情不得解脫皆由煩惱縛也今既斷却續生煩惱障即離縛故得真解脫身亦名法身問曰斷所知障得法身如何言斷煩惱得也答曰此約勝所障故斷煩惱得真解脫身即此法身亦解脫亦法身也以二空齊顯故今偏說者即煩惱也問曰如何所知障名礙解答曰以所知不是障障所知境故得名也四涅槃名所知智下名能知又智下是解心也即此法執能障所知境殊勝智故名所知障所知之障依主釋也即斷此障得大菩提也即安慧菩薩解云天親菩薩有此三種利益故即令生心解令斷障令得果故所以造論也自下第二明火辨菩薩義者此意即令有情證唯識性故所以造論也即令外道捨邪歸正即謂外道開顯此論亦謂二乘開顯此論令捨小歸大也皆令證達二空故證得唯識性以外道數論等執三德六句二十五諦等小乘執法實離心外有故菩薩造論令一類達二空者證唯識理也問曰外道邪執如何令他達二空理也答曰謂此外道無始有無明所盲不知正理便執邪解虗空等我皆由無明起惑造業即不共無明親迷諦理相應無知與九同迷不正知故所以邪執菩薩慈悲故造論三意四道理破此外道邪執令歸正見也即此論開示外道故令達二空者不執神我也即證唯識理也二謂內道小乘執故所以造論也前謂外道開顯此論文後謂內道小乘演示此義以小乘執有故是法執未了法空也今示此文故達二空理也即小乘外道邪智執我法故示令知故故知天親造論令有情生正智達空證理故問曰作此解莫是𮌎今耶答曰聖教正理有定量故即唯識論第一云又為開示謬執我法迷唯識令達二空於唯識理如實知故也上來第二明火辨菩薩義訖也自下第三明護法義者即天親造論為破邪執故所以造論故唯識論云復有迷謬唯識理者或執外境如識非無或執內識如境非有或執諸法用別體同或執離心無別心所為遮此等種種異執令於唯識深妙理中得如實解故造斯論也解此護法意與前摧邪顯正意同也即青辨菩薩言俗諦門中心境俱有若勝義門中心境俱空或執心法如外境無也若是薩婆多師或執外境如識非無也天親造論意破二邊空有二執故所以造論也即前百法論遣青辨等執空也後言二無我者意遣薩婆多有執故造斯論也即是辨第三時教非空非有教也上來三師解天親造論之意也是故疏云造斯論也即言五法合成者即五位法也問曰天親是𤏙頂之位是地前如何造百法百法是初地菩薩造耶答曰初地菩薩達百法明門也天親菩薩但述而不作也總是辨述作之意也第四辨正顯中道除執二邊者或云第四破執歸中也疏云啟有空之兩門闢二邊之異執言啟者開有空之兩門是者有門即百法能啟彼空見情執故空門是二無我啟心外實有法故天親造論前陳百法即啟彼青辨惡趣空執故以青辨一向執空第二時大行空教故今說一百法妙有故破青辨妄執空也後言二無我是空門即破薩婆多執三世實有也皆言極微成有三得得著心外實有也此二無我遮有執也即非有非空中道大乘之教是佛滅後至九百年中說此百法也謂遮二邊以前二時著邊故第一時教是有教世尊密意說有者是依圓有也說唯識不空也薩婆多師不得佛意便妄執心外實者滯著邊也第二說空者意破執有也即唯說八部般若一向談空即佛密意說空者但是遍計是空亦不言依圓是空也青辨等類不得佛意便妄執若色若心因果菩提涅槃一切皆空也即滯損減邊也世尊於第三時中談非空有教雙遮二邊等即華嚴楞伽厚嚴法華經等是百法唯識是天親說言遍計是空依圓是有也問曰天親是地前菩薩何不自修行如何造論啟他有空二門也斯有何意答曰有二意一為生大智故二生大悲心故又諸有情起大恩德即觀諸有情無始時來迷覆真性謬執我法由斯妄執或障具生三業輪迴無由出離隨情執起逐意見生執空者迷理事而都無翫有者言我法而皆實是以菩薩出世制此微詮錯彩鏤金文華理䆳故令惡趣之輩比知善惡而不無執性之流悟緣生而幻有所以前明百法為遣執空後述我無令除有執有此因由方陳雅論故疏云啟有空之兩門也言闢者除也即將百法闢青辨空見也又能除執空之流也將二無我除二乘等有見也將此百法二無我闢二邊也上來辨正顯中道除執二邊訖也從次第五總結深意疏云文邃理愽難可詳焉者言邃者深邃也理者道理也愽者廣愽也即深邃道理廣愽故難可詳焉焉者語助也切韻解也此總結也上來有五章門總是大門第五啟彼中道方陳雅論也自下大門第六略題目簡異餘文者於中分三初總題目二別解題三總結從首稱下至簡一分之別目者是總解也二從大用遮詮下至號之為數已來是別解也三總結者疏故云大乘下至略錄名數也三段不同且第一總解題目者於中分二初總解上之七字二總解下之八字此初也疏云首稱大至旌一部之通名者首者頭也初也始也稱者知若作稱則宣揚美事也此上依切韻解也人更解亦說也即解此七字有三句疏文分二初一句標題目下二句正釋也且標題目者言首者如前解也即下二句釋上一句也即首稱大乘百法明門論者總宏綱之極唱旌一部之通名者即宏綱之極唱也總者收束義舉此七字百法義皆収盡也極者切韻解者極揀揀即是妙也宏者大也綱者網也亦是大也應言宏即是綱也由如魚網上安大繩名為綱也但舉其綱網目齊整但舉論題七字下五位百法自然齊整也故云舉網題綱眾網皆張提裘舉領萬毛皆整極唱者首唱也初說也即總包之義也表此大乘法是至極之法故云極唱唱者說也即首唱初標七字唱一部之極首也裘網雖多藉綱領而得正一百法雖多將此七字目下一百法故如綱也言旌者即是旗也如旗引前表後有五十軍也即大軍欲發旌旗必先已有旌節表知有節度使大軍也即先舉七字後表大乘等下百法也是五位百法之旌節也是故旌一部一部之通名也二者總解下之八字者疏後云本事分中略錄名數者即八字也將下二句釋上一句也問曰復土本事分中略錄者是何答曰是纂義類之鴻猷也又云本事分中略錄名數者是簡一分之別目也言纂者合集之義類者眾類心心所等又五類法也鴻者大也如秋深九目鴈隨陽大者曰鴻小者鴈今言鴻者取其大義猷者道也通也盡也法也意說百法論錄彼瑜伽本事分中大意皆盡故云纂義類之鴻猷也即纂義類之大法也簡一分之別目者簡者擇義應作此揀字此揀訓為純也一分者是彼論中一分之義別目者為天親菩薩於本事分中集彼類之法成此百法論故云別目上來總解題目訖第二別解題目者分二初別釋大等七字二者別解大等七字言大用遮者即呼大事等八字中初也疏大用遮詮立號道目之為論巳字之時但有遮詮無他表詮但遮小乘也此但名大是何大為是大人為是大法為是大天等但有大義能遮小故如呼火時遮不是火亦無自表義也即火者是何火是螢火但有火義遮義如火亦有表者即呼將熱火來此亦無遮表也火者不自表但遮若更表者應須雙言大乘也亦遮表也若有人作四句者將熱火者是唯表者非也何異前言何異前言火時即但有遮非表後言熱火其便唯表也若言唯表者第二句中即不言火也以火是遮義也故須熱火是遮表義可爾即不必事須作四句若言句四隔定者即應於二諦上亦須有四句也可知今言大時但遮小更雙言大乘即有遮表義若疏中單言大字但是遮詮也非表詮立號也據實亦有表詮以有乘字故言乘者運載得名也如船車有運動之用今此大乘有運載眾生到彼岸之用故名為乘故疏云乘者運載得名也疏云百法以解體用雙陳至能所兼舉者此有三解一章敬云百者是體法是用明者是能慧門者是所緣境故言百法體用雙陳明門能所兼舉也薦福難云前所言百法是所緣境今門又是所緣其一論題有兩重所緣之失也即有量言之過又解云百法是所緣境有其體用明是慧體門是慧上無權之用亦不犯重解之過也又解云百者是數義不須說體用但一百个法上有體有用何以即法上有時自體故名體有生解之義是用即百法體用雙陳也明門能兼舉者即明是慧是能緣門者是慧所遊履門即百法便是所遊履門即是所緣即無別慧於百法上遊履時有無權之義名所緣也門即是百法持業釋也門是慧所遊履故是用百法即是體也將百法為所遊履門亦無量重所緣之過也此解為勝亦順疏文以疏文中明門以能所兼舉故若真解云慧是體門是慧上用者非也何以即慧為能遊履亦可將門又是能遊履哉分明說明門能所者即明是能緣門是所緣即百法境是門也下解論之一字者疏云循環至目之為論者分二一辨論之義用上二句是二辨論體者下二句是論者是往來之義往反名循環研者磨也覈者實也即循環研覈道理方得究暢真宗也究者窮究也暢者通也即窮究通暢命真詮顯第二辨論體者疏云梵云摩怛理迦此翻為本母是本母是妙慧由此妙慧圓滿福智能生長諸法故名本母也又妙慧者有多方便究本窮源作用簡擇能生智解故云本母也又此本母是論論推尋性相却生得妙慧也妙慧生已解能破精後生論也因論而有問答問答而生智故云論是智之母也故云目之為論上來別解上之七字訖下別解下之八字者分四一屬當本事分二解略錄二字三解名四別解數且第一者疏云本事分者即瑜伽本分也有二解一云對法本事分也二云是瑜伽本事分以天親遠習彌勒取瑜伽本分也即瑜伽五分中第一分是本地分第五是攝事分即攝末歸本取瑜伽也此上屬本事分也第二解略錄二字分二段一者敘廣文之意二者釋略錄之義三者結廣略之文三段且第一敘廣文之意者疏云良以彼論文廣義豐至輙難曉悟意云瑜伽論中文既廣博義繁豐若擬於瑜伽掬尋道理不可曉悟也若以逐波瀾欲者火之源皆難可得彼亦爾若一百卷瑜伽中討尋此五位法不可曉悟也輙者切韻訓為專也第二正釋略錄之義者疏答云乃甄集宗要成斯雅論甄者簡也集者纂集也要者節要即纂集要節之文此百法也亦非全取彼文也言廣文委屬他部至故錄者即瑜伽論名為他部一切能詮教繁文屬其瑜伽說廣解也切韻屬者與燭同音屬付也若口邊作即屬託也問曰如何不將廣文成此百法答曰疏云略論抑不繁詞也抑者強也若切韻解者抑按也亦是抑壓此百法無繁文也以將廣論之中能詮所詮成此百法論故名略錄也第三別辨名者疏云表詮呼召稱之曰名者即名詮自性句詮差別文即是字為二所依也但取文能詮自性問曰聲名句文亦能表詮得一切法如何但說其名不說餘二答曰名詮自性舉此名攝取餘二也若取聲取字即太狹也若取句者即太寬也今取名非寬非狹即處其中但取名也第四別解數者疏云有所度量號之為數有分限可知多少可度量故故稱數也上來第二別題說上來有二初總解題目二別解題目兩不同總是正解題目訖從此第故云大乘百法明門論上來六門不同序訖也
